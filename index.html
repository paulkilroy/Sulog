Bible",prompt:"I read the Bible.",words:["Bibliya","ako","basa","an"]},{unit:"u36",unitName:"Church & belief",word:"kros",gloss:"cross",prompt:"The cross is on the wall.",words:["kros","an"]},{unit:"u36",unitName:"Church & belief",word:"kinabuhi",gloss:"life",prompt:"Life is good.",words:["kinabuhi","maupay"]},{unit:"u36",unitName:"Church & belief",word:"langit",gloss:"sky / heaven",prompt:"Heaven is beautiful.",words:["langit","mahusay"]},{unit:"u36",unitName:"Church & belief",word:"pasaylo",gloss:"to forgive",prompt:"Please forgive me.",words:["pasaylo","alayon"]},{unit:"u36",unitName:"Church & belief",word:"kaadlawan",gloss:"birthday",prompt:"Today is my birthday.",words:["kaadlawan","ko"]}];var Hu=[{id:"bloom-kunta-huybes-kada-adlaw",title:"Kunta Huybes kada Adlaw",source:"Bloom",license:"cc-by-nd",paras:["Tuktuga-ok! tuktuga-ok! tuktuga-ok! Nakagmata hi Mira han tuga-ok han manok. Nangadi hiya pagpasalamat han Ginoo ngan dali nga gintipig an iya hinigdaan.",'Pag gawas niya ha kwarto, iya gintawag an iya nanay. "Nanay, nanay, nanay!" Iya liwat gintawag an iya tatay. "Tatay,tatay, tatay!" Pero waray may bumaton ha iya.',"Kumadto hiya ha ira kusina, waray tawo. Kumadto hiya ha ira balkon, waray tawo. Kumadto hiya ha ira libong, waray liwat tawo!",'Bumalik hi Mira ha sulod han ira balay ngan nahinumdum hiya. "Aha! Huybes ngayan yana, adlaw han tabo asya waray dinhi hira nanay ngan tatay. Timprano pa hira nga napakadto ha tabu-an para mamalit hin pagkaun ngan iba pa namon nga panginahanglan!" "Ano dawla kun napalit nira nanay ngan tatay an akon gintugon?" pakiana ni Mira ha iya kalugaringon.',"Waray la mag-iha, umabot na an kag-anak ni Mira tikang ha tabu-an. Damo an ira dara. Malipayon hira nga gintapo ni Mira.","May ada mga sibuyas, lasona ngan luya. Upod na an isda, karne han baboy ngan baka. Mayda liwat asin ngan asukar, toyo ngan asiti. Mayda pa gatas ngan palaman nga marasa! Kadako han tawa ni Mira!","May ginhatag nga nakaputos an nanay ni Mira ha iya. Ginkulba hiya! pero dayun la nga nakapakpak hin kalipay hi Mira. Ginpalit ni nanay ngan tatay an mga tugon niya! May ada na hiya bag-o nga lapis, pula nga payong ngan dulaw nga bestida!",'Malipayun hin duro hi Mira! "Salamat nanay! salamat tatay!" "Salamat han iyo mga pinalit didto ha tabu-an! "Humangkop hi Mira ha iya nanay ngan tatay ngan sumiring; "Nanay, tatay, kunta pirmi nala Huybes kada adlaw!" Nagkatatawa an iya nanay ngan tatay! Nagkatatawa hira ngatanan!'],titleEn:"Every Day Thursday",questions:[{q:"Why were Mira's parents not at home?",options:["They went to the market","They went to school","They went to visit a neighbor"],answer:0},{q:"What made Mira very happy?",options:["Her parents bought her new shoes","Her parents bought the things she asked for","Her parents brought home a puppy"],answer:1}]},{id:"bloom-an-bao",title:"An Bao",source:"Bloom",license:"cc-by-nc",paras:["Tumago ha luyo han bato.","Bisan diin hiya nakadto.","Balay niya pirmi aklo.","Naukoy hiya ha sapa.","Kay naayon hiya han baha."],titleEn:"The Turtle",questions:[{q:"Where does the turtle live?",options:["In a tree","In a river","In a house"],answer:1},{q:"What does the turtle always carry?",options:["Its home","A basket","A stone"],answer:0}]},{id:"bloom-an-tulo-nga-magsarangkay",title:"An Tulo nga Magsarangkay",source:"Bloom",license:"cc-by-nc",paras:["Usa ka gab-i mapawa an bulan, nag uru-istorya hira Tristan, Jolo ngan Anton. Dako an tingog ngan tawa ni Tristan.",'Ginsaway hira ni Mana Lita. "Kabataan, hinaya an iyo tingog kay nakakaistorbo na kamo." saway ni Mana Lita nga pinipiraw.','Ginsigawan nira Jolo ngan Anton hi Tristan. "Hala ka, Tristan! Hala ka, Tristan!" sigaw han duha. Tungod han kaawod, pumurot hiya hin bato ngan ginlabay an atop nira Mana Lita.','Kinalasan hira Mana Lita. Nahimangno hira ngatanan. Iksakto nalabay hi Mano Solomon kay nagroronda. Ginsaway niya hi Tristan. "Kay ano nga nanlalabay ka man?" pakiana ni Mano Solomon. Nandadlagan an magsaarangkay.',"Kinabuwasan, ginkadto ni Mano Solomon an mga balay han magsarangkay.",'Ginpatawag hira upod an ira mga kag-anak para pagtuhay. "Kay ano nga nanlabay kamo han atop nira Mana Lita?", pakiana ni Kapitan Eddie. "Hi Tristan po adto kapitan," baton ni Jolo. "Ginsaway la po hiya nanlabay dayon," baton liwat ni Anton.',"Para matapos na an pagtuhay ha ira ni Kapitan, nangaro hin pasaylo an magsarangkay ngan ira mga kag-anak kan Mana Lita. Tikang hadto, an maagsarangkay in nagsaad nga diri na hira mag-uutro."],titleEn:"The Three Friends",questions:[{q:"Why did Mana Lita scold the children?",options:["They were too noisy","They broke a plate","They were late for school"],answer:0},{q:"What did the friends and their parents do in the end?",options:["They moved away","They asked Mana Lita for forgiveness","They blamed Mano Solomon"],answer:1}]},{id:"bloom-an-pakla-nga-mayakan",title:"An Pakla Nga Mayakan",source:"Bloom",license:"cc-by-nc-sa",paras:["Ha usa nga lugar, may ada usa nga Pakla nga masyado hin kamayakan.Nakausa, ginpakianhan niya an nga tanan nga mga hayop kun ano an karuyag kaunon han ira mga anak.",'Ginpakianhan niya an Tamsi, "Ano an karuyag kaunon han imo mga anak?"','Bumaton an Tamsi, "Karuyag kumaon han akon mga anak hin mga apan." Bumaton an pakla, "Oh, asya!"','Ginkadto han Pakla nga dako an baba an Baboy, ngan iya ginpakianahan, "Ano an karuyag kaunon han imo mga anak?"','Bumaton an Baboy, "Karuyag uminom hin gatas an akon mga anak." "Oh asya!", baton han pakla.','Kumadto hiya han Itik ngan nagpakiana, "Ano an karuyag kaunon han imo mga anak."','Bumaton an Itik, "Karuyag kumaon han akon mga anak hin gudti nga mga prutas." Oh asya,"baton han Pakla nga dako an baba.','Kumadto han Buaya an Pakla ngan pumakiana, "Ano an karuyag kaunon han imo mga anak?". Han pagkita, nalipay an Buaya ngan gumuliat, "Ooooohhhhhh" Humadlok hin duro an Pakla pakabati niya han guliat han Buaya.',"Mga Pakiana: 1. Ano an pakiana han Pakla ha mga hayop? 2. Ano an baton han Tamsi ha pakiana han Pakla? 3. Ano an karuayag kaunon han mga anak han Baboy? 4. Ano an siring han Itik ngadto han Pakla nga karuyag kaunon han iya mga anak?"],titleEn:"The Talkative Frog",questions:[{q:"What did the frog ask the animals?",options:["Where they lived","What their children liked to eat","Why they were sleeping"],answer:1},{q:"Why did the frog become very afraid?",options:["The crocodile shouted","The bird flew away","The pig chased him"],answer:0}]},{id:"bloom-an-istorya-han-pormado-nga-bato-han-kand",title:"An Istorya Han Pormado Nga Bato Han Kandiwata",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa ha mga sikat kadtuon yana ha isla han munisipyo han Daram an ira bantog nga pormado nga bato o rock formation nga gintatawag nga kandiwata . An pulong nga Kandiwata in nagtikang sa lokal na termino han mga waray nga an karuyag sidngon in lugar o puroy-anan han mga diwata, engkanto o mga linarang nga diri nakikit-an han mga ordinaryo nga tawo.","Sumala han istorya han mga kalagsan, an ini nga pormado nga bato nga baga han nalutaw ha butnga han kadagatan in usa daw nga dako nga barko nga may mga sakay nga pasahero nga nagnanabigar hadto, nga kun diin samtang ini in nagbibiyahe ha butnga han kadagatan in may kalipay nga nahitatabo ha sulod han barko, may ada mga nagkakaranta, nagsasarayaw, nagkakatatawa, ngan nangugugli-at nga mga pasahero.","Ha butnga han ira karisyuhan nakit-an han mga tawo an usa babayi nga may ada kugos nga misay ngan ira ini ginhimo nga pag-intrimisan ginkuha an misay ngan ginkariguan, ginbadoan ngan ginpasayaw-sayaw han mga tawo an nasabi nga misay, nga kun diin mas nagin marisyo pa hin duro an mga tawo samtang nagnanabigar ha kadagatan. Ngan waray pag-iha.","Nga tumigda la nga naglain an panahon ngan nagsirom an bug-os nga palibot ngan nagkamay ada hin makusog nga dalugdug ngan kidlat nga asya an naka-igo ha barko ngan ini nagin usa nga dako nga bato ngan nagporma hin sugad hin dako nga barko. Hito mismo nga oras pagkahuman han panhitabo in tigda la nga nagmingaw an bug-os nga palibot. An dako nga barko nagin usa nga dako nga bato.","Ha pagkayana ini nga pormado nga bato in pareho hin usa nga barko nga nalutaw ha butnga han kadagatan. Ngan ini in maupay ngan kamakaruruyag pagkit-on.","Dugang pa han istorya han pipira nga mangirisda nga nag-uukoy hirani ha kandiwata, nasiring hira nga danay may mga panahon nga nagpaparawa ha gab-i an pormado nga bato, ngan may ada mga tingog nira nga nahibabati-an nga mga nagririsyo nga sugad hin may ada sarayaw an mga diwata o engkanto. Asya daw adto an mga tawo nga sakay hadto han barko nga nagin usa nga bato.","Dugang pa nga istorya han pipira nga mga residente han usa barangay nga naukoy hirani ha kandiwata, an siring nira nga kun mangangawil o mananakop ka hin mga isda nga harani ha kandiwata in kinahanglan mo anay magsarit sa dako nga bato (kandiwata) para diri daw magkamay ada hin problema sugad han: pagkaruba han imo sarakyan, pagkasangit han imo pukot, pagpapaabat han mga diwata ngan engkanto ha imo o di ngani diri kana makakauli haiyo panimalay .","Bisan ha pagkayana kun may napakadto didto nga mga turista nga karuyag mangarigo o magpahalibway hira gin sasagdunan nga magsarit anay ha pormado nga bato ha bisan ano nga karuyag nira buhaton didto.","Dugang pa nga siring nira nga kinahanglan mo mag-itsa hin sinsilyo antis ka umuli o bumaya hito nga lugar para daw diri mag-isog o mabido an mga diwata o engkanto nga nangungukoy didto.","An ini nga istorya in sumala o nagtikang ha mga mga tawo nga nagkamay ada han mga eksperyensya, mga nahikit-an ngan mga nanhibati-an mahiunong ha kandiwata. Nga kun diin bisan ha pagkayana nga panahon ini in imo hibabati-an nga istorya mga tawo nga naukoy hirani ha kandiwata.","Usa nga mahusay nga dagat-panan-awon (tourist spot) an pormado nga bato han kandiwata ( kandiwata rock formation), nga gindadayo yana han mga turista nga natikang ha mga hagrani nga lugar han Daram. Maupay didto mangarigo kay an tubig malimpyo ngan matin-aw. Ini in usa nga natural nga karikuhan nga maidadasig han mga tawo nga mulopyo han munisipyo han Daram. Nga angay naton timangnuon, paghirutan ngan ipadayon an kalimpyo han kadagatan. Pagkaada hin pagrespeto ngadto han mga tawo nga nagkamay ada hin eksperyensiya mahiunong han ira mga istorya hiunong han kandiwata.","Aton tagan hin importansiya an mga mag-upay nga mga panan-awon nga aada nakikita ha aton mga lugar. Aton atamanon, timangnuon ngan ipadayon an kalimpyo han aton kalibungan, kadagatan ngan kagurangan. paghatag hin respeto ngadto han mga tawo nga naghahatag han ira mga istorya tikang han mga butang nga ira naekperyensiyan, nakit-an ngan nanhibati-an. Damo nga Salamat!"],titleEn:"The Kandiwata Rock",questions:[{q:"What do people say the Kandiwata rock once was?",options:["A big ship","A tall mountain","A lost house"],answer:0},{q:"What lesson does the story teach?",options:["Ignore old stories","Care for beautiful places and respect local stories","Never visit the sea"],answer:1}]},{id:"bloom-an-bukad-ha-libong-ni-apoy-garing",title:"AN BUKAD HA LIBONG NI APOY GARING",source:"Bloom",license:"cc-by-nc-sa",paras:["Hi apoy Garing usa nga mahilig magtinanon bukad pero diri gud hiya gintutudkan hin mga tanom nga nabukad labot la ha usa nga tanom ini an tanom nga nabukad hin rosa.",'Pirmi ni apoy Garing gindadayaw ngan gintitimangno an iya bukad nga rosa. "Ikaw an bukad nga akon ginhihigugma kay ikaw la an tumurok han akon gin tanom ngan an kolor mo nga pula amo an akon paburito."',"Usa ka gab-i, gin kuha han usa nga ulitawo an iya tanom nga rosa. Pagkaaga pagkita ni apoy Garing ha iya libong waray na an iya minayuyo nga rosa. Naging masinalub-on hi apoy Garing kay nawara an iya tanom nga rosa.","Gin dara han ulitawo an tanom ni apoy Garing nga rosa ngadto han libong han iya gin gagarbohan.","Pagkaaga nalipay an daraga han iya nakita kay may usa nga tanom nga mahusay pagkinitaon. Iya gin daop ngan gin obserbahan. Na hunahunaan niya nga waray hiya tanom sugad hini kamahusay.",'Nahibaroan han enkantada nga alibangbang an nahinabo ngan nalooy ini kan apoy Garing. Lumupad an enkantada nga alibangbang kan apoy Garing kamot ngan nagsiring "Apoy Garing nakita ko an imo kabidoan han kawara han imo tanom nga rosa, yana an imo mga kamot tatagan kon bendisyon para bisan man ano nga tanom maturok kon ikaw an magtanom."',"Nalipay gud hi apoy Garing han gisiring han enkantada nga alibangbang ngan nagpasalamat sanglit kumadto dayon hiya ha iya libong ngan nagbungkag han tuna para han tatanoman nga mga tanom.","Ngan mga pira ka adlaw nanubo an mga tanom ni apoy Garing nga nakita niya an magka iba-iba nga bukad nga maghusay.",'Ginkadto han enkantada nga alibangbang an ulitawo ngan an daraga ngan nagsiring "ulitawo diri maupay an imo gin buhat, kay ano ginkuha mo an tanom nga rosa ni apoy Garing?"','Nangaro hin pasaylo an ulitawo han enkantada nga alibangbang. "Pasayloa ako han akon nabuhat kay tungod ginhigugma ko an akon gingagarbohan kay mahilig hiya hin mahusay nga bukad sanglit ginkuha ko an tanom nga rosa ni apoy Garing". Bumaton an enkantada nga alibangbang "pangaro pasaylo kan apoy Garing han imo gin buhat kay kon diri ako an maghahatag ha imo hin sirot ha imo".','Nagtangis an daraga ngaha atubangan han nangunguyab ha iya tungod han ginbuhat hini. "Pangaro pasaylo kan apoy Garing han imo ginbuhat." An siring han daraga kan Lindo. "Oo mangangaro ako pasaylo. Pasayloa liwat ako han akon nabuhat" an baton ni han ulitawo ha iya gingagarbohan. Kumadto dayon hira kan apoy Garing para mangaro han kapasayloanan.','Han nakadto na hira kan apoy Garing libong nangaro hira hin kapasayloanan. "Pasayloa ako apoy Garing han akon ginbuhat" an siring han ulitawo. "Okey la intoy maupay kay nag amin ka han imo ginbuhat. Malipayon ako yana kay may ada na ako bago na mga tanom nga nabukad hin rosa ngan iba pa nga mga bukad". An baton ni apoy Garing.',"Waray hi apoy Garing mag-isog kundi naging malipayon pa hiya han may ada hiya yana. Gintagan pa niya ulitawo ngan an daraga hin mga taramnon. Tikang hadto naging magsuok hira nga magsarangkay ngan nananom hira hin mga iba-iba nga mga bukad sanglit naging maupay ngan mahusay an ira barangay."],titleEn:"Apoy Garing's Flower",questions:[{q:"What happened to Apoy Garing's rose plant?",options:["A young man took it","It died in the rain","A bird ate it"],answer:0},{q:"What blessing did the enchanted butterfly give Apoy Garing?",options:["She could fly","Any plant she planted would grow","She would find gold"],answer:1}]},{id:"bloom-an-malipayon-na-paragsudoy",title:"AN MALIPAYON NA PARAGSUDOY",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa nga malipayon nga tawo hi Pedro.","Pirmi hiya nauli nga may dara nga pagkaon para ha iya pamilya.","Nagmamata hiya hin timprano para mag baligya.","Madali nga nauubos an iya mga baligya kay damo an napalit.","Usa ka adlaw naging masulob-on hi Pedro kay waray napalit han iya tinda.","Kulang na tawo an bungto tungod han pandemya (Covid 19)","Umuli hi Pedro nga masulob-on. Nawawarayan na hiya pag laom.","Nangadi hi Pedro, nga konta mawara na ini nga pandemya.","Paglabay hin usa ka tuig gin balita ha TELEVISION nga may ada na bulong an sakit nga Covid.","Nag lipay hi Pedro han iya nabatian han anunsiyo. Naglipay liwat an iya pamilya."],titleEn:"The Happy Vendor",questions:[{q:"Why did Pedro become sad?",options:["No one bought his goods","He lost his house","His family left town"],answer:0},{q:"What made Pedro and his family happy again?",options:["They moved to another town","They heard there was medicine for Covid","They found a new boat"],answer:1}]},{id:"bloom-pagtimangno-hin-panlawas",title:"Pagtimangno hin Panlawas",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa ka adlaw samtang nagmumulay hi Potpot. Nakabati hiya han tunog han budgyong. \u201Ceeeeennnngggg eeennngggg\u201D tunog han budgyong \u201CGinpapasabot nga gindidiri an paggawas han mga kabataan ngan pagsalin-urog hin bisan anu nga katitirok,\u201D pag imporma han tanod.","Laksi nga dumalagan hi Potpot pag uli ha ira balay. \u201CNanay, siring han tanod diri na puwede gumawas an kabataan ngan an pagkatitirok,\u201D sumat ni Potpot kan iya nanay. \u201CUu, kay mahitungod ito hit nakalat yana nga sakit, \u201D siring ni nanay.",'Nanhunahuna hi Potpot ngan masulub-on nga sumiring. \u201CDiri na kami makakag-uyas hit ak kasangkayan, ngan diri kami makaka eskwela.\u201D "Makaka eskwela kamu pero dinhi la kamu ha balay," siring han nanay. "An aton angay buhaton atamani naton an aton kalugaringon nga diri kita matapnan hin sakit," dugang nga siring ni nanay.',"\u201CPara malikayan ito nga sakit kinahanglan kita sumunod hit mga ginpapatuman na mga protocol ha panlawas,\u201D dugang nga siring ni nanay. \u201CAnu it kinahanglan buhaton nay?\u201D pakiana ni Potpot. Gin usa-usa ni nanay an angay buhaton. \u201CAgsob ngan kaangayan nga paghugas han mga kamot gamit an sabon,\u201D baton ni nanay.",`"Pagtakop han baba ngan irong gamit an panyo, kun waray panyo puydi lwt an pako' han bado,ngan paharayo ha mga katawhan kun maubo" siring ni nanay. "Pagmantene liwat hin malibsog nga kalawasan, pinaagi hin pagtumar bitamina ngan pagkaon nga masustansya," dugang nga siring ni nanay.`,"\u201CPaunano kita makakapalit hit makakaon naton nay?\u201D pakiana ni Potpot. \u201CAyaw kabaraka manhahatag hira hin ayuda, ngan may ada kita mga tanom nga utanon ha at libong nga puwede naton maluto,\u201D baton ni nanay","\u201CTatagan ko hira Maya ngan Aloy han aton mga utanon,\u201D malipayon nga siring ni Potpot. \u201CUu, manhahatag kita ha aton mga hiripid,\u201D nalilipay nga baton ni nanay.","Tikang hadto ginhimo nga pamatasan han pamilya ni Potpot an agsob ngan isakto nga paghugas han kamot ngan pagsugot ha mga protocol panlawas para makalikay ha mga nakakatapon nga sakit."],titleEn:"Taking Care of Health",questions:[{q:"Why were children told not to go outside or gather together?",options:["Because of a spreading sickness","Because of a storm","Because school was over"],answer:0},{q:"What did Potpot's family start doing regularly?",options:["Selling vegetables","Washing hands and following health rules","Traveling to other towns"],answer:1}]},{id:"bloom-an-banog-ha-bukid-huraw",title:"AN BANOG HA BUKID HURAW",source:"Bloom",license:"cc-by-nc-sa",paras:["Malipayon nga naglilinupad-lupad hi Banog ha kagugub-an.","Nakita niya an hitaas nga Bukid Huraw.",'Nagsiring hiya. "Bukid Huraw kaya ko lumupad ngan labwan an im kahitaas!"',"Gin andam niya an iya kalugaringon para paglupad.","Han iya paglupad, tigda may umabot nga bagyo.",'"Kaya ko ini! kaya ko ini!" An siring ni Banog ha iya kalugaringon. "Wusssssss...". An tunog han makusog nga hangin nga natapo kan Banog han iya paglupad.',"Han kakusog han hangin waray kayaha ni banog nga makalampas ha kahitaas han Bukid Huraw ngan nahulog hiya ha mga puno han kahoy.","Napiolan hi Banog han iya kahulog.",'Nagsiring hi Banog ha iya kalugaringon, "diri ko na pipiriton tak kalugaringon kon diri ko kaya para diri ako mahingadto ha karat-an".',"Ngan tikang hadto naging malipayon nala hi Banog maglinupad-lupad palibot han Budik Huraw."],titleEn:"Banog and Mount Huraw",questions:[{q:"What did Banog try to do?",options:["Fly higher than Mount Huraw","Build a nest on Mount Huraw","Hide from the storm"],answer:0},{q:"What did Banog learn after falling?",options:["Never fly again","Not to force himself when he cannot do something","Mountains are easy to beat"],answer:1}]},{id:"bloom-hi-kaha-kahon",title:"Hi Kaha, Kahon",source:"Bloom",license:"cc-by-nc-sa",paras:["Umandar na an bus nga ginsasakyan ni Kaha. \u201CKamalipog man hini nga akon pagbiyahe\u201D, reklamo ni Kaha. Sapit niya an dako nga sako han mga utanon ngan malangsa nga balde han isda.",'Usa\u2026 duha\u2026 tulo\u2026 tulo ka oras nga pagbay-og an gin-abat ni Kaha. Natapos gihap an iya beyahe. "Yeheey! Makakagawas na ako hini nga lugar", malipayon nga siring ni Kaha.','"Kamakaluluoy ko man kitaon", masulob-on nga siring ni Kaha. Brown an iya kolor nga may gudti nga mga luho ha ligid niya. Pinaagi han dulaw nga higot, nasisirahan an tapotapohon nga iya abrihan.',"Dalidali hiya nga ginkuha han iya agaron ha iya kinamumutangan. Ginkaptan an dulaw nga higot nga ginhigot ha iya. Nahipausa hiya han iya nakita-an. \u201CWow! kamaupay man hini nga lugar.\u201D, nalilipay nga siring ni Kaha.","Dagko ngan higtaas nga bilding an aada ha iya atubangan. Iba ini ha iya gintikangan nga simple nga balay. Haros usa ka barangay an kahiluag hini ngan baga hin maabot na ngadto ha langit ha subra hin kahitaas.",'Ginbutang hiya han iya agaron ha pushcart ngan ginsulod hiya ha maanyag nga bilding. Puno hiya hin ginhamis nga mga bagol hin lubi. "Oy tigda nga umabri an purtahan!", nahipausa nga siring ni Kaha.',"Nakita niya an mainggat nga salog. Makaruruyag pagkit-on an iba-iba nga klase hin mga light. Iba-iba nga kolor han mga butang an iya nakikita ha kada estante nga ira gin-aagian.",`"Kadadamo man hin tawo ha palibot', yakan ni Kaha. "Siguro kay mahagkot ini nga lugar". "Makikita ha ira nawong an kalipay ha pamamasyada, pagkaon ngan pamamalit", hunahuna ni Kaha.`,"Ginbutang hiya sulod hin usa nga tindahan. Puno ini hin mag-upay nga mga pandekorasyon. Nakita niya nga gintagan hin kwarta an iya agaron kabalyo ha iya ngan lumakat na. Nasubo hi Kaha. \u201CKay ano ako ginbayaan han akon agaron?\u201D, nahihingatangis nga siring ni Kaha. \u201CTungod ba kay luma na ako?\u201D. \u201CWaray nagud ada ako pulos ha iya\u201D, tangis ni Kaha.",'Nabatian hiya ni basurahan. \u201CDiri ito ungod sangkay. Tanan kita may ada mga pulos dinhi ha tuna", isplikar ni Basurahan. \u201CDiri karuyag signgon nga waray ka na pulos kun ginbayaan ka man han imo agaron ".','\u201CKitaa daw ako. Malipayon ako kay maaram ako nga dako it akon nahibubulig ha kalibungan", dugang nga siring ni Basurahan. \u201CGinbubutang ha amon an mga maghugaw nga mga butang para diri magin mahugaw an kalibungan."','\u201CTama hi Basurahan. Kami gihapon imbis nga iglabog aadi kami para magamitan pa\u201D, an siring han mga bagol hin lubi. "Ginhihimo kami nga pandekorasyon ha bahay, uyagan ngan puydi liwat mahimo nga garamiton ha pagluto.\u201D',"Waray pag-iha, umabot an anak han tag-iya han tindahan. Ginkuha an iya sulod ngan gintrapohan. \u201CKailangan ko ikaw kay waray ako nasusudlan hin mga gudtiay nga pantinda\u201D, siring han bata.",'Ginputos hiya hin malimpyo ngan bukadbukaron nga papel. May ada pa ginbutang nga pula nga ribbon ha bawbaw han iya takop. Nakita niya an iya kalugaringon ha espiho ha tindahan. "Kamakaruruyag kitaon it akon kalugaringon", nalilipay nga siring ni Kaha.','Tikang hadto, natood na hi Kaha nga tanan nga butang may ada pulos. Gin-apresyar niya an iya kalugaringon kay diri na hiya makalolooy kitaon ngan diri pa hiya makakahugaw ha kalibungan. "Damo nga salamat han maduruto ngan maabilidad nga bata", malipayon nga siring ni Kaha.'],titleEn:"Kaha the Box",questions:[{q:"Why was Kaha sad in the store?",options:["She thought her owner had left her because she was useless","She wanted to ride the bus again","She lost her ribbon"],answer:0},{q:"How did Kaha learn she still had value?",options:["A child reused her for small items","She became a trash can","She went back to the farm"],answer:0}]},{id:"bloom-an-suok-nga-magsangkay",title:"An Suok nga Magsangkay",source:"Bloom",license:"cc-by-nc-sa",paras:["Magsangkay hi Ela ngan hi Mila. Tungod kay mag anyaw man hira. Suok gud kaupay hira nga magsangkay.","Ha ira pag eskwela magsapit gud hira. An ira mga maestra gindadayaw hira. Ha klase pirmi hira nangunguna.","Mga buruhaton ha balay waray kabudlay. Kay hira nga duha nagbibinuligay. Mga kag-anak nira waray problema.","Bisan ha ira pagpahuway. Pirmi hira nag-iinatubangay. Pangandoy nira dungan nga mapa-uswag.","May nahitabo ha ira kamagsangkay. Hira nagkabulag. Nag usaan nala hi Ela.","Nahingadto hi Mila ha hirayo nga dapit. Hiya nakasala ha ira kamagsangkay. Gin-raut niya Ela ha iba.","Ginpinsar ni Ela an panhitabo. Kada gab-i hiya nagtatangis. Ug hi Ela nagkasakit.","Pirmi naghuna-huna hi Ela kan Mila. Ginhuhulat niya pirmi an pag-abot niya. Iya karawaton nga sakay gihapon.","Nahibaro hi Mila han nahitabo. Nga nasakit an suok niya nga sangkay. Dali-dali nga bumalik hi Mila.","Nagkita gihapon an magsangkay. Ginpasaylo ni Ela hi Mila. Ngan nagpabilin an ira suok nga kamagsangkay."]},{id:"bloom-an-bata-nga-mahilig-hin-dolce",title:"An Bata nga Mahilig hin Dolce",source:"Bloom",license:"cc-by-nc-sa",paras:["Hi Ynah in usa nga bata nga babayi. Gutiay ngan matambok. Ayon niya it mga pagkaon nga magtam-is sugad hit cake, ice cream, tsukolate, softdrinks, lollipop, labi na gud it mga dolce.",'Kun nalakat na ngani it iya Tatay ngan Nanay para magtrabaho pirmi gud hiya naaro hin singko. "Aanhun mo na liwat it kwarta Ynah?" pakiana ha iya ni Tatay.','May ada la po ako papaliton ha tindahan Nay, Tay! siring ni Ynah. "Upaya naman nga diri dolce tim paliton, mas maupay kun tinapay nala anak!" siring han iya nanay.',"Dumiritso hiya daun ha tindahan. Pumalit hiya hin iba-iba nga klase hin dolce, waray hiya bumali han siring ni iya Nanay nga tinapay nala it paliton imbis nga dolce.",'"Maupay nala nga waray kumita hi Nanay nak mga ginpamalit sigurado gud nga pagbubusa-an niya ako!" siring ni Ynah ha iya kalugaringon. Nakakita an iya kuya han iya ginbuhat salit ginsidngan hiya "Upaya la nga la nga diri naman magsinakit it imo ngipon Ynah!" siring han iya kuya.',"Pagkagab-i maupay na an ira pangaturog.",'"Kakaunon ka namon, bisan ka diin magtago, mabibilngan ka la gihap namon rawrrrrrrrr". yakan han mga higante nga dolce. "Ayawwwww!" yakan ni Ynah nga sige it pagdinalagan.','Tigda nga nakagmata hi Ynah, nahangos ngan nakagtuok. "Hin o dawla adi nga nagtitinuok?" siring han iya Nanay. Gumawas hiya han ira kwarto para bilngon kun diin tikang an tuok.','"Naano ka Ynah? kay ano nagtitinuok ka man?" pakiana ha iya ni iya nanay. "Nay nag-inop ako nga ginlalanat ako hin higante nga mga dolce makaradlok!.....nay..... Nay, masakit nanaman tak ngipon huhuhu"....sumat ni Ynah "Waray udog ako tuod kinana nga tinapay nala it palita siring nimo, mga dolce na liwat nak ginkaon kanina. Tikang yana matuod na ako pirmi ha imo nga diri na magpinalit hin mga dolce." yakan pa ni Ynah.','"Hay naku anak, hinaot unta nga pirmi kana manmamati tam mga sagdon ha imo". yakan ni iya nanay. Tikang hadto nga panhitabo, pirmi na hiya nag-totooth brush kada kakahuman niya pagkaon.']},{id:"bloom-mga-kamot-ni-lotlot",title:"Mga Kamot ni Lotlot",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa ka Sabado, nagsarit hi Lotlot kan iya Nanay Lila nga makikimulay hiya ha ira libong Nanay, human na ako manilhig. Pwede ba ako magmulay ha gawas?\u201D pakiana ni Lotlot Oo sige, basta paghirot ikaw ha.\u201D, yakan ni Nanay Lila \u201COpo, nanay.\u201D, baton ni Lotlot.","Marisyo hi Lotlot nga nagmulay ha gawas han ira balay Naghimo hiya hin iba iba nga porma gamit an lagay","Gintawag na hi Lotlot ni iya nanay para mangaon. \u201CLotlot, pakadi na pag meryenda na. Sano ka kumaon, paghinaw anay hit imo kamot ha.\u201D, tugon ni Nanay Lila. Tungod nga guol man hi Lotlot Nahubya hiya paghunaw ngan kumaon dayon hiya hin baduya nga saging","Pagkagab-i nagsakit an tiyan ni Lotlot. \u201CNanay, masakit it akon tiyan.\u201D, nagtutuok nga sumat ni Lotlot. \u201CNaghunaw ka ba han imo kamot kanina pagkatapos mo magmulay ngan sano ka kumaon han baduya?\u201D, pakiana ni Nanay Lila. \u201CWaray po.\u201D, baton ni Lotlot","\u201CAsya nga nagsakit an imo tiyan. Kinahanglan nga permi kita maghuhunaw sano ngan katapos kumaon, katapos magmulay ngan katapos gumamit han kasilyas para malimpyo permi an aton mga kamot. Kumapot ka han baduya nabalhin an kagaw han imo mahugaw nga kamot ngadto han imo pagkaon asya an hinungdan han pagsakit han imo tiyan, Lotlot.\u201D siring ni Nanay Lila","Kumadto hira ha kusina, gintutduan ni Nanay Lila hi Lotlot han eksakto nga paagi han paghunaw. Gin banyosan ni Nanay Lila an tiyan ni Lotlot \u201CDamo nga salamat, Nanay. Tikang yana, pirmi na ako maghuhunaw hit akon mga kamot.\u201D malipayon nga baton ni Lotlot"]},{id:"bloom-an-misay-ni-tisay",title:"An Misay ni Tisay",source:"Bloom",license:"cc-by-nc",paras:["An misay. Alaga ni Tisay.","Busag an misay. Malimpyo an misay.","Ginpapakaun ni Tisay, an iya misay.","Pag nakaturog hi Tisay, nasapit an misay.","Gamit ni Tisay, ginkutkot han yatot.","Nakit-an han misay. Iya ini ginhagad.","Naghulat an misay. Magbabantay kan Tisay.","Ginhigugma ni Tisay, an iya misay."]},{id:"bloom-an-baluto",title:"An Baluto",source:"Bloom",license:"cc-by-nc-sa",paras:['Usa ka adlaw naglalakat hi Mano Boboy ngan Jose tipakadto ha tabi han dagat."Tatay unta damo it aton madakop nga isda yana para damo niyan an sulod han aton baluto". Unta, baton ni Mano Boboy kan Jose.',"Pag-abot nira ha tabi han dagat gin-andam na nira an ira baluto. Ngan nagtikang na pagbugsay hi Mano Boboy.",'"Tatay, kaupay man ngayan pagsinakay hin baluto hano", siring ni Jose. "Oo naman asay pa kun maupay an panahon", baton ni Mano Boboy.','Pag-abot nira ha butnga han dagat. "Jose i-andam na an pukot kay itutunod ta na",siring ni Mano Boboy. "Opo, sigi tatay", baton ni Jose.','Ha di maiha nga oras ginbuligan ni Mano Boboy ngan Jose pag-alsaha an pukot. Nahipausa hira pagkita nga dadamo an sulod nga isda. "Hala tatay, kadadamo man han aton dakop yana! Damo an aton mahisasakay ha aton baluto". Yehey! Yakan nga malipayon ni Boboy.',"Malipayon ngan mahiyum-hiyom hi Mano Boboy ngan Jose samtang nagbubugsay hira han ira baluto tipauli ngadto han ira balay."]},{id:"bloom-waray-na-kakit-i",title:"Waray na kakit-i",source:"Bloom",license:"cc-by-nc-sa",paras:['Han una nga panahon,an aton kagugub an damo an mga kahayupan nga naukoy ngan damo liwat an mga kakahuyan. Napupuno hin kanta hin katamsihan an bug-os nga kagugub an. Maupay hin duro ini nga lugar. "kamalipayon ko nanay nga dinhi kita ha kagugub an naukoy" siring ni tamsi Pikoy kan iya nanay, nagtawa la hi iya nanay ha iya.','An mga iba-iba nga tamsi nagsisibu-sibuay sanglit nagsaway hi iya nanay"bangin kamo madisgrasya hinay-hinay la kamo hit iyu pag-uyag pikoy"siring ni iya nanay, "opo nanay pikoy", baton han anak',"Usa ka adlaw lumakat hira nanay Pikoy kaupod an iya mga anak ug an iba pa nga tamsi para mamiling hin pagkaon. Lumupad hira, kumadto hira ha harayo nga lugar.","Samtang waray hira nanay Pikoy ngan an iba pa nga tamsi umabot an tag iya han tuna ngan pinanmulod nira tanan nga mga kahoy,waray mag iha nawara na an tanan nga kakahuyan.",'Han umabot na hira Pikoy ngan an iba pa nga katamsihan waray na hira balay,waray na liwat an mga kakahuyan,diri na maupay an kagugub an."nanay Pikoy waray na kita uukyan"nahingatangis nga yakan ni tamsi Pikoy, "maghihimo nala kita hin bag o naton nga mauukyan" baton ni nanay Pikoy.',"Naghimo nala hira hin ira mga urukyan nga malay-balay kay waray naman an kagugub an, waray na an mga kahayupan nga nan-ngungukoy nganhi,ngan an damo nga kakakahuyan. Sanglit kamo nga mga bata ayaw niyu pasagdi it aton kagugub-an, pagtanom kamo hin mga kahoy para mayda maukyan an katamsihan."]},{id:"bloom-an-sista-ni-tatay",title:"An Sista Ni Tatay",source:"Bloom",license:"cc-by-nc-sa",paras:['May ada sista hi Tatay. Pinalit ini ni Nanay. "Maupay man ini nga sista", siring ni tatay. Bumaton hi nanay, "Oo, para may ada naton kaliawan".',"Makarit hi tatay magsista. Karuyag ko mamati samtang hiya nagsisista.",'Nagkakanta hi nanay kun nagsisista hi tatay. "Kamaupay ni nanay kumanta", yakan ni ate.',"Nagsasarayaw kami nga mga anak, samtang nagsisista hi tatay ngan nagkakanta hi nanay.","Malipayon an amon pamilya tungod han sista. KATAPUSAN."]},{id:"bloom-an-panapuan-kan-elay",title:"An Panapuan kan Elay",source:"Bloom",license:"cc-by-nc-sa",paras:['Usa ka adlaw, nahimangno hi Elay han karasikas han iya Nanay Maya ha Kusina. "Buhat na dida Elay kay malakat ako" siring han iya Nanay.',"Katima magtima han iya hinigdaan, namahaw hi Elay dungan han iya nanay.",'"Ayaw pagpinasarang dinhi kay malakat ako" pahinumdom ni Nanay. "Oo nanay" baton ni Elay. "An akon panapuan ha?" mahiyum-hiyom nga yakan ni Elay. Naruruyag gud hiya nga an iya paborito an pirmi panapuan ha iya ni iya nanay.','Katapos mo pamahaw panhugas han imo kinaunan ngan pag-alog hin tubig ha? tugon ni Nanay Maya. "Oo, nanay" baton ni Elay.','Kahuman pamahaw ni Elay, gumawas hiya ngan nag-uyag kaupod an iya sangkay. "Niyan nala ako manhihimos ngan mag-aalog kahuman mag-uyag" pinsar ni Elay',"Naliaw hi Elay samtang nag-uuyag. Nahingalimot hiya han tugon ni iya Nanay.",'"Elay, Elay, adi na ako!" tawag ni Nanay Maya. "Halaka! ade na hi Nanay, waray pa ako maghimos ngan mag-alog" nababaraka nga pinsar ni Elay.','Dali-dali nga umuli hi Elay ha ira balay. "Nanay, pasaylua ako. Nahingalimot ako paghimo han imo tugon ha akon kay nag-uyag ako" nagbabasol nga yakan ni Elay. "Halas ige, sunod trabahua anay an akon tugon ha san-o ka mag-uyag. Adi na an imo panapuan ihahatag ko ha imo katapos mo sumugot" yakan ni Nanay Maya.','Malipayon nga nag-himos ngan nag-alog hi Elay. "Diri na ako mautro sunod" Pinsar ni Elay. "Susugton ko anay an iya tugon san-o ako mag-uyag kay gintatagan ako niya han akon pabotiro nga pasalubong".','Kahuman niya maghimos ngan mag-alog malipayon nga ginhatag ha iya ni Nanay Maya an iya paborito nga mani ngan pinyato nga tikang ha Buray. "Hmmmmm.. marasa gud it mani ngan pinyato nga tikang ha buray" siring ni Elay.','"Salamat, Nanay. Sunod masugot anay ako hit imo tugon san-o ako mag-uyag" siring ni Elay.']},{id:"bloom-an-maduruto-nga-parapangisda",title:"An Maduruto nga Parapangisda",source:"Bloom",license:"cc-by-nc-sa",paras:["Ha usa nga bungto han Paranas hirani han dagat may naukoy usa nga pamilya. Ha usa nga simple nga balay malipayon nga nagkakaurusa hira Nanay Ondit, Tatay Omi ngan an ira mga anak.","Pangisda an siyahan nga pangabuhi ni Tatay Omi. Tungod kay waray man hiya makatapos han pag iskoyla.","Maadlaw man o mauran. Mamadlos ngan makusog man it balod nagikan la gihap pakadto ha dagat hi Tatay Omi para magbiling hin ira kakaunon ngan magkaada kwarta.",'Usa ka adlaw, malain an kaoras han panahon. "Omi, ayaw la anay pagkadto ha dagat kay diri maupay it panahon", siring ni Nanay Ondit. "Kon diri ngani ako gumikan waray kita igsusura ngan kakaunon niyan. Waray liwat kita igpapalit gamit kanan pag iskoyla hit kabataan" , baton ni Tatay Omi .','"Sigi, basta paghirot la pirmi ngan ayaw na pagkadto hit kalalawdan",tugon ni nanay Ondit. "Oo, ayaw kabaraka kay pirmi ko gin-aampo nga bantayan kita hit makagarahom nga Diyos", baton ni Tatay Omi.',"Nagtima hi Tatay Omi han iya mga gamit pangisda. Nangudos hiya san-o lumakat pakadto ha dagat.","Kada adlaw amo pirmi ito it kan Tatay Omi ginbubuhat. Kun diri ngani hiya nakakagikan ngadto ha dagat, nabulig hiya ha mga trabahuon ha balay ngan naghuhukot han pukot.","Umabot an damo nga kakurian ngan kawaray kwarta. Pero padayon la gihap hiya han pangisda kay natuod hiya nga makakatalwas hira hit mga kakurian.","Naglabay an mga panahon naging maupay an kabutang han pamilya ni Tatay Omi. Nakatapos pag-iskoyla an iya mga anak ngan may ada na mga trabaho pinaagi han iya paningkamot han pangisda.",'"Tatay, undang na hito nga pagdagat. Kami naman it magtitimangno ha iyo kay may ada naman kami trabaho", pulong ni Andy kan iya tatay. "Sigi la, anak. Samtang kaya pa tak lawas mangingisda la gihap ako kay diri man pirmi it panahon nga may ada kita", baton ni Tatay Omi ha iya anak.','"Damo nga salamat tatay han imo waray kaguol nga pagtimangno ha amon, dugang nga pulong ni Andy kan iya tatay. "Waray sapayan, anak. Obligasyon ito namon nga mga kag-anak. An makagarahom nga Diyos an angay naton pasalamatan ha tanan nga grasya nga iya ginhahatag ha aton," baton ni Tatay Omi.',"Masisiring nga usa nga mahigugmaon nga tatay ngan maduruto nga parapangisda hi Tatay Omi. Apisar han mga kakurian padayon nga naato ha mga problima nga naulpot ha kinabuhi."]},{id:"bloom-ang-kusog-han-gugma-ha-murayaw-nga-edad",title:"Ang Kusog han Gugma ha Murayaw nga Edad",source:"Bloom",license:"cc-by",paras:["Ha usa nga hilumon ngan mahayag nga baryo ha probinsya han Samar, nakatira hi Marites usa nga disi-sais anyos nga babaye nga puno hin damgo ngan paglaum. An ira balay ginbubuhat la tikang ha kahoy ngan yero, pero puno ini hin gugma ngan pagtinabangay.","Hi Marites kilala ha ira eskwelahan sugad nga usa nga matinalahuron, matinumanon, ngan maalam nga estudyante. Pirme hiya nag-aambit ha klase, ngan ginpapabilhan han iya mga maestro an iya kakugi. \u201CDiri gud ako matitimbang,\u201D siring niya ha iya kalugaringon, \u201Ckay para ini ha akon pamilya ngan ha akon tidaraon.\u201D An iya pinakadako nga damgo amo an magin maestra.","Pero ha luyo han iya kalipay, mayda maabot nga pagsulay. Nakilala niya hi Carlo usa nga lalaki nga mas tigulang ha iya. Malambing hi Carlo, ngan pirme hiya naghahatag hin atensyon. Ha murayaw nga edad ngan kakulangan hin eksperyensya, naging duok hira.","Paglabay hin pipira ka semana, napansin niya nga nag-iiba an iya lawas. Nakuratan hiya burod hiya. An iya kalibutan sugad hin nabungkag. Damo nga gab-i an iya ginugol ha pag-ukoy ngan pagtinaluha.","Tubtob nga usa ka gab-i, nagsumat hiya ha iya nanay. \u201CNanay\u2026 burod ako.\u201D Nag-iyakan hira duha. Nasakitan an iya nanay, diri la tungod han nahitabo, kundi tungod han kahadlok para ha tidaraon han iya anak. Tungod han kaulaw, gin-undang anay ni Marites an iya pag-eskwela.","Pero ha kada adlaw nga naglabay, ginbabatian niya an lihok han bata ha iya tiyan. \u201CAn akon anak\u2026 diri ko hiya pababayaan,\u201D siring niya. Han adlaw han iya pagpanganak, gin-agian niya an duro nga kasakit. Pero han iya nakita an iya anak, usa nga matahum nga batang lalaki. Pinangaranan niya ini nga hi Joshua.","\u201CMarites,\u201D siring han iya nanay, \u201Cdiri pa huli an tanan. Pwede ka pa bumalik ha eskwelahan.\u201D Tungod han suporta, nagdesisyon hiya nga magpadayon. Diri ini masayon. Adlaw-adlaw, ginbubuhat niya an iya pinakamaopay. Usahay ginbibitbit niya hi Joshua kon waray magbantay. Ha gab-i, nag-aaral hiya bisan kapoy na gud.","Naglabay an mga tuig, ngan padayon hiya nga naningkamot. Tubtob nga nakaabot hiya ha iya graduation. Ha entablado, samtang gin-aabot niya an iya diploma, nabati niya an kusog nga palakpak. Waray hiya kapugong han iya luha. \u201CNatuman ko gud,\u201D siring niya ha iya kalugaringon.","Pagkahuman, nakatrabaho hiya sugad nga maestra ha ira baryo. Damo nga kabataan an iya natutdoan, ngan gin-inspirar niya ini pinaagi han iya istorya. Usa ka adlaw, nagpakiana an usa niya nga estudyante, \u201CMa\u2019am, paonan-o kamo nagin kusog?\u201D Nagngiti hi Marites ngan siniring, \u201CAn kusog diri tikang ha edad. Tikang ini ha gugma ngan determinasyon.\u201D","Ha gab-i, samtang nagkakaon hira ni Joshua, ginyakap hiya han bata. \u201CNanay, proud ako ha imo.\u201D Naluha hi Marites ngan ginyakap ini hin mahugot. \u201CMas proud ako ha imo, anak. Ikaw an akon kusog.\u201D"]}],xt={nga:"connects modifiers and nouns, and between clauses.",an:"the (completed / past)",han:"of / the (past object)",ha:"to / at / in",mga:"plural marker (the \u2026s)",hin:"a / some (object)",it:"the (now / general)",na:"already",iya:"his / hers",ngan:"and; plus.",waray:"speaker of Waray",hi:"the (before a name)",ini:"this (near)",pa:"still / yet",hiya:"he / she",ug:"and; plus.",kay:"because; for a reason; than.",ni:"of / by (before a name)",ako:"I",diri:"not; no; negative.",may:"indicates presence, or place",ba:"makes a yes/no question",hira:"they",imo:"yours / your",ira:"theirs",para:"for;",liwat:"also / too",ginoo:"Lord",akon:"mine / my",usa:"one",niya:"his / her",away:"quarrel; fight 2 to quarrel with; to",kan:"to / for (before a name)",kun:"if; when.",ano:"what",iton:"that (near you)",tawo:"person/human.",duro:"excessive; radical; extreme; intense;",didto:"there (far)",bata:"child 2 bathrobe 3 uncle. 1",ko:"my (short)",nanay:"mother.",adlaw:"day;sun." umusta\u201D?",detail:"We teach \u201Ckamusta\u201D. Minor, but worth getting right for the very first greeting."},{id:"kagugub-an",topic:"Reader \xB7 register",q:"Is \u201Ckagugub-an\u201D (forest) literary/\u201Cdeep Waray\u201D, with \u201Ckagurangan\u201D the everyday Samar word?",detail:"Appears in the Bloom story \u201CAn Banog ha Bukid Huraw\u201D. We want beginners learning the common form."},{id:"bfc-stories",topic:"Reader \xB7 correction set",q:"Correct the 7 Bible-for-Children stories from dialectal to standard Waray.",detail:"Machine-translated, came out dialectal (san\u2192han, sira\u2192hira, aron, kumila\u2026). Pulled from the Read tab until fixed. Full list + guesses in docs/ella-todo-bfc-correction.md."},{id:"samar-variants",topic:"Dialect \xB7 confirm variants",q:"Confirm the Samar/Daram everyday forms we're assuming.",detail:"di (for diri), sin (for hin), mayda (= may ada / there is), wara (= waray), gihap (= gihapon). Are these how you'd actually say them in Daram?"},{id:"p2-kila",topic:"Challenger \xB7 vocabulary (Phase 2)",q:"Is \u201Ckila\u201D the right Daram word for \u201Cmeet/get to know\u201D?",detail:"Gemini taught it via \u201Cmakakila\u201D (to get to know someone). Is the bare root \u201Ckila\u201D natural, or should we teach a different form? Unit 6."},{id:"p2-brayong",topic:"Challenger \xB7 vocabulary (Phase 2)",q:"Is \u201Cbrayong\u201D the everyday Daram word for the coconut-midrib yard broom?",detail:"Tagalog calls it \u201Cwalis tingting\u201D. Is \u201Cbrayong\u201D real Samar Waray, or is it \u201Csilhig\u201D/something else? Unit 7."},{id:"p2-kamapas",topic:"Challenger \xB7 vocabulary (Phase 2)",q:"Is \u201Ckamapas\u201D a real Waray word for the humid, sticky coastal heat?",detail:"Gemini glossed it \u201Chumid\u201D, distinct from \u201Cmapaso\u201D (hot). Confirm it exists and isn't a near-duplicate of mapaso. Unit 9."},{id:"p2-masyado",topic:"Challenger \xB7 register (Phase 2)",q:"For \u201Cvery/too much\u201D, do people in Daram say \u201Cmasyado\u201D, or is there a more native Waray word?",detail:"\u201Cmasyado\u201D is a Tagalog/Spanish-flavored loan. Is there a Waray intensifier (e.g. \u201Csobra\u201D, \u201Cduro\u201D) we should teach instead/alongside? Unit 9."},{id:"p2-inflected-lemmas",topic:"Challenger \xB7 forms (Phase 2)",q:"Are \u201Cnalipay\u201D (glad) and \u201Cumuuran\u201D (raining) the right forms to drill as standalone cards?",detail:"These are inflected (nalipay = was/am glad; umuuran = is raining), not bare roots (lipay / uran). Fine for a beginner phrasebook, or should we drill the roots and keep the inflected forms in sentences? Units 6 & 9."},{id:"p1-enclitic-agents",topic:"Challenger \xB7 pronouns (Phase 1)",q:"Are the enclitic (post-posed) agent pronouns we drill the natural Daram forms?",detail:"We teach ko (my/by me) and mo (your/by you) \u2014 those feel safe. Less sure about: na (his/her \u2014 standard Waray is 'niya'?), ta (our, inclusive), mi (our, exclusive \u2014 vs 'namon'?), niyo (your, plural), nira (their). These came from the AI Phase-1 redesign; please correct any that aren't what people say in Daram. Phase 1 units 4 & 7."},{id:"p1-time-words",topic:"Challenger \xB7 time words (Phase 1)",q:"Confirm the everyday Daram time words: udto, yana, adlaw, kahapon, buwas, san-o.",detail:"Glossed noon / now / day(today) / yesterday / tomorrow / when. Are these the natural spoken forms in Daram (e.g. is 'san-o' the everyday 'when', and 'kahapon' the usual 'yesterday')? Phase 1 unit 6."},{id:"c2-inlaw-terms",topic:"Challenger 2 \xB7 family (Phase 2)",q:"Confirm the extended-family / in-law terms: ugangan, bayaw, hipag, umangkon.",detail:"Glossed parent-in-law / brother-in-law / sister-in-law / niece-nephew. Also using kuya, ate (older brother/sister), lolo, lola (grandparents). Are these the everyday Daram terms? (from the expanded Challenger 2 build)"},{id:"c2-clock-numbers",topic:"Challenger 2 \xB7 telling time (Phase 2)",q:"For clock time, do people in Daram say Spanish numbers (alas sais, alas tres, alas singko) or native (unom, tulo, lima)?",detail:"Challenger 2 teaches native numbers 1-10 but the time unit uses 'alas + Spanish number' for the clock, which is common in the Philippines. Confirm what's natural in Daram so we teach one consistently."}];var v=Jt(Zt());var oi=Jt(Zt());var $u=a=>a.replace(/([a-z0-9])([A-Z])/g,"$1-$2").toLowerCase(),ni=(...a)=>a.filter((e,t,n)=>!!e&&n.indexOf(e)===t).join(" ");var Kn=Jt(Zt());var Yu={xmlns:"http://www.w3.org/2000/svg",width:24,height:24,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"};var Ju=(0,Kn.forwardRef)(({color:a="currentColor",size:e=24,strokeWidth:t=2,absoluteStrokeWidth:n,className:o="",children:r,iconNode:s,...l},u)=>(0,Kn.createElement)("svg",{ref:u,...Yu,width:e,height:e,stroke:a,strokeWidth:n?Number(t)*24/Number(e):t,className:ni("lucide",o),...l},[...s.map(([d,g])=>(0,Kn.createElement)(d,g)),...Array.isArray(r)?r:[r]]));var F=(a,e)=>{let t=(0,oi.forwardRef)(({className:n,...o},r)=>(0,oi.createElement)(Ju,{ref:r,iconNode:e,className:ni(`lucide-${$u(a)}`,n),...o}));return t.displayName=`${a}`,t};var Lt=F("ArrowLeft",[["path",{d:"m12 19-7-7 7-7",key:"1l729n"}],["path",{d:"M19 12H5",key:"x3x0zl"}]]);var be=F("BookOpen",[["path",{d:"M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z",key:"vv98re"}],["path",{d:"M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z",key:"1cyq3y"}]]);var ia=F("Check",[["path",{d:"M20 6 9 17l-5-5",key:"1gmf2c"}]]);var _n=F("ChevronLeft",[["path",{d:"m15 18-6-6 6-6",key:"1wnfg3"}]]);var ka=F("ChevronRight",[["path",{d:"m9 18 6-6-6-6",key:"mthhwq"}]]);var ve=F("CircleAlert",[["circle",{cx:"12",cy:"12",r:"10",key:"1mglay"}],["line",{x1:"12",x2:"12",y1:"8",y2:"12",key:"1pkeuh"}],["line",{x1:"12",x2:"12.01",y1:"16",y2:"16",key:"4dfq90"}]]);var Qe=F("Cloud",[["path",{d:"M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z",key:"p7xjir"}]]);var jn=F("Copy",[["rect",{width:"14",height:"14",x
