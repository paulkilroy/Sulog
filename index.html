h & belief",word:"simbahan",gloss:"church",prompt:"We go to church.",words:["simbahan","kami","ha"]},{unit:"u36",unitName:"Church & belief",word:"pastor",gloss:"pastor",prompt:"He is a pastor.",words:["pastor","hiya","hin"]},{unit:"u36",unitName:"Church & belief",word:"misyonaryo",gloss:"missionary",prompt:"She is a missionary.",words:["misyonaryo","hiya","hin"]},{unit:"u36",unitName:"Church & belief",word:"Kristohanon",gloss:"Christian",prompt:"I am a Christian.",words:["Kristohanon","ako","hin"]},{unit:"u36",unitName:"Church & belief",word:"Bibliya",gloss:"Bible",prompt:"I read the Bible.",words:["Bibliya","ako","basa","an"]},{unit:"u36",unitName:"Church & belief",word:"kros",gloss:"cross",prompt:"The cross is on the wall.",words:["kros","an"]},{unit:"u36",unitName:"Church & belief",word:"kinabuhi",gloss:"life",prompt:"Life is good.",words:["kinabuhi","maupay"]},{unit:"u36",unitName:"Church & belief",word:"langit",gloss:"sky / heaven",prompt:"Heaven is beautiful.",words:["langit","mahusay"]},{unit:"u36",unitName:"Church & belief",word:"pasaylo",gloss:"to forgive",prompt:"Please forgive me.",words:["pasaylo","alayon"]},{unit:"u36",unitName:"Church & belief",word:"kaadlawan",gloss:"birthday",prompt:"Today is my birthday.",words:["kaadlawan","ko"]}];var bu=[{id:"bloom-kunta-huybes-kada-adlaw",title:"Kunta Huybes kada Adlaw",source:"Bloom",license:"cc-by-nd",paras:["Tuktuga-ok! tuktuga-ok! tuktuga-ok! Nakagmata hi Mira han tuga-ok han manok. Nangadi hiya pagpasalamat han Ginoo ngan dali nga gintipig an iya hinigdaan.",'Pag gawas niya ha kwarto, iya gintawag an iya nanay. "Nanay, nanay, nanay!" Iya liwat gintawag an iya tatay. "Tatay,tatay, tatay!" Pero waray may bumaton ha iya.',"Kumadto hiya ha ira kusina, waray tawo. Kumadto hiya ha ira balkon, waray tawo. Kumadto hiya ha ira libong, waray liwat tawo!",'Bumalik hi Mira ha sulod han ira balay ngan nahinumdum hiya. "Aha! Huybes ngayan yana, adlaw han tabo asya waray dinhi hira nanay ngan tatay. Timprano pa hira nga napakadto ha tabu-an para mamalit hin pagkaun ngan iba pa namon nga panginahanglan!" "Ano dawla kun napalit nira nanay ngan tatay an akon gintugon?" pakiana ni Mira ha iya kalugaringon.',"Waray la mag-iha, umabot na an kag-anak ni Mira tikang ha tabu-an. Damo an ira dara. Malipayon hira nga gintapo ni Mira.","May ada mga sibuyas, lasona ngan luya. Upod na an isda, karne han baboy ngan baka. Mayda liwat asin ngan asukar, toyo ngan asiti. Mayda pa gatas ngan palaman nga marasa! Kadako han tawa ni Mira!","May ginhatag nga nakaputos an nanay ni Mira ha iya. Ginkulba hiya! pero dayun la nga nakapakpak hin kalipay hi Mira. Ginpalit ni nanay ngan tatay an mga tugon niya! May ada na hiya bag-o nga lapis, pula nga payong ngan dulaw nga bestida!",'Malipayun hin duro hi Mira! "Salamat nanay! salamat tatay!" "Salamat han iyo mga pinalit didto ha tabu-an! "Humangkop hi Mira ha iya nanay ngan tatay ngan sumiring; "Nanay, tatay, kunta pirmi nala Huybes kada adlaw!" Nagkatatawa an iya nanay ngan tatay! Nagkatatawa hira ngatanan!'],titleEn:"Every Day Thursday",questions:[{q:"Why were Mira's parents not at home?",options:["They went to the market","They went to school","They went to visit a neighbor"],answer:0},{q:"What made Mira very happy?",options:["Her parents bought her new shoes","Her parents bought the things she asked for","Her parents brought home a puppy"],answer:1}]},{id:"bloom-an-bao",title:"An Bao",source:"Bloom",license:"cc-by-nc",paras:["Tumago ha luyo han bato.","Bisan diin hiya nakadto.","Balay niya pirmi aklo.","Naukoy hiya ha sapa.","Kay naayon hiya han baha."],titleEn:"The Turtle",questions:[{q:"Where does the turtle live?",options:["In a tree","In a river","In a house"],answer:1},{q:"What does the turtle always carry?",options:["Its home","A basket","A stone"],answer:0}]},{id:"bloom-an-tulo-nga-magsarangkay",title:"An Tulo nga Magsarangkay",source:"Bloom",license:"cc-by-nc",paras:["Usa ka gab-i mapawa an bulan, nag uru-istorya hira Tristan, Jolo ngan Anton. Dako an tingog ngan tawa ni Tristan.",'Ginsaway hira ni Mana Lita. "Kabataan, hinaya an iyo tingog kay nakakaistorbo na kamo." saway ni Mana Lita nga pinipiraw.','Ginsigawan nira Jolo ngan Anton hi Tristan. "Hala ka, Tristan! Hala ka, Tristan!" sigaw han duha. Tungod han kaawod, pumurot hiya hin bato ngan ginlabay an atop nira Mana Lita.','Kinalasan hira Mana Lita. Nahimangno hira ngatanan. Iksakto nalabay hi Mano Solomon kay nagroronda. Ginsaway niya hi Tristan. "Kay ano nga nanlalabay ka man?" pakiana ni Mano Solomon. Nandadlagan an magsaarangkay.',"Kinabuwasan, ginkadto ni Mano Solomon an mga balay han magsarangkay.",'Ginpatawag hira upod an ira mga kag-anak para pagtuhay. "Kay ano nga nanlabay kamo han atop nira Mana Lita?", pakiana ni Kapitan Eddie. "Hi Tristan po adto kapitan," baton ni Jolo. "Ginsaway la po hiya nanlabay dayon," baton liwat ni Anton.',"Para matapos na an pagtuhay ha ira ni Kapitan, nangaro hin pasaylo an magsarangkay ngan ira mga kag-anak kan Mana Lita. Tikang hadto, an maagsarangkay in nagsaad nga diri na hira mag-uutro."],titleEn:"The Three Friends",questions:[{q:"Why did Mana Lita scold the children?",options:["They were too noisy","They broke a plate","They were late for school"],answer:0},{q:"What did the friends and their parents do in the end?",options:["They moved away","They asked Mana Lita for forgiveness","They blamed Mano Solomon"],answer:1}]},{id:"bloom-an-pakla-nga-mayakan",title:"An Pakla Nga Mayakan",source:"Bloom",license:"cc-by-nc-sa",paras:["Ha usa nga lugar, may ada usa nga Pakla nga masyado hin kamayakan.Nakausa, ginpakianhan niya an nga tanan nga mga hayop kun ano an karuyag kaunon han ira mga anak.",'Ginpakianhan niya an Tamsi, "Ano an karuyag kaunon han imo mga anak?"','Bumaton an Tamsi, "Karuyag kumaon han akon mga anak hin mga apan." Bumaton an pakla, "Oh, asya!"','Ginkadto han Pakla nga dako an baba an Baboy, ngan iya ginpakianahan, "Ano an karuyag kaunon han imo mga anak?"','Bumaton an Baboy, "Karuyag uminom hin gatas an akon mga anak." "Oh asya!", baton han pakla.','Kumadto hiya han Itik ngan nagpakiana, "Ano an karuyag kaunon han imo mga anak."','Bumaton an Itik, "Karuyag kumaon han akon mga anak hin gudti nga mga prutas." Oh asya,"baton han Pakla nga dako an baba.','Kumadto han Buaya an Pakla ngan pumakiana, "Ano an karuyag kaunon han imo mga anak?". Han pagkita, nalipay an Buaya ngan gumuliat, "Ooooohhhhhh" Humadlok hin duro an Pakla pakabati niya han guliat han Buaya.',"Mga Pakiana: 1. Ano an pakiana han Pakla ha mga hayop? 2. Ano an baton han Tamsi ha pakiana han Pakla? 3. Ano an karuayag kaunon han mga anak han Baboy? 4. Ano an siring han Itik ngadto han Pakla nga karuyag kaunon han iya mga anak?"],titleEn:"The Talkative Frog",questions:[{q:"What did the frog ask the animals?",options:["Where they lived","What their children liked to eat","Why they were sleeping"],answer:1},{q:"Why did the frog become very afraid?",options:["The crocodile shouted","The bird flew away","The pig chased him"],answer:0}]},{id:"bloom-an-istorya-han-pormado-nga-bato-han-kand",title:"An Istorya Han Pormado Nga Bato Han Kandiwata",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa ha mga sikat kadtuon yana ha isla han munisipyo han Daram an ira bantog nga pormado nga bato o rock formation nga gintatawag nga kandiwata . An pulong nga Kandiwata in nagtikang sa lokal na termino han mga waray nga an karuyag sidngon in lugar o puroy-anan han mga diwata, engkanto o mga linarang nga diri nakikit-an han mga ordinaryo nga tawo.","Sumala han istorya han mga kalagsan, an ini nga pormado nga bato nga baga han nalutaw ha butnga han kadagatan in usa daw nga dako nga barko nga may mga sakay nga pasahero nga nagnanabigar hadto, nga kun diin samtang ini in nagbibiyahe ha butnga han kadagatan in may kalipay nga nahitatabo ha sulod han barko, may ada mga nagkakaranta, nagsasarayaw, nagkakatatawa, ngan nangugugli-at nga mga pasahero.","Ha butnga han ira karisyuhan nakit-an han mga tawo an usa babayi nga may ada kugos nga misay ngan ira ini ginhimo nga pag-intrimisan ginkuha an misay ngan ginkariguan, ginbadoan ngan ginpasayaw-sayaw han mga tawo an nasabi nga misay, nga kun diin mas nagin marisyo pa hin duro an mga tawo samtang nagnanabigar ha kadagatan. Ngan waray pag-iha.","Nga tumigda la nga naglain an panahon ngan nagsirom an bug-os nga palibot ngan nagkamay ada hin makusog nga dalugdug ngan kidlat nga asya an naka-igo ha barko ngan ini nagin usa nga dako nga bato ngan nagporma hin sugad hin dako nga barko. Hito mismo nga oras pagkahuman han panhitabo in tigda la nga nagmingaw an bug-os nga palibot. An dako nga barko nagin usa nga dako nga bato.","Ha pagkayana ini nga pormado nga bato in pareho hin usa nga barko nga nalutaw ha butnga han kadagatan. Ngan ini in maupay ngan kamakaruruyag pagkit-on.","Dugang pa han istorya han pipira nga mangirisda nga nag-uukoy hirani ha kandiwata, nasiring hira nga danay may mga panahon nga nagpaparawa ha gab-i an pormado nga bato, ngan may ada mga tingog nira nga nahibabati-an nga mga nagririsyo nga sugad hin may ada sarayaw an mga diwata o engkanto. Asya daw adto an mga tawo nga sakay hadto han barko nga nagin usa nga bato.","Dugang pa nga istorya han pipira nga mga residente han usa barangay nga naukoy hirani ha kandiwata, an siring nira nga kun mangangawil o mananakop ka hin mga isda nga harani ha kandiwata in kinahanglan mo anay magsarit sa dako nga bato (kandiwata) para diri daw magkamay ada hin problema sugad han: pagkaruba han imo sarakyan, pagkasangit han imo pukot, pagpapaabat han mga diwata ngan engkanto ha imo o di ngani diri kana makakauli haiyo panimalay .","Bisan ha pagkayana kun may napakadto didto nga mga turista nga karuyag mangarigo o magpahalibway hira gin sasagdunan nga magsarit anay ha pormado nga bato ha bisan ano nga karuyag nira buhaton didto.","Dugang pa nga siring nira nga kinahanglan mo mag-itsa hin sinsilyo antis ka umuli o bumaya hito nga lugar para daw diri mag-isog o mabido an mga diwata o engkanto nga nangungukoy didto.","An ini nga istorya in sumala o nagtikang ha mga mga tawo nga nagkamay ada han mga eksperyensya, mga nahikit-an ngan mga nanhibati-an mahiunong ha kandiwata. Nga kun diin bisan ha pagkayana nga panahon ini in imo hibabati-an nga istorya mga tawo nga naukoy hirani ha kandiwata.","Usa nga mahusay nga dagat-panan-awon (tourist spot) an pormado nga bato han kandiwata ( kandiwata rock formation), nga gindadayo yana han mga turista nga natikang ha mga hagrani nga lugar han Daram. Maupay didto mangarigo kay an tubig malimpyo ngan matin-aw. Ini in usa nga natural nga karikuhan nga maidadasig han mga tawo nga mulopyo han munisipyo han Daram. Nga angay naton timangnuon, paghirutan ngan ipadayon an kalimpyo han kadagatan. Pagkaada hin pagrespeto ngadto han mga tawo nga nagkamay ada hin eksperyensiya mahiunong han ira mga istorya hiunong han kandiwata.","Moral Lesson of the Story: Aton tagan hin importansiya an mga mag-upay nga mga panan-awon nga aada nakikita ha aton mga lugar. Aton atamanon, timangnuon ngan ipadayon an kalimpyo han aton kalibungan, kadagatan ngan kagurangan. paghatag hin respeto ngadto han mga tawo nga naghahatag han ira mga istorya tikang han mga butang nga ira naekperyensiyan, nakit-an ngan nanhibati-an. Damo nga Salamat!"],titleEn:"The Kandiwata Rock",questions:[{q:"What do people say the Kandiwata rock once was?",options:["A big ship","A tall mountain","A lost house"],answer:0},{q:"What lesson does the story teach?",options:["Ignore old stories","Care for beautiful places and respect local stories","Never visit the sea"],answer:1}]},{id:"bloom-an-bukad-ha-libong-ni-apoy-garing",title:"AN BUKAD HA LIBONG NI APOY GARING",source:"Bloom",license:"cc-by-nc-sa",paras:["Hi apoy Garing usa nga mahilig magtinanon bukad pero diri gud hiya gintutudkan hin mga tanom nga nabukad labot la ha usa nga tanom ini an tanom nga nabukad hin rosa.",'Pirmi ni apoy Garing gindadayaw ngan gintitimangno an iya bukad nga rosa. "Ikaw an bukad nga akon ginhihigugma kay ikaw la an tumurok han akon gin tanom ngan an kolor mo nga pula amo an akon paburito."',"Usa ka gab-i, gin kuha han usa nga ulitawo an iya tanom nga rosa. Pagkaaga pagkita ni apoy Garing ha iya libong waray na an iya minayuyo nga rosa. Naging masinalub-on hi apoy Garing kay nawara an iya tanom nga rosa.","Gin dara han ulitawo an tanom ni apoy Garing nga rosa ngadto han libong han iya gin gagarbohan.","Pagkaaga nalipay an daraga han iya nakita kay may usa nga tanom nga mahusay pagkinitaon. Iya gin daop ngan gin obserbahan. Na hunahunaan niya nga waray hiya tanom sugad hini kamahusay.",'Nahibaroan han enkantada nga alibangbang an nahinabo ngan nalooy ini kan apoy Garing. Lumupad an enkantada nga alibangbang kan apoy Garing kamot ngan nagsiring "Apoy Garing nakita ko an imo kabidoan han kawara han imo tanom nga rosa, yana an imo mga kamot tatagan kon bendisyon para bisan man ano nga tanom maturok kon ikaw an magtanom."',"Nalipay gud hi apoy Garing han gisiring han enkantada nga alibangbang ngan nagpasalamat sanglit kumadto dayon hiya ha iya libong ngan nagbungkag han tuna para han tatanoman nga mga tanom.","Ngan mga pira ka adlaw nanubo an mga tanom ni apoy Garing nga nakita niya an magka iba-iba nga bukad nga maghusay.",'Ginkadto han enkantada nga alibangbang an ulitawo ngan an daraga ngan nagsiring "ulitawo diri maupay an imo gin buhat, kay ano ginkuha mo an tanom nga rosa ni apoy Garing?"','Nangaro hin pasaylo an ulitawo han enkantada nga alibangbang. "Pasayloa ako han akon nabuhat kay tungod ginhigugma ko an akon gingagarbohan kay mahilig hiya hin mahusay nga bukad sanglit ginkuha ko an tanom nga rosa ni apoy Garing". Bumaton an enkantada nga alibangbang "pangaro pasaylo kan apoy Garing han imo gin buhat kay kon diri ako an maghahatag ha imo hin sirot ha imo".','Nagtangis an daraga ngaha atubangan han nangunguyab ha iya tungod han ginbuhat hini. "Pangaro pasaylo kan apoy Garing han imo ginbuhat." An siring han daraga kan Lindo. "Oo mangangaro ako pasaylo. Pasayloa liwat ako han akon nabuhat" an baton ni han ulitawo ha iya gingagarbohan. Kumadto dayon hira kan apoy Garing para mangaro han kapasayloanan.','Han nakadto na hira kan apoy Garing libong nangaro hira hin kapasayloanan. "Pasayloa ako apoy Garing han akon ginbuhat" an siring han ulitawo. "Okey la intoy maupay kay nag amin ka han imo ginbuhat. Malipayon ako yana kay may ada na ako bago na mga tanom nga nabukad hin rosa ngan iba pa nga mga bukad". An baton ni apoy Garing.',"Waray hi apoy Garing mag-isog kundi naging malipayon pa hiya han may ada hiya yana. Gintagan pa niya ulitawo ngan an daraga hin mga taramnon. Tikang hadto naging magsuok hira nga magsarangkay ngan nananom hira hin mga iba-iba nga mga bukad sanglit naging maupay ngan mahusay an ira barangay."],titleEn:"Apoy Garing's Flower",questions:[{q:"What happened to Apoy Garing's rose plant?",options:["A young man took it","It died in the rain","A bird ate it"],answer:0},{q:"What blessing did the enchanted butterfly give Apoy Garing?",options:["She could fly","Any plant she planted would grow","She would find gold"],answer:1}]},{id:"bloom-an-malipayon-na-paragsudoy",title:"AN MALIPAYON NA PARAGSUDOY",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa nga malipayon nga tawo hi Pedro.","Pirmi hiya nauli nga may dara nga pagkaon para ha iya pamilya.","Nagmamata hiya hin timprano para mag baligya.","Madali nga nauubos an iya mga baligya kay damo an napalit.","Usa ka adlaw naging masulob-on hi Pedro kay waray napalit han iya tinda.","Kulang na tawo an bungto tungod han pandemya (Covid 19)","Umuli hi Pedro nga masulob-on. Nawawarayan na hiya pag laom.","Nangadi hi Pedro, nga konta mawara na ini nga pandemya.","Paglabay hin usa ka tuig gin balita ha TELEVISION nga may ada na bulong an sakit nga Covid.","Nag lipay hi Pedro han iya nabatian han anunsiyo. Naglipay liwat an iya pamilya."],titleEn:"The Happy Vendor",questions:[{q:"Why did Pedro become sad?",options:["No one bought his goods","He lost his house","His family left town"],answer:0},{q:"What made Pedro and his family happy again?",options:["They moved to another town","They heard there was medicine for Covid","They found a new boat"],answer:1}]},{id:"bloom-pagtimangno-hin-panlawas",title:"Pagtimangno hin Panlawas",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa ka adlaw samtang nagmumulay hi Potpot. Nakabati hiya han tunog han budgyong. \u201Ceeeeennnngggg eeennngggg\u201D tunog han budgyong \u201CGinpapasabot nga gindidiri an paggawas han mga kabataan ngan pagsalin-urog hin bisan anu nga katitirok,\u201D pag imporma han tanod.","Laksi nga dumalagan hi Potpot pag uli ha ira balay. \u201CNanay, siring han tanod diri na puwede gumawas an kabataan ngan an pagkatitirok,\u201D sumat ni Potpot kan iya nanay. \u201CUu, kay mahitungod ito hit nakalat yana nga sakit, \u201D siring ni nanay.",'Nanhunahuna hi Potpot ngan masulub-on nga sumiring. \u201CDiri na kami makakag-uyas hit ak kasangkayan, ngan diri kami makaka eskwela.\u201D "Makaka eskwela kamu pero dinhi la kamu ha balay," siring han nanay. "An aton angay buhaton atamani naton an aton kalugaringon nga diri kita matapnan hin sakit," dugang nga siring ni nanay.',"\u201CPara malikayan ito nga sakit kinahanglan kita sumunod hit mga ginpapatuman na mga protocol ha panlawas,\u201D dugang nga siring ni nanay. \u201CAnu it kinahanglan buhaton nay?\u201D pakiana ni Potpot. Gin usa-usa ni nanay an angay buhaton. \u201CAgsob ngan kaangayan nga paghugas han mga kamot gamit an sabon,\u201D baton ni nanay.",`"Pagtakop han baba ngan irong gamit an panyo, kun waray panyo puydi lwt an pako' han bado,ngan paharayo ha mga katawhan kun maubo" siring ni nanay. "Pagmantene liwat hin malibsog nga kalawasan, pinaagi hin pagtumar bitamina ngan pagkaon nga masustansya," dugang nga siring ni nanay.`,"\u201CPaunano kita makakapalit hit makakaon naton nay?\u201D pakiana ni Potpot. \u201CAyaw kabaraka manhahatag hira hin ayuda, ngan may ada kita mga tanom nga utanon ha at libong nga puwede naton maluto,\u201D baton ni nanay","\u201CTatagan ko hira Maya ngan Aloy han aton mga utanon,\u201D malipayon nga siring ni Potpot. \u201CUu, manhahatag kita ha aton mga hiripid,\u201D nalilipay nga baton ni nanay.","Tikang hadto ginhimo nga pamatasan han pamilya ni Potpot an agsob ngan isakto nga paghugas han kamot ngan pagsugot ha mga protocol panlawas para makalikay ha mga nakakatapon nga sakit."],titleEn:"Taking Care of Health",questions:[{q:"Why were children told not to go outside or gather together?",options:["Because of a spreading sickness","Because of a storm","Because school was over"],answer:0},{q:"What did Potpot's family start doing regularly?",options:["Selling vegetables","Washing hands and following health rules","Traveling to other towns"],answer:1}]},{id:"bloom-an-banog-ha-bukid-huraw",title:"AN BANOG HA BUKID HURAW",source:"Bloom",license:"cc-by-nc-sa",paras:["Malipayon nga naglilinupad-lupad hi Banog ha kagugub-an.","Nakita niya an hitaas nga Bukid Huraw.",'Nagsiring hiya. "Bukid Huraw kaya ko lumupad ngan labwan an im kahitaas!"',"Gin andam niya an iya kalugaringon para paglupad.","Han iya paglupad, tigda may umabot nga bagyo.",'"Kaya ko ini! kaya ko ini!" An siring ni Banog ha iya kalugaringon. "Wusssssss...". An tunog han makusog nga hangin nga natapo kan Banog han iya paglupad.',"Han kakusog han hangin waray kayaha ni banog nga makalampas ha kahitaas han Bukid Huraw ngan nahulog hiya ha mga puno han kahoy.","Napiolan hi Banog han iya kahulog.",'Nagsiring hi Banog ha iya kalugaringon, "diri ko na pipiriton tak kalugaringon kon diri ko kaya para diri ako mahingadto ha karat-an".',"Ngan tikang hadto naging malipayon nala hi Banog maglinupad-lupad palibot han Budik Huraw."],titleEn:"Banog and Mount Huraw",questions:[{q:"What did Banog try to do?",options:["Fly higher than Mount Huraw","Build a nest on Mount Huraw","Hide from the storm"],answer:0},{q:"What did Banog learn after falling?",options:["Never fly again","Not to force himself when he cannot do something","Mountains are easy to beat"],answer:1}]},{id:"bloom-hi-kaha-kahon",title:"Hi Kaha, Kahon",source:"Bloom",license:"cc-by-nc-sa",paras:["Umandar na an bus nga ginsasakyan ni Kaha. \u201CKamalipog man hini nga akon pagbiyahe\u201D, reklamo ni Kaha. Sapit niya an dako nga sako han mga utanon ngan malangsa nga balde han isda.",'Usa\u2026 duha\u2026 tulo\u2026 tulo ka oras nga pagbay-og an gin-abat ni Kaha. Natapos gihap an iya beyahe. "Yeheey! Makakagawas na ako hini nga lugar", malipayon nga siring ni Kaha.','"Kamakaluluoy ko man kitaon", masulob-on nga siring ni Kaha. Brown an iya kolor nga may gudti nga mga luho ha ligid niya. Pinaagi han dulaw nga higot, nasisirahan an tapotapohon nga iya abrihan.',"Dalidali hiya nga ginkuha han iya agaron ha iya kinamumutangan. Ginkaptan an dulaw nga higot nga ginhigot ha iya. Nahipausa hiya han iya nakita-an. \u201CWow! kamaupay man hini nga lugar.\u201D, nalilipay nga siring ni Kaha.","Dagko ngan higtaas nga bilding an aada ha iya atubangan. Iba ini ha iya gintikangan nga simple nga balay. Haros usa ka barangay an kahiluag hini ngan baga hin maabot na ngadto ha langit ha subra hin kahitaas.",'Ginbutang hiya han iya agaron ha pushcart ngan ginsulod hiya ha maanyag nga bilding. Puno hiya hin ginhamis nga mga bagol hin lubi. "Oy tigda nga umabri an purtahan!", nahipausa nga siring ni Kaha.',"Nakita niya an mainggat nga salog. Makaruruyag pagkit-on an iba-iba nga klase hin mga light. Iba-iba nga kolor han mga butang an iya nakikita ha kada estante nga ira gin-aagian.",`"Kadadamo man hin tawo ha palibot', yakan ni Kaha. "Siguro kay mahagkot ini nga lugar". "Makikita ha ira nawong an kalipay ha pamamasyada, pagkaon ngan pamamalit", hunahuna ni Kaha.`,"Ginbutang hiya sulod hin usa nga tindahan. Puno ini hin mag-upay nga mga pandekorasyon. Nakita niya nga gintagan hin kwarta an iya agaron kabalyo ha iya ngan lumakat na. Nasubo hi Kaha. \u201CKay ano ako ginbayaan han akon agaron?\u201D, nahihingatangis nga siring ni Kaha. \u201CTungod ba kay luma na ako?\u201D. \u201CWaray nagud ada ako pulos ha iya\u201D, tangis ni Kaha.",'Nabatian hiya ni basurahan. \u201CDiri ito ungod sangkay. Tanan kita may ada mga pulos dinhi ha tuna", isplikar ni Basurahan. \u201CDiri karuyag signgon nga waray ka na pulos kun ginbayaan ka man han imo agaron ".','\u201CKitaa daw ako. Malipayon ako kay maaram ako nga dako it akon nahibubulig ha kalibungan", dugang nga siring ni Basurahan. \u201CGinbubutang ha amon an mga maghugaw nga mga butang para diri magin mahugaw an kalibungan."','\u201CTama hi Basurahan. Kami gihapon imbis nga iglabog aadi kami para magamitan pa\u201D, an siring han mga bagol hin lubi. "Ginhihimo kami nga pandekorasyon ha bahay, uyagan ngan puydi liwat mahimo nga garamiton ha pagluto.\u201D',"Waray pag-iha, umabot an anak han tag-iya han tindahan. Ginkuha an iya sulod ngan gintrapohan. \u201CKailangan ko ikaw kay waray ako nasusudlan hin mga gudtiay nga pantinda\u201D, siring han bata.",'Ginputos hiya hin malimpyo ngan bukadbukaron nga papel. May ada pa ginbutang nga pula nga ribbon ha bawbaw han iya takop. Nakita niya an iya kalugaringon ha espiho ha tindahan. "Kamakaruruyag kitaon it akon kalugaringon", nalilipay nga siring ni Kaha.','Tikang hadto, natood na hi Kaha nga tanan nga butang may ada pulos. Gin-apresyar niya an iya kalugaringon kay diri na hiya makalolooy kitaon ngan diri pa hiya makakahugaw ha kalibungan. "Damo nga salamat han maduruto ngan maabilidad nga bata", malipayon nga siring ni Kaha.'],titleEn:"Kaha the Box",questions:[{q:"Why was Kaha sad in the store?",options:["She thought her owner had left her because she was useless","She wanted to ride the bus again","She lost her ribbon"],answer:0},{q:"How did Kaha learn she still had value?",options:["A child reused her for small items","She became a trash can","She went back to the farm"],answer:0}]},{id:"bloom-an-suok-nga-magsangkay",title:"An Suok nga Magsangkay",source:"Bloom",license:"cc-by-nc-sa",paras:["Magsangkay hi Ela ngan hi Mila. Tungod kay mag anyaw man hira. Suok gud kaupay hira nga magsangkay.","Ha ira pag eskwela magsapit gud hira. An ira mga maestra gindadayaw hira. Ha klase pirmi hira nangunguna.","Mga buruhaton ha balay waray kabudlay. Kay hira nga duha nagbibinuligay. Mga kag-anak nira waray problema.","Bisan ha ira pagpahuway. Pirmi hira nag-iinatubangay. Pangandoy nira dungan nga mapa-uswag.","May nahitabo ha ira kamagsangkay. Hira nagkabulag. Nag usaan nala hi Ela.","Nahingadto hi Mila ha hirayo nga dapit. Hiya nakasala ha ira kamagsangkay. Gin-raut niya Ela ha iba.","Ginpinsar ni Ela an panhitabo. Kada gab-i hiya nagtatangis. Ug hi Ela nagkasakit.","Pirmi naghuna-huna hi Ela kan Mila. Ginhuhulat niya pirmi an pag-abot niya. Iya karawaton nga sakay gihapon.","Nahibaro hi Mila han nahitabo. Nga nasakit an suok niya nga sangkay. Dali-dali nga bumalik hi Mila.","Nagkita gihapon an magsangkay. Ginpasaylo ni Ela hi Mila. Ngan nagpabilin an ira suok nga kamagsangkay."]},{id:"bloom-an-bata-nga-mahilig-hin-dolce",title:"An Bata nga Mahilig hin Dolce",source:"Bloom",license:"cc-by-nc-sa",paras:["Hi Ynah in usa nga bata nga babayi. Gutiay ngan matambok. Ayon niya it mga pagkaon nga magtam-is sugad hit cake, ice cream, tsukolate, softdrinks, lollipop, labi na gud it mga dolce.",'Kun nalakat na ngani it iya Tatay ngan Nanay para magtrabaho pirmi gud hiya naaro hin singko. "Aanhun mo na liwat it kwarta Ynah?" pakiana ha iya ni Tatay.','May ada la po ako papaliton ha tindahan Nay, Tay! siring ni Ynah. "Upaya naman nga diri dolce tim paliton, mas maupay kun tinapay nala anak!" siring han iya nanay.',"Dumiritso hiya daun ha tindahan. Pumalit hiya hin iba-iba nga klase hin dolce, waray hiya bumali han siring ni iya Nanay nga tinapay nala it paliton imbis nga dolce.",'"Maupay nala nga waray kumita hi Nanay nak mga ginpamalit sigurado gud nga pagbubusa-an niya ako!" siring ni Ynah ha iya kalugaringon. Nakakita an iya kuya han iya ginbuhat salit ginsidngan hiya "Upaya la nga la nga diri naman magsinakit it imo ngipon Ynah!" siring han iya kuya.',"Pagkagab-i maupay na an ira pangaturog.",'"Kakaunon ka namon, bisan ka diin magtago, mabibilngan ka la gihap namon rawrrrrrrrr". yakan han mga higante nga dolce. "Ayawwwww!" yakan ni Ynah nga sige it pagdinalagan.','Tigda nga nakagmata hi Ynah, nahangos ngan nakagtuok. "Hin o dawla adi nga nagtitinuok?" siring han iya Nanay. Gumawas hiya han ira kwarto para bilngon kun diin tikang an tuok.','"Naano ka Ynah? kay ano nagtitinuok ka man?" pakiana ha iya ni iya nanay. "Nay nag-inop ako nga ginlalanat ako hin higante nga mga dolce makaradlok!.....nay..... Nay, masakit nanaman tak ngipon huhuhu"....sumat ni Ynah "Waray udog ako tuod kinana nga tinapay nala it palita siring nimo, mga dolce na liwat nak ginkaon kanina. Tikang yana matuod na ako pirmi ha imo nga diri na magpinalit hin mga dolce." yakan pa ni Ynah.','"Hay naku anak, hinaot unta nga pirmi kana manmamati tam mga sagdon ha imo". yakan ni iya nanay. Tikang hadto nga panhitabo, pirmi na hiya nag-totooth brush kada kakahuman niya pagkaon.']},{id:"bloom-mga-kamot-ni-lotlot",title:"Mga Kamot ni Lotlot",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa ka Sabado, nagsarit hi Lotlot kan iya Nanay Lila nga makikimulay hiya ha ira libong Nanay, human na ako manilhig. Pwede ba ako magmulay ha gawas?\u201D pakiana ni Lotlot Oo sige, basta paghirot ikaw ha.\u201D, yakan ni Nanay Lila \u201COpo, nanay.\u201D, baton ni Lotlot.","Marisyo hi Lotlot nga nagmulay ha gawas han ira balay Naghimo hiya hin iba iba nga porma gamit an lagay","Gintawag na hi Lotlot ni iya nanay para mangaon. \u201CLotlot, pakadi na pag meryenda na. Sano ka kumaon, paghinaw anay hit imo kamot ha.\u201D, tugon ni Nanay Lila. Tungod nga guol man hi Lotlot Nahubya hiya paghunaw ngan kumaon dayon hiya hin baduya nga saging","Pagkagab-i nagsakit an tiyan ni Lotlot. \u201CNanay, masakit it akon tiyan.\u201D, nagtutuok nga sumat ni Lotlot. \u201CNaghunaw ka ba han imo kamot kanina pagkatapos mo magmulay ngan sano ka kumaon han baduya?\u201D, pakiana ni Nanay Lila. \u201CWaray po.\u201D, baton ni Lotlot","\u201CAsya nga nagsakit an imo tiyan. Kinahanglan nga permi kita maghuhunaw sano ngan katapos kumaon, katapos magmulay ngan katapos gumamit han kasilyas para malimpyo permi an aton mga kamot. Kumapot ka han baduya nabalhin an kagaw han imo mahugaw nga kamot ngadto han imo pagkaon asya an hinungdan han pagsakit han imo tiyan, Lotlot.\u201D siring ni Nanay Lila","Kumadto hira ha kusina, gintutduan ni Nanay Lila hi Lotlot han eksakto nga paagi han paghunaw. Gin banyosan ni Nanay Lila an tiyan ni Lotlot \u201CDamo nga salamat, Nanay. Tikang yana, pirmi na ako maghuhunaw hit akon mga kamot.\u201D malipayon nga baton ni Lotlot"]},{id:"bloom-an-misay-ni-tisay",title:"An Misay ni Tisay",source:"Bloom",license:"cc-by-nc",paras:["An misay. Alaga ni Tisay.","Busag an misay. Malimpyo an misay.","Ginpapakaun ni Tisay, an iya misay.","Pag nakaturog hi Tisay, nasapit an misay.","Gamit ni Tisay, ginkutkot han yatot.","Nakit-an han misay. Iya ini ginhagad.","Naghulat an misay. Magbabantay kan Tisay.","Ginhigugma ni Tisay, an iya misay."]},{id:"bloom-an-baluto",title:"An Baluto",source:"Bloom",license:"cc-by-nc-sa",paras:['Usa ka adlaw naglalakat hi Mano Boboy ngan Jose tipakadto ha tabi han dagat."Tatay unta damo it aton madakop nga isda yana para damo niyan an sulod han aton baluto". Unta, baton ni Mano Boboy kan Jose.',"Pag-abot nira ha tabi han dagat gin-andam na nira an ira baluto. Ngan nagtikang na pagbugsay hi Mano Boboy.",'"Tatay, kaupay man ngayan pagsinakay hin baluto hano", siring ni Jose. "Oo naman asay pa kun maupay an panahon", baton ni Mano Boboy.','Pag-abot nira ha butnga han dagat. "Jose i-andam na an pukot kay itutunod ta na",siring ni Mano Boboy. "Opo, sigi tatay", baton ni Jose.','Ha di maiha nga oras ginbuligan ni Mano Boboy ngan Jose pag-alsaha an pukot. Nahipausa hira pagkita nga dadamo an sulod nga isda. "Hala tatay, kadadamo man han aton dakop yana! Damo an aton mahisasakay ha aton baluto". Yehey! Yakan nga malipayon ni Boboy.',"Malipayon ngan mahiyum-hiyom hi Mano Boboy ngan Jose samtang nagbubugsay hira han ira baluto tipauli ngadto han ira balay."]},{id:"bloom-waray-na-kakit-i",title:"Waray na kakit-i",source:"Bloom",license:"cc-by-nc-sa",paras:['Han una nga panahon,an aton kagugub an damo an mga kahayupan nga naukoy ngan damo liwat an mga kakahuyan. Napupuno hin kanta hin katamsihan an bug-os nga kagugub an. Maupay hin duro ini nga lugar. "kamalipayon ko nanay nga dinhi kita ha kagugub an naukoy" siring ni tamsi Pikoy kan iya nanay, nagtawa la hi iya nanay ha iya.','An mga iba-iba nga tamsi nagsisibu-sibuay sanglit nagsaway hi iya nanay"bangin kamo madisgrasya hinay-hinay la kamo hit iyu pag-uyag pikoy"siring ni iya nanay, "opo nanay pikoy", baton han anak',"Usa ka adlaw lumakat hira nanay Pikoy kaupod an iya mga anak ug an iba pa nga tamsi para mamiling hin pagkaon. Lumupad hira, kumadto hira ha harayo nga lugar.","Samtang waray hira nanay Pikoy ngan an iba pa nga tamsi umabot an tag iya han tuna ngan pinanmulod nira tanan nga mga kahoy,waray mag iha nawara na an tanan nga kakahuyan.",'Han umabot na hira Pikoy ngan an iba pa nga katamsihan waray na hira balay,waray na liwat an mga kakahuyan,diri na maupay an kagugub an."nanay Pikoy waray na kita uukyan"nahingatangis nga yakan ni tamsi Pikoy, "maghihimo nala kita hin bag o naton nga mauukyan" baton ni nanay Pikoy.',"Naghimo nala hira hin ira mga urukyan nga malay-balay kay waray naman an kagugub an, waray na an mga kahayupan nga nan-ngungukoy nganhi,ngan an damo nga kakakahuyan. Sanglit kamo nga mga bata ayaw niyu pasagdi it aton kagugub-an, pagtanom kamo hin mga kahoy para mayda maukyan an katamsihan."]},{id:"bloom-an-sista-ni-tatay",title:"An Sista Ni Tatay",source:"Bloom",license:"cc-by-nc-sa",paras:['May ada sista hi Tatay. Pinalit ini ni Nanay. "Maupay man ini nga sista", siring ni tatay. Bumaton hi nanay, "Oo, para may ada naton kaliawan".',"Makarit hi tatay magsista. Karuyag ko mamati samtang hiya nagsisista.",'Nagkakanta hi nanay kun nagsisista hi tatay. "Kamaupay ni nanay kumanta", yakan ni ate.',"Nagsasarayaw kami nga mga anak, samtang nagsisista hi tatay ngan nagkakanta hi nanay.","Malipayon an amon pamilya tungod han sista. KATAPUSAN."]},{id:"bloom-an-panapuan-kan-elay",title:"An Panapuan kan Elay",source:"Bloom",license:"cc-by-nc-sa",paras:['Usa ka adlaw, nahimangno hi Elay han karasikas han iya Nanay Maya ha Kusina. "Buhat na dida Elay kay malakat ako" siring han iya Nanay.',"Katima magtima han iya hinigdaan, namahaw hi Elay dungan han iya nanay.",'"Ayaw pagpinasarang dinhi kay malakat ako" pahinumdom ni Nanay. "Oo nanay" baton ni Elay. "An akon panapuan ha?" mahiyum-hiyom nga yakan ni Elay. Naruruyag gud hiya nga an iya paborito an pirmi panapuan ha iya ni iya nanay.','Katapos mo pamahaw panhugas han imo kinaunan ngan pag-alog hin tubig ha? tugon ni Nanay Maya. "Oo, nanay" baton ni Elay.','Kahuman pamahaw ni Elay, gumawas hiya ngan nag-uyag kaupod an iya sangkay. "Niyan nala ako manhihimos ngan mag-aalog kahuman mag-uyag" pinsar ni Elay',"Naliaw hi Elay samtang nag-uuyag. Nahingalimot hiya han tugon ni iya Nanay.",'"Elay, Elay, adi na ako!" tawag ni Nanay Maya. "Halaka! ade na hi Nanay, waray pa ako maghimos ngan mag-alog" nababaraka nga pinsar ni Elay.','Dali-dali nga umuli hi Elay ha ira balay. "Nanay, pasaylua ako. Nahingalimot ako paghimo han imo tugon ha akon kay nag-uyag ako" nagbabasol nga yakan ni Elay. "Halas ige, sunod trabahua anay an akon tugon ha san-o ka mag-uyag. Adi na an imo panapuan ihahatag ko ha imo katapos mo sumugot" yakan ni Nanay Maya.','Malipayon nga nag-himos ngan nag-alog hi Elay. "Diri na ako mautro sunod" Pinsar ni Elay. "Susugton ko anay an iya tugon san-o ako mag-uyag kay gintatagan ako niya han akon pabotiro nga pasalubong".','Kahuman niya maghimos ngan mag-alog malipayon nga ginhatag ha iya ni Nanay Maya an iya paborito nga mani ngan pinyato nga tikang ha Buray. "Hmmmmm.. marasa gud it mani ngan pinyato nga tikang ha buray" siring ni Elay.','"Salamat, Nanay. Sunod masugot anay ako hit imo tugon san-o ako mag-uyag" siring ni Elay.']},{id:"bloom-an-maduruto-nga-parapangisda",title:"An Maduruto nga Parapangisda",source:"Bloom",license:"cc-by-nc-sa",paras:["Ha usa nga bungto han Paranas hirani han dagat may naukoy usa nga pamilya. Ha usa nga simple nga balay malipayon nga nagkakaurusa hira Nanay Ondit, Tatay Omi ngan an ira mga anak.","Pangisda an siyahan nga pangabuhi ni Tatay Omi. Tungod kay waray man hiya makatapos han pag iskoyla.","Maadlaw man o mauran. Mamadlos ngan makusog man it balod nagikan la gihap pakadto ha dagat hi Tatay Omi para magbiling hin ira kakaunon ngan magkaada kwarta.",'Usa ka adlaw, malain an kaoras han panahon. "Omi, ayaw la anay pagkadto ha dagat kay diri maupay it panahon", siring ni Nanay Ondit. "Kon diri ngani ako gumikan waray kita igsusura ngan kakaunon niyan. Waray liwat kita igpapalit gamit kanan pag iskoyla hit kabataan" , baton ni Tatay Omi .','"Sigi, basta paghirot la pirmi ngan ayaw na pagkadto hit kalalawdan",tugon ni nanay Ondit. "Oo, ayaw kabaraka kay pirmi ko gin-aampo nga bantayan kita hit makagarahom nga Diyos", baton ni Tatay Omi.',"Nagtima hi Tatay Omi han iya mga gamit pangisda. Nangudos hiya san-o lumakat pakadto ha dagat.","Kada adlaw amo pirmi ito it kan Tatay Omi ginbubuhat. Kun diri ngani hiya nakakagikan ngadto ha dagat, nabulig hiya ha mga trabahuon ha balay ngan naghuhukot han pukot.","Umabot an damo nga kakurian ngan kawaray kwarta. Pero padayon la gihap hiya han pangisda kay natuod hiya nga makakatalwas hira hit mga kakurian.","Naglabay an mga panahon naging maupay an kabutang han pamilya ni Tatay Omi. Nakatapos pag-iskoyla an iya mga anak ngan may ada na mga trabaho pinaagi han iya paningkamot han pangisda.",'"Tatay, undang na hito nga pagdagat. Kami naman it magtitimangno ha iyo kay may ada naman kami trabaho", pulong ni Andy kan iya tatay. "Sigi la, anak. Samtang kaya pa tak lawas mangingisda la gihap ako kay diri man pirmi it panahon nga may ada kita", baton ni Tatay Omi ha iya anak.','"Damo nga salamat tatay han imo waray kaguol nga pagtimangno ha amon, dugang nga pulong ni Andy kan iya tatay. "Waray sapayan, anak. Obligasyon ito namon nga mga kag-anak. An makagarahom nga Diyos an angay naton pasalamatan ha tanan nga grasya nga iya ginhahatag ha aton," baton ni Tatay Omi.',"Masisiring nga usa nga mahigugmaon nga tatay ngan maduruto nga parapangisda hi Tatay Omi. Apisar han mga kakurian padayon nga naato ha mga problima nga naulpot ha kinabuhi."]},{id:"bloom-ang-kusog-han-gugma-ha-murayaw-nga-edad",title:"Ang Kusog han Gugma ha Murayaw nga Edad",source:"Bloom",license:"cc-by",paras:["Ha usa nga hilumon ngan mahayag nga baryo ha probinsya han Samar, nakatira hi Marites usa nga disi-sais anyos nga babaye nga puno hin damgo ngan paglaum. An ira balay ginbubuhat la tikang ha kahoy ngan yero, pero puno ini hin gugma ngan pagtinabangay.","Hi Marites kilala ha ira eskwelahan sugad nga usa nga matinalahuron, matinumanon, ngan maalam nga estudyante. Pirme hiya nag-aambit ha klase, ngan ginpapabilhan han iya mga maestro an iya kakugi. \u201CDiri gud ako matitimbang,\u201D siring niya ha iya kalugaringon, \u201Ckay para ini ha akon pamilya ngan ha akon tidaraon.\u201D An iya pinakadako nga damgo amo an magin maestra.","Pero ha luyo han iya kalipay, mayda maabot nga pagsulay. Nakilala niya hi Carlo usa nga lalaki nga mas tigulang ha iya. Malambing hi Carlo, ngan pirme hiya naghahatag hin atensyon. Ha murayaw nga edad ngan kakulangan hin eksperyensya, naging duok hira.","Paglabay hin pipira ka semana, napansin niya nga nag-iiba an iya lawas. Nakuratan hiya burod hiya. An iya kalibutan sugad hin nabungkag. Damo nga gab-i an iya ginugol ha pag-ukoy ngan pagtinaluha.","Tubtob nga usa ka gab-i, nagsumat hiya ha iya nanay. \u201CNanay\u2026 burod ako.\u201D Nag-iyakan hira duha. Nasakitan an iya nanay, diri la tungod han nahitabo, kundi tungod han kahadlok para ha tidaraon han iya anak. Tungod han kaulaw, gin-undang anay ni Marites an iya pag-eskwela.","Pero ha kada adlaw nga naglabay, ginbabatian niya an lihok han bata ha iya tiyan. \u201CAn akon anak\u2026 diri ko hiya pababayaan,\u201D siring niya. Han adlaw han iya pagpanganak, gin-agian niya an duro nga kasakit. Pero han iya nakita an iya anak, usa nga matahum nga batang lalaki. Pinangaranan niya ini nga hi Joshua.","\u201CMarites,\u201D siring han iya nanay, \u201Cdiri pa huli an tanan. Pwede ka pa bumalik ha eskwelahan.\u201D Tungod han suporta, nagdesisyon hiya nga magpadayon. Diri ini masayon. Adlaw-adlaw, ginbubuhat niya an iya pinakamaopay. Usahay ginbibitbit niya hi Joshua kon waray magbantay. Ha gab-i, nag-aaral hiya bisan kapoy na gud.","Naglabay an mga tuig, ngan padayon hiya nga naningkamot. Tubtob nga nakaabot hiya ha iya graduation. Ha entablado, samtang gin-aabot niya an iya diploma, nabati niya an kusog nga palakpak. Waray hiya kapugong han iya luha. \u201CNatuman ko gud,\u201D siring niya ha iya kalugaringon.","Pagkahuman, nakatrabaho hiya sugad nga maestra ha ira baryo. Damo nga kabataan an iya natutdoan, ngan gin-inspirar niya ini pinaagi han iya istorya. Usa ka adlaw, nagpakiana an usa niya nga estudyante, \u201CMa\u2019am, paonan-o kamo nagin kusog?\u201D Nagngiti hi Marites ngan siniring, \u201CAn kusog diri tikang ha edad. Tikang ini ha gugma ngan determinasyon.\u201D","Ha gab-i, samtang nagkakaon hira ni Joshua, ginyakap hiya han bata. \u201CNanay, proud ako ha imo.\u201D Naluha hi Marites ngan ginyakap ini hin mahugot. \u201CMas proud ako ha imo, anak. Ikaw an akon kusog.\u201D"]},{id:"bfc-when-god-made-everything",title:"When God Made Everything",source:"BFC",license:"free to copy, not for sale",paras:["Sino an nagtuha sa ato?","An Biblia, pulong han Ginoo, nagsusumat san tinikangan san katawhan.","Sadto pa, an Ginoo gin tuha an pinaka-una nga lalaki ug iya gin ngaranan nga Adan.","Gin tuha san Ginoo si Adan tikang han tapotapo sa tuna.","Han paghatag kinabuhi han Ginoo kan Adan, nabuhi siya.","Nakita niya an iya kalugaringo sulod sin maupay nga harden nga gintatawag Eden.","Antis pa pagtuhaa han Ginoo si Adan, naghimo siya hin kalibutan nga puno sin mag upay nga mga butang.","Hinay-hinay an Ginoo nagbuhat hin bungtod ug patag nga mga lugar, maghamot nga mga bukad ug higtaas nga mga puno, mga tamsi nga maglamrag an barahibo ngan maaringasa nga mga bubuyog, \u2026 \u2026 nagpupuropulilid nga ma balyena ngan magdalunot nga mga suso.","Sa kamatooran, gin buhat san Ginoo an ngatanan \u2013 ngatanan.","Tikang pa gud san tinikangan, antis pa buhaton san Ginoo an ngatanan, wara gud bisan nano kundi an Ginoo.","Wara mga tawo o mga lugar o mga butang.","Wara lamrag ngan kasisidman.","Wara bawbaw ngan ilarom.","Wara kahapon ngan buwas.","An mayaon la an Ginoo nga wara tinikangan.","Ngan ginios an Ginoo!","Sa tinikangan, an Ginoo nagtuha san langit ug san tuna.","Ug an tuna wara pa kaporma ug wara pa sulod.","Ug putos sin kasisidman an kalala- wdan.","Ngan nagsiring an Ginoo.","\u201CMag ka mayaon kapawa.\u201D Ngan nagkamayaon kapawa.","Gin ngaranan san Ginoo an kapawa hin Adlaw ngan an kasisidman gin ngaranan hin Gab-i.","Ug an gab-i ug aga an una nga adlaw.","Sa ika duha ka adlaw, an Ginoo nag dara tubig sa kalawdan, kadagatan ug kadanawan ubos san Langit.","Sa ika tulo ka adlaw, an Ginoo nagsiring, \u201CMagpakita an kamad-an.\u201D Ngan na tuman ini.","Gin sugo liwat san Ginoo nga magpakita an kabanwaan, mga bukad ug mga kakahoyan.","Ngan nagpakita ini sira.","Naglabay an kagabihon ug inabot an aga mao adto an ika tulo ka adlaw.","Ngan ginbuhat san Ginoo an sudang, ug an bulan, ug an gi damu-i nga mga bituon nga diri maihap bisan nino.","Naglabay an kagabihon ug inabot an aga mao adto an ika upat ka adlaw.","Gin tuha san Ginoo an sunod sa iya lista mao an mananap sa kadagatan ug mga isda ug mga tamsi.","Sa ika lima ka adlaw iya gin himo an dagku nga mga malasugi ug digto nga mga sardinas, an hagtaas nga bitiis san \u2026 \u2026abestros ug an malipayon nga huni sa digto nga katamsihan.","Gin himo san Ginoo an ngatanan nga klase san mga isda aron mag puno san kadagatan san kalibutan ug ngatanan \u2026 \u2026 nga klase san tamsi para maglipay panhimulos san tuna, dagat ug kalangitan.","Naglabay an kagabihon ug inabot an aga mao adto an ika lima ka adlaw.","Kahuman sini, nagyakan balik an Ginoo.","Nagsiring siya, \u201CMagkamayada buhi nga kamananampan an tuna \u2026\u201D Ngatanan nga magkaduro-dilain nga insekto ug reptilya na buhi.","Nagkamayada nagbabay-og nga elepante ngan nababarikaso nga kastor.","Mayaangyaang nga mga unggoy ngan mga kimas nga buwaya.","Malubaylubay nga bulati ngan mga pilyo nga chipmunks.","Mantiw nga mga girape ngan nagdidinaguob nga misay.","Ngatanan nga mga hayop gin tuha san Ginoo siton nga adlaw.","Naglabay an kagabihon ug inabot an aga mao adto an ika unom ka adlaw.","Sa ika unom ka adlaw may gin himo nga kakaiba na Ginoo - espisyal.","An ngatanan yana andam na para sa Tawo.","Mayaon na pagkaon an kahumayan ug mga hayop para sa iya.","Nagsiring an Ginoo, \u201CMaghihimo kit sin tawo ha akon panagway.","Siya an maghahadi sa bugos nga tuna.\u201D SALIT AN GINOO NAGBUHAT SIN TAWO SA IYA PANAGWAY; SA PANAGWAY SAN GINOO NAHIMO AN TAWO ...","Nag sugad an Ginoo kan Adan.","\u201CKauna an ngatanan nga imo karuyag sa harden.","Ayaw la an puno nga may kaalam san maupay ug maraot.","Pag kumaon ka tikang sito iton nga puno ikaw mamamatay.\u201D Ug nagsiring an Ginoo, \u201CDiri maupay nga magsayuan la an tawo.","Maghihimo kaupod niya.\u201D Gin dara san Ginoo an ngatanan nga mga katamsihan ug hayop kan Adan.","Gin ngaranan ni Adan ini nga tanan.","Maalam ini siya para mabuhat ini niya.","Pero san ngatanan sini wara gihapon inangay nga kapareho niya.","Gin pakaturog san Ginoo si Adan sin gihilarumi.","Ginkuhaan sayo ka gusok an nakaturog nga lalake, an Ginoo nagtuha sin babaye tikang san gusok ni Adan.","An babaye nga gin tuha san Ginoo an angay nga kapareho para kan Adan.","Gin tuha san Ginoo an ngatana sulod san unom ka adlaw.","Ug gin bendisyonan san Ginoo an ika pito ka adlaw ug gin himo ini nga adlaw san pagpahuway.","Sa harden sa Eden, si Adan ug Eva nga iya asawa bugos an kalipay pagtuman san karuyag san Ginoo.","An Ginoo an ira Diyos, an ira tagahatag ug ira sangkay.","Han Pagtuha han Ginoo han Ngatanan An istorya tikang san mga pulong san Ginoo, an Biblia, makikita sa Genesis 1-2 \u201CAn aragian san Imo mga Pulong naghahatag lamrag.\u201D Salmo 119:130 Katapusan Ini nga Bibliahanon nga storya nag susumat ha ato han kaupaya ha Ginoo nga naghimo ha ato ngan iya buot nga kumila ka ha iya.","Maaram an Ginoo nga kita naka himo hin magraot nga mga butang, iya ini gintatawag nga sala.","An silot hini nga sala mao an kamatayon, tungod kay hinigugma ka hin ungod han Ginoo iya gin padara an iya bugtong Anak, hi Jesus, para mamatay ha kros ug silotan para sa imo mga sala.","Ngan hiya nabanhaw ug sinaka sa langit!","Kon ikaw na too kan Jesus ug naaro ka kapasayluan han imo mga sala, iya iton bubuhaton.","Makadi hiya yana ug pagpuyo ha imo, ug ikaw liwat ha iya hangtod ha kadayunan.","Kon ikaw na too nga mao ini an kamatuoran, e sugad ini ha Ginoo: Hesus, na too ako nga ikaw an Ginoo, nagpakatawo ug namatay para ha ako mga sala ug ikaw nabanhaw.","Pakadi ha ako kinabuhi ug pasaylo-a an akon mga sala, para magkayaon ak bago nga kinabuhi, ug sayo ka adlaw ako makaupod ha imo ngadto ha kahangtoran.","Buligi ako han pagsunod ha imo ug mabuhi para ha imo nga imo anak.","Amen Basaha an Bibliya ug paki istorya han Ginoo kada adlaw!","Juan 3:16"]},{id:"bfc-the-start-of-mans-sadness",title:"The Start of Mans Sadness",source:"BFC",license:"free to copy, not for sale",paras:["GINTUHA SAN GINOO AN NGATANAN!","San pagtuha-a san Ginoo an una nga tawo, si Adan, nag estar siya sa harden sa Eden upod an iya asawa, si Eva.","Malipayon sira nga nagtutuman san karuyag san Ginoo ug malipayon sira dida san presinsya san Ginoo tubtob sayo ka adlaw ...","\u201CNag siring ba an Ginoo sa imo nga diri mag kano sa kada tagsa nga kahoy?\u201D an pangutana san halas kan Eva.","\u201CPwede kami kumaon san ngatanan nga prutas maliban la sin sayo,\u201D an iya baton.","\u201CPag kumaon kami o magkapot kami siton nga prutas, mapatay kami.\u201D \u201CDiri kam mapatay,\u201D bagaw san halas nga nangisi.","\u201CMagigin kapareho niyo an Ginoo.\u201D Karuyag ni Eva an frutas siton nga puno.","Nag pamati siya san halas ngan iya gin kaon an prutas.","Pagkahuman ni Eva talapason an Ginoo iya gin mandoan si Adan nga kaunon liwat an prutas.","Nag sugad kunta si Adan, \u201CDiri!","Diri naku tatalapason an pulong san Ginoo.\u201D Pagpakasala ni Adan ug Eva, nahinbaro sira nga mga hubo sira.","Nagtahi epron tikang sa mga dahon, \u2026 \u2026 ira gin tahoban an ira mga lawas ngan nag tago sira sa mga tanaman ngan san presinsya san Ginoo.","Sa katugnawon san kagabihon inabot an Ginoo sa harden.","Sayod siya san gin buhat ni Adan ug Eva.","Gin basol ni Adan si Eva.","Si Eva naman gin basol an halas.","Nag siring an Ginoo, \u201CGin gabaan an halas.","Ngan ikaw babaye mag-aabat sin kakurian sa imo pag burod ug panganak.\u201D \u201CAdan, tungod kay ikaw nakasala, higagabaan an tuna hin katunokan ngan mga niyotiyo.","Magtatrabago ug paghuhulasan ka aron maka kuha san iyo adlaw adlaw nga pagkaon.\u201D Gin pagikan san Ginoo si Adan ug Eva san mabaysay nga harden.","Tungod san ira pag pakasala, nahibulag sira san kinabuhi nga hatag san Ginoo!","An Ginoo naghimo sin naglalarab nga espada para humarayo sira.","Naghimo an Ginoo sin bado tikang sa panit para kan Adan ngan Eva.","Diin kuhaa san Ginoo ini nga panit?","Paglabay san panahon, nagkamayada pamilya si Adan ug Eva.","An una nira nga anak nga lalaki, si Cain, paraguma.","An ika duha nga anak nga lalaki, si Abel, magbarantay karnero.","Sayo ka adlaw gindad-an ni Cain sin regalo nga mga utanon an Ginoo.","Si Abel nagdara liwat pipira ka mag upay nga iya mga karnero para regalo sa Ginoo.","An Ginoo na upayan san regalo ni Abel.","An Ginoo wara kalipay san regalo ni Cain.","Nalangot nga ungod si Cain.","An Ginoo nagsiring, \u201CKon imo gin buhat an tama, diri mo kakarawaton?\u201D An kalangot ni Cain wara kawara.","Waray pag-iha, sa kauumhan iya gin dasmagan si Abel \u2013 ug iya gin patay!","Nagsugad an Ginoo kan Cain.","\u201CHain an imo bugto, si Abel?\u201D \u201CDiri ak batid,\u201D an buwa ni Cain.","\u201CAko ba an paragbantay sa ako bugto?\u201D Gin sirotan san Ginoo si Cain diri na siya makaka- uma ug maglinayawlayaw siya.","Hinirayo si Cain sa presinsya san Ginoo.","Gin kasal si Cain sa anak nga babayi ni Adan ug Eva.","Nagkamayaon sira pamilya.","Sa wara pagiha, an kan Cain mga apo ug apo sa tuhod nagpuno san syudad nga iya naagian.","Hiton liwat, an pamilya ni Adan ug Eva dagmit nagdamo.","Sadto nga mga panahon, mas hilaba an kinabuhi san Tawo.","San gin anak si Set, nagsiring si Eva, \u201CGin hatag san Ginoo si Seth sa ako para saliwan kan Abel.\u201D Si Set diosnon nga tawo ug na buhi siya sin 912 katuig ug nag mayaon damo nga anak.","Sa kalibutan, an mga tawo nagin uraura kamagraot sa paglabay san mga henerasyon.","Sa kataposan, an Ginoo nagdesisyon nga pagpuohon an katawhan ngan ...","ngatanan nga kamananampan hayop ug tamsi.","Nagbasol an Ginoo nga iya gin tuha an tawo.","Kundi mayaon sayo ka tawo nga nalipayan san Ginoo ...","Ini nga tawo kay si Noe.","Tulin ni Set, si Noe matadong ngan waray ikasaway.","Hiya naglalakat upod an Ginoo.","Iya liwat gin tutdoan an iya tulo nga anak nga lalaki san pagsunod sa Ginoo.","Nagplano an Ginoo nga gamiton si Noe hin makatitingala ug espisyal nga paagi!","An Sinugdanan san Kasubo san Tawo An istorya tikang san mga pulong san Ginoo, an Biblia, makikita sa Genesis 3-6 \u201CAn aragian san Imo mga Pulong naghahatag lamrag.\u201D Salmo 119:130 Katapusan Ini nga Bibliahanon nga storya nag susumat ha ato han kaupaya ha Ginoo nga naghimo ha ato ngan iya buot nga kumila ka ha iya.","Maaram an Ginoo nga kita naka himo hin magraot nga mga butang, iya ini gintatawag nga sala.","An silot hini nga sala mao an kamatayon, tungod kay hinigugma ka hin ungod han Ginoo iya gin padara an iya bugtong Anak, hi Jesus, para mamatay ha kros ug silotan para sa imo mga sala.","Ngan hiya nabanhaw ug sinaka sa langit!","Kon ikaw na too kan Jesus ug naaro ka kapasayluan han imo mga sala, iya iton bubuhaton.","Makadi hiya yana ug pagpuyo ha imo, ug ikaw liwat ha iya hangtod ha kadayunan.","Kon ikaw na too nga mao ini an kamatuoran, e sugad ini ha Ginoo: Hesus, na too ako nga ikaw an Ginoo, nagpakatawo ug namatay para ha ako mga sala ug ikaw nabanhaw.","Pakadi ha ako kinabuhi ug pasaylo-a an akon mga sala, para magkayaon ak bago nga kinabuhi, ug sayo ka adlaw ako makaupod ha imo ngadto ha kahangtoran.","Buligi ako han pagsunod ha imo ug mabuhi para ha imo nga imo anak.","Amen Basaha an Bibliya ug paki istorya han Ginoo kada adlaw!","Juan 3:16"]},{id:"bfc-noah-and-the-great-flood",title:"Noah and the Great Flood",source:"BFC",license:"free to copy, not for sale",paras:["Si Noe an tawo nga nagsisingba san Ginoo.","Samtang ang ngatanan nasisina ngan diri gin susunod an Ginoo.","Sayo ka adlaw, may gin siring nga makalilisang an Ginoo.","\u201CAko gugubaon in nga maraot nga kalibotan,\u201D an siring san Ginoo kan Noe.","\u201CAn imo la pamilya an maluluwas.\u201D Ginpahamangnoan san Ginoo si Noe nga magkakamayaon daku nga pagbaha ug mapuputos an tuna sini.","\u201CPaghimo sin arka nga kahoy, daku nga ungod nga makasya an imo pamilya ug an mga hayop,\u201D an sugo kan Noe.","Gin tagan si Noe san Ginoo hin sakto nga instruksyon.","Nagin sagipo si Noe!","Gin tatamay han mga tawo si Noe samtang iya gin sasaysay kon nano nga naghihimo siya arka.","Padayon la gihapon san paghimo si Noe.","Ug Padayon liwat siya pagsinumat han mga tawo hiunong han sugad han Ginoo.","Waray bisan sino an namati sa iya.","Daku an pagtoo ni Noe.","Naayon siya han Ginoo bisan man wara pa pag uran tikang sa una.","Wara pag iha andam na an arka butangan mga suplay.","Yana inabot na an mga mananap.","Gin padara han Ginoo an pito ka padis han tagsa tagsa nga mananap.","Mga tamsi nga dagku ug digto, mga hayop nga gugtiay ug hagtaas nagpakadto sa arka.","An mga tawo nag guguliat sin mga insulto han gin kakarga nira Noe an mga mananap.","Wara tuko an ira pagpakasala san Ginoo.","Wara sira paghangyo nga sumulod san arka.","Ha kataposan, an ngatanan nga mga hayop ug tamsi nakasulod na.","\u201CPakadi sulod sa arka,\u201D dapit san Ginoo kan Noe.","\u201CIkaw ug an imo pamilya.\u201D Si Noe, iya asawa, iya tulo ka mga anak nga lalaki ug an ira mga asawa sinulod sa arka.","Ngan gin sirado an purtahan san Ginoo!","Inabot an uran.","Nalunop an tuna san makusog nga paginuran sulod sin kwarenta ka adlaw ug gab-i.","An baha naghuwad san mga bungto ug baryo.","Han pagtuko han uran, bisan an mga kabukiran umilarom san tubig.","An ngatanan nga buhi sa tuna nagkamatay.","Han paghitaas san tubig, mao man paglutaw han arka.","Bisan man iton masirom sa sulod, mahulos ug makaharadok.","Kondi an arka nagpanalipod kanda Noe san baha.","Kahuman san lima ka bulan nga paginuran, ginhuyop san Ginoo an sayo ka uga nga hangin.","Hinayhinay, an arka nahisangya didto sa hataas nga bukid sa kabukiran sa Ararat.","Si Noe nagpabilin sa sulod sa akra sulod sin kwarenta ka adlaw ngadto san paghubas san tubig.","Si Noe nagpaguwas sin uwak ngan sarapati sa abri nga bintana sa arka.","Tungod kay wara pakakita hin uga ngan limpyo nga lugar pagpahuway, binalik an sarapati ngadto kan Noah.","Umagi an sayo ka simana, nagsari balik si Noe.","An sarapati binalik nga may dahon hin olibo an iya tusak.","Sunod kasimana, batid si Noe nga mamara na an tuna kay wara na balik an sarapati.","Nag siring an Ginoo kan Noe nga oras na para bayaan an arka.","Magkaurupod, si Noe ug an iya pamilya gin haw-as nira an mga mananap.","Uraura nga pagpasalamat an gin bati ni Noe!","Naghimo siya hin altar ngan iya ginsingba an Ginoo nga nagsalbar sa iya ug sa iya pamilya han makaharadok nga baha.","An Ginoo naghatag kan Noe sin maopay nga saad.","Diri na siya magpapadara hin baha para maghukom han mga sala han tawo.","May ada hatag nga maopay nga pahinumdom an Ginoo san iya saad.","An balangaw an sinyalis han saad han Ginoo.","Si Noe ug an iya pamilya nakakita hin bago nga sinugdanan kahuman han baha.","Inabot an panahon, an iya mga katulinan nagluob san kalibutan.","Ngatanan nga nasud sa kalibutan nagtikang kan Noe ug sa iya kabataan.","Si Noe ug an Daku nga Baha An istorya tikang san mga pulong san Ginoo, an Biblia, makikita sa Genesis 6-10 \u201CAn aragian san Imo mga Pulong naghahatag lamrag.\u201D Salmo 119:130 Katapusan Ini nga Bibliahanon nga storya nag susumat ha ato han kaupaya ha Ginoo nga naghimo ha ato ngan iya buot nga kumila ka ha iya.","Maaram an Ginoo nga kita naka himo hin magraot nga mga butang, iya ini gintatawag nga sala.","An silot hini nga sala mao an kamatayon, tungod kay hinigugma ka hin ungod han Ginoo iya gin padara an iya bugtong Anak, hi Jesus, para mamatay ha kros ug silotan para sa imo mga sala.","Ngan hiya nabanhaw ug sinaka sa langit!","Kon ikaw na too kan Jesus ug naaro ka kapasayluan han imo mga sala, iya iton bubuhaton.","Makadi hiya yana ug pagpuyo ha imo, ug ikaw liwat ha iya hangtod ha kadayunan.","Kon ikaw na too nga mao ini an kamatuoran, e sugad ini ha Ginoo: Hesus, na too ako nga ikaw an Ginoo, nagpakatawo ug namatay para ha ako mga sala ug ikaw nabanhaw.","Pakadi ha ako kinabuhi ug pasaylo-a an akon mga sala, para magkayaon ak bago nga kinabuhi, ug sayo ka adlaw ako makaupod ha imo ngadto ha kahangtoran.","Buligi ako han pagsunod ha imo ug mabuhi para ha imo nga imo anak.","Amen Basaha an Bibliya ug paki istorya han Ginoo kada adlaw!","Juan 3:16"]},{id:"bfc-the-birth-of-jesus",title:"The Birth of Jesus",source:"BFC",license:"free to copy, not for sale",paras:["Sadto pa, gin padara san Ginoo an anghel Gabriel ngadto hin Judio nga daraga an ngaran si Maria.","Nag siring an anghel kan Maria, \u201CIkaw magbuburod hin lalaki nga pagngangaranan mo nga Hesus.","Siya pagtatawagon anak san gihahataasi nga Dyos.","Ug siya maghahadi sa kahangturan.\u201D \u201CPaano ini mahitatabo?\u201D nahipausa nga pangutana san babaye.","\u201CWara pa ak pakiguban sin bisan sino nga lalaki.\u201D An anghel nag sugad kan Maria nga an bata tikang san Ginoo.","An amahan diri matikang sin tawo.","Nagsiring liwat an anghel kan Maria nga an iya patod si Elizabeth magkakaanak liwat bisan pa man arog na siya.","Milagro lat ini.","Waray pag-iha, binisita si Maria kan Elizabeth.","Ira gindayaw an Ginoo.","Si Maria igkakasal sin lalaki nga nagngangaran Jose.","Si Jose masurobon san iya pagkahibaro nga burod si Maria.","An iya kahuna nga iba nga lalaki an nakaburod.","Sa inop, an anghel san Ginoo nag sugad kan Jose nga an bata anak san Ginoo.","Si Jose magbubulig kan Maria pagmangno kan Hesus.","Si Jose nagsarig ug nagsunod san Ginoo.","Ug iya liwat gin sunod an balaod san ira nasod.","Tungod san bago nga balaod, binaya sira sa bungto san Nazaret ug nagpakadto hi Jose ug Maria han bungto han Betlehem pagpalista han sensos.","Kapanganakan na ni Maria.","Kondi si Jose wara pakakaagi sin balay bisan diin.","Puno na an ngatanan nga mga paupahan.","Ngan nakakita gihapon hi Jose hin kwadra.","Didto, igin anak an bata nga Hesus.","An iya iroy iginbutang siya sa pasungan, lugar kon diin an pagkaon san hayop igin bubutang.","Sa hirani nga dapit, may mga magmarangno hin mga karnero nga nagbabantay han ira mga nangangaturog nga panon.","Nagpakita ha ira an anghel sa Ginoo ug nagsumat san maupay nga balita.","\u201CDidto sa bungto ni David natawo an iyo magtaralwas nga mao an Kristo nga Ginoo.","Hiaagian niyo an bata nga hinulid sa pasungan.\u201D Tigda may nangabot nga damo nga anghel, nagkakanta hin mga pagdayaw sa Ginoo, \u2026 \u201CHimaya sa Dyos sa kahitasan ug kalinaw dinhi sa tuna, ug sa mga tawo nga maupay an kaburot-on.\u201D An mga magmarangno han karnero nag dagmit pagpakadto sa pasungan.","Kahuman nira makita an bata nga Hesus, ira gin sumatan an ngatanan nga ira nakatapo hiunong han iginsiring han anghel mahitungod kan Hesus.","Naglabay an kwarenta ka adlaw, gindara ni Jose ug Maria si Hesus didto sa templo han Herusalem.","Dito may-ada lalaki nga nagngangaran Simeon ngan iya gindadayaw an Ginoo tungod san bata nga Hesus, \u2026 \u2026 samtang an arog nga si Anna, sayo liwat nga suruguon san Dyos, nagpasalamat sa Dyos.","Maaram hira nga si Hesus anak san Ginoo, an igin saad nga magtaralwas.","Naghalad si Jose ug duha ka sarapati.","Amo ini an balaod han Ginoo an paghalad han natawo pala nga bata ngadto sa Dyos.","Waray pag-iha, nagpakita an masuna nga bituon ha mga magalam nga kalalakin-an ha sinirangan nga bungto san Herusalem.","\u201CHain ba an natawo nga bata nga hadi han mga Judiyo?\u201D ira pangutana.","\u201CAmo siya pagsisingbahon.\u201D Nakabati hi Hari Herodes han tulo ka lalaki nga maalam.","Nabaraka siya ug nagsugad sa ira nga sumatan hiya kon makita na nira hi Hesus.","\u201CKaruyag ko liwat siya pagsingbahon.\u201D an siring ni Herodes.","Kondi buwa la ini niya.","Karuyag ni Herodes nga patayon si Hesus.","An bitoon nagtutdo ha ira han sakto nga balay kon diin naestar si Maria ug Jose upod an ira bata.","Nagkaluhod sira ug nagsingba, gin tagan nira hi Hesus hin mga marangya nga regalo sama san bulawan ug mga pahamot.","Ginpahimangno an tulo kamaalam nga lalaki san Ginoo nga umuli patago ngan din a bumalik kan Herodes.","Napungot si Herodes.","Determinado nga wakayon si Hesus, an maraot nga Hadi gin papatay niya an ngatana nga mga bata nga lalaki sa Betlehem.","Kondi diri mabubuhatan hin naraot ni Herodes an anak sa Dyos!","Ginpahimangno pinaagi sa inop, pinmaligiw hira Jose, Maria ug Hesus sa Ehipto.","Han pagkamatay ni Herodes, gin dara balik ni Jose si Maira ug Hesus gikan sa Ehipto.","Nagukoy hira ha dito nga bungto han Nazaret, hirani ha dagat han Galilee.","An pagana kan Hesus An istorya tikang san mga pulong san Ginoo, an Biblia, makikita sa Mateo 1-2, Lucas 1-2 \u201CAn aragian san Imo mga Pulong naghahatag lamrag.\u201D Salmo 119:130 Katapusan Ini nga Bibliahanon nga storya nag susumat ha ato han kaupaya ha Ginoo nga naghimo ha ato ngan iya buot nga kumila ka ha iya.","Maaram an Ginoo nga kita naka himo hin magraot nga mga butang, iya ini gintatawag nga sala.","An silot hini nga sala mao an kamatayon, tungod kay hinigugma ka hin ungod han Ginoo iya gin padara an iya bugtong Anak, hi Jesus, para mamatay ha kros ug silotan para sa imo mga sala.","Ngan hiya nabanhaw ug sinaka sa langit!","Kon ikaw na too kan Jesus ug naaro ka kapasayluan han imo mga sala, iya iton bubuhaton.","Makadi hiya yana ug pagpuyo ha imo, ug ikaw liwat ha iya hangtod ha kadayunan.","Kon ikaw na too nga mao ini an kamatuoran, e sugad ini ha Ginoo: Hesus, na too ako nga ikaw an Ginoo, nagpakatawo ug namatay para ha ako mga sala ug ikaw nabanhaw.","Pakadi ha ako kinabuhi ug pasaylo-a an akon mga sala, para magkayaon ak bago nga kinabuhi, ug sayo ka adlaw ako makaupod ha imo ngadto ha kahangtoran.","Buligi ako han pagsunod ha imo ug mabuhi para ha imo nga imo anak.","Amen Basaha an Bibliya ug paki istorya han Ginoo kada adlaw!","Juan 3:16"]},{id:"bfc-the-miracles-of-jesus",title:"The Miracles of Jesus",source:"BFC",license:"free to copy, not for sale",paras:["Damo an mga ginhimo nga milagro ni Hesus.","An mga milagro amo an sinyalis nga si Jesus gud an anak san Ginoo.","An una nga milagro nahitabo didto ha panagtawo han kasal.","May bumangon nga problema.","An bino diri kahusto para san ngatanan.","Hi Maria, an inahan ni Hesus, iya gin sidngan si Hesus han problema, ug iya gin sugad an mga surugoon nga buhaton an bisan ano nga kan Hesus ig sugo.","\u201CPun-a sin tubig ito ini nga mga tibod,\u201D siring ni Hesus.","\u201CTubig?\u201D an pangutana san mga surugoon.","Oo, tubig an ginhanyo ni Hesus.","Gin siring ni Hesus an sayo ka surugoon tadyaw sayo nga daku nga daba ngan ipatadi ngadto san tinaporan han panagtawo han kasal.","An tubig sadto amo na an bino yana!","Maopay nga bino!","Pinakamaopay nga alaksiw!","Nahipausa an mga surugoon.","Ginhimo ni Hesus nga bino an tubig.","An Ginoo la an makakahimo sin sugad siton nga mga milagro.","Si Hesus nagbuhat pa hin iba nga mga milagro.","Sayo kagab-I, siya ug an iya mga disipulo nagpakadto han balay ni Peter.","An ugangan nga babaye ni Peter ungod nga ginhihirangtan.","Ginkaputan ni Hesus an kamot san masakiton nga babaye.","Ha usa la ka dali maopay na hiya.","Binohat hiya para mag-alagad kan Hesus ug han iya mga disipulo.","Baga an bugos nga tawo san syudad nag tirimpon han purtahan hiton nga gab-i.","An mga masakiton nagparakadto\u2013 buta, bugnol, ngula, baldado.","Bisan pa man an mga tawo nga ginuukyan san yawa nagpalibot kan Hesus.","Mabuligan ba niya ini kadamo?","Si Hesus, an anak san Ginoo, makakabulig.","Ug si Hesus binulig.","An ngatanan nga pinakadto sa iya nahuwas.","An mga tawo nga nagsasaklay sungkod bug-os nga ira kinabuhi kay nakakalakaw, dalagan ug lukso na.","Nagkaabot an iba, amo nahimo magpurot tungod san leprosi.","Sira nahimo buo ug maglimpyo kay ginhuwas sira ni Hesus.","An mga lalaki ug babaye nga ginsisinamok han mga yawa nagtindog sa atubangan ni Hesus.","Ginsugo ni Hesus an mga yawa nga bayaan sira.","Ug sa pagtuod san yawa, an mahahadlukon, masurub-on nga mga tawo nagin kalmado ug malilipayon.","Luyo han kadam-an, may ada upat ka mga lalaki nga naniningkamot nga buligan an ira sangkay ngadto kan Hesus.","Pero diri sira maka duok ngadto sa iya.","Ano an ira bubuhaton?","Ira gin alsa na masakiton ngadto san bubong san balay, ...","an upat nga matinumanon nga magsarangkay gin baklas an bubong san balay ug ira iginturos tipailarom an ira sangkay.","Si Hesus nakakita nga an upat nga magsarangkay kay mayaon pagtoo.","Nagsiring siya sa masakiton nga lalaki, \u201CNapasaylo na an imo mga sala.","Alsaha an imo higdaan ug paglakaw.\u201D An lalaki binuhat, maupay ug makusog.","Gin huwas siya ni Hesus.","Waray pag-iha, si Hesus ug an iya mga disipulo nakasakay na sa baluto.","Mayaon makaharadok nga bagyo an hinuyop sa dagat.","Nakaturog si Hesus.","\u201CGinoo, luwasa kami,\u201D singgit nira.","\u201CMahahanaw kami!\u201D \u201CUkoy,\u201D sugo ni Hesus san balud.","Deretso, an dagat nagkalma.","\u201CAno nga klase sin tawo ini?\u201D Huring san iya mga disipulo.","Bisan an hangin ug dagat nagtuod sa iya.","Ug sira nag ayon nga si Jesus anak san Ginoo kay tungod san iya mga milagro nga nagpakita san iya himaya.","Diri batid an mga disipulo, pero makakakita sira kan Hesus nga magbuhat sin ungod pa nga mga milargo sa katawhan sa iya pagalagad san Ginoo.","An mga Milagro ni Hesus An istorya tikang san mga pulong san Ginoo, an Biblia, makikita sa Mateo 8-9, Marcos 1-2, Marcos 4, Lukas 4, Lukas 8, Juan 2 \u201CAn aragian san Imo mga Pulong naghahatag lamrag.\u201D Salmo 119:130 Katapusan Ini nga Bibliahanon nga storya nag susumat ha ato han kaupaya ha Ginoo nga naghimo ha ato ngan iya buot nga kumila ka ha iya.","Maaram an Ginoo nga kita naka himo hin magraot nga mga butang, iya ini gintatawag nga sala.","An silot hini nga sala mao an kamatayon, tungod kay hinigugma ka hin ungod han Ginoo iya gin padara an iya bugtong Anak, hi Jesus, para mamatay ha kros ug silotan para sa imo mga sala.","Ngan hiya nabanhaw ug sinaka sa langit!","Kon ikaw na too kan Jesus ug naaro ka kapasayluan han imo mga sala, iya iton bubuhaton.","Makadi hiya yana ug pagpuyo ha imo, ug ikaw liwat ha iya hangtod ha kadayunan.","Kon ikaw na too nga mao ini an kamatuoran, e sugad ini ha Ginoo: Hesus, na too ako nga ikaw an Ginoo, nagpakatawo ug namatay para ha ako mga sala ug ikaw nabanhaw.","Pakadi ha ako kinabuhi ug pasaylo-a an akon mga sala, para magkayaon ak bago nga kinabuhi, ug sayo ka adlaw ako makaupod ha imo ngadto ha kahangtoran.","Buligi ako han pagsunod ha imo ug mabuhi para ha imo nga imo anak.","Amen Basaha an Bibliya ug paki istorya han Ginoo kada adlaw!","Juan 3:16"]},{id:"bfc-the-first-easter",title:"The First Easter",source:"BFC",license:"free to copy, not for sale",paras:["An babaye nagtugbos han bungtod, an iya masurubon nga mata nagkikita sin makaharadlok nga taran-awon.","An iya anak mamamatay na.","An ini nga iroy kay si Maria, ug nagtugbos siya hirani san lugar kon diin gin raysang sa kros si Hesus.","Nahano nga nahitabo ini ngatanan?","Kay ano nga mabaysay nga kinabuhi ni Hesus matatapos lamang hin makaharadok nga kataposan?","Kay ano nga gintugotan ini han Ginoo nga an iya anak ma raysang sa kros ug mamatay?","May ada ba sayop nga nabuhat si Hesus?","Napakyas ba an Ginoo?","Wara ka pakyas an Ginoo.","Si Hesus wara pagbuhat hin sayop.","Maaram daan si Hesus nga papatayon hiya han mga magraot nga tawo.","Pipira ka adlaw antis mamatay si Hesus, may ada babaye nga nagabot ug nag bubo haplas ha tiil han Ginoo.","\u201CNagkakarag la hiya han iya kwarta,\u201D an siring han mga disipulo.","\u201CGin himo iton niya para sa ako lubong.\u201D Makaurosa nga pulong!","Kahuman sini, hi Judas, sayo sa mga disipulo ni Kristo, ginlingo hi Hesus ngadto han labaw nga Padi balyo hin 30 ka bugos nga plata.","Didto han fiesta han Judio nga Pakua, hi Hesus nagpanihapon ha ultimo nga higayon kaupod an iya mga disipulo.","Ginsumatan niya hira han magupay nga pulong ug saad han Ginoo han mga tawo nga aghihigugma ha iya.","Ngan si Hesus naghatag tinapay ug baso nga ira pagbarahinan.","Ini nahitabo pagpahinumdom nga an lawas ug dugo ni Kristo gin hatag para han kapasayluan han mga sala.","Ug nagsiring hi Hesus han iya mga disipulo nga may maglilingo ha iya, ug maglilirong hira.","\u201CDiri ako maglilirong,\u201D sugad ni Pedro.","\u201CDiri pa matugaok an manok, iglilirong mo na ako hin makatulo,\u201D siring ni Hesus.","Siton nga gab-i, Si Hesus nagpakadto han Hardin han Getsemani para magampo.","An mga disipulo nga umupod ha iya nanhin ngaturog.","\u201CAmanhan ko,\u201D pagampo ni Hesus, \u201C...","Inabot na an takna.","Diri ini ako pagbuot, kondi natuman na an imo pagbuot.\u201D Mayaon nagkaabot nga oripon sa hardin, gin papangulohan ini Judas.","Si Hesus wara umato ha ira, kondi si Pedro gin tigbas an talinga han usa ka lalaki.","Hinayhinay nga gin kaputan ni Hesus an talinga han lalaki ug iya ini gin luwas.","Maaram na daan si Hesus nga api ini han mga pagbuot han Ginoo.","An mga olipon gin dara hi Hesus ha balay han labaw nga padi.","Didto, an pangulo han mga Judiyo nag sugad nga dapat mamatay si Hesus.","Sa dapit, nakadto si Pedro natugbos tupad han tapong han surugoon ug nagkukulaw.","Tulo ka higayon nga nagpakiaana an tawo kan Pedro, \u201CTinun-an ka ni Kristo!\u201D Tulo liwat ka higayon nga iginlirong ini ni Pedro.","Gin panumpa pa ngani ini ni Pedro.","Tuman man nga tinmugaok an manok.","Mala adto boses han Ginoo para kan Pedro.","Nahinumdon si Pedro han gin sugad ni Hesus ug nagtangis si Pedro.","Si Judas nakonsensya liwat.","Maaram hiya nga wara gin buhat nga sala ug kremin si Hesus.","Gin uli ni Judas an 30 ka bugos nga plata nga salapi kondi wara na ini karawata balik han padi.","Gin pilak ni Judas ini nga mga salapi ug ginuwas hiya ug naghikog hiya.","Gin dara han mga padi hi Hesus ngadto kan Pilato, an Gobernador nga Romano.","Nag siring si Pilato, \u201CWara ko makita nga sala hini nga tawo.\u201D Kondi an mga katawohan nag sangpit, \u201CIgraysang hiya!","Igraysang hiya!\u201D Salit gin sunod ni Pilato an katawohan, ginsirotan niya hi Hesus nga mamatay ha kros.","Gin suntok hiya han mga sundalo, gin tuprahan ha kahimo, ug gin latigo hiya.","Gin himuan nira hi Hesus hin korona nga tikang han higlaba nga tunok ug gin duot nira sa iya ulo.","Ngan ira hiya gin rasyang sa kahoy nga kros para mamatay.","Maaram na daan si Hesus nga mapatay hiya sin sugad sit nga paagi.","Batid liwat hiya nga an iya pagkamatay magdadara kapasayloan han mga makasasala nga nasarig ha iya.","Duha liwat ka kreminal an gin raysang magkasiligid niya.","An sayo natoo kan Hesus- ug nahingadto hiya sa Paraiso.","An sayo man waray.","Kapin oras nga paginangtos, nagsiring si Jesus, \u201CNatuman na,\u201D ug namatay.","Natapos na an iya trabaho.","Ginlubong hiya han iya mga tinunan hin pribado nga lubnganan.","Ngan an mga Romano nga sundalo gin bantayan an lubnganan.","Wara makasulod \u2013 ug guwas ngadto.","Kon mao ini an kataposan han istorya, kamakasurobo.","Kondi may ginhimo nga kaupay an Ginoo.","Si Hesus wara pagpabilin nga patay!","Timprano pa sa han aga han Domingo, an iba nga disipulo ni Hesus nakita nira nga liso na an bato han lubnganan.","Paghiling nira han sulod, si Hesus wara na didto.","Usa ka babayi an nagtitinangis ha gawas han lubnganan.","Nagpakita hi Hesus ha iya.","Ngan dagmit hiya nga bumalik aron sumatan an mga disipulo.","\u201CBUHI SI HESUS!","SI HESUS NABANHAW!\u201D Ngan si Hesus inmabot han mga disipulo, iya ginpakita An iya kamot nga ginraysang.","Totoo man gud.","SI HESUS NABUHI BALIK!","Iya ginpasaylo hi Pedro nga ginlirong hiya, ug iya hira gin sugad nga sumatan an ngatanan han nahitabo ha iya.","An Una nga Pagkabanhaw An istorya tikang san mga pulong san Ginoo, an Biblia, makikita sa Mateo 26-28, Lucas 22-24, Juan 13-21 \u201CAn aragian san Imo mga Pulong naghahatag lamrag.\u201D Salmo 119:130 Katapusan Ini nga Bibliahanon nga storya nag susumat ha ato han kaupaya ha Ginoo nga naghimo ha ato ngan iya buot nga kumila ka ha iya.","Maaram an Ginoo nga kita naka himo hin magraot nga mga butang, iya ini gintatawag nga sala.","An silot hini nga sala mao an kamatayon, tungod kay hinigugma ka hin ungod han Ginoo iya gin padara an iya bugtong Anak, hi Jesus, para mamatay ha kros ug silotan para sa imo mga sala.","Ngan hiya nabanhaw ug sinaka sa langit!","Kon ikaw na too kan Jesus ug naaro ka kapasayluan han imo mga sala, iya iton bubuhaton.","Makadi hiya yana ug pagpuyo ha imo, ug ikaw liwat ha iya hangtod ha kadayunan.","Kon ikaw na too nga mao ini an kamatuoran, e sugad ini ha Ginoo: Hesus, na too ako nga ikaw an Ginoo, nagpakatawo ug namatay para ha ako mga sala ug ikaw nabanhaw.","Pakadi ha ako kinabuhi ug pasaylo-a an akon mga sala, para magkayaon ak bago nga kinabuhi, ug sayo ka adlaw ako makaupod ha imo ngadto ha kahangtoran.","Buligi ako han pagsunod ha imo ug mabuhi para ha imo nga imo anak.","Amen Basaha an Bibliya ug paki istorya han Ginoo kada adlaw!","Juan 3:16"]},{id:"bfc-heaven-gods-beautiful-home",title:"Heaven Gods Beautiful Home",source:"BFC",license:"free to copy, not for sale",paras:["Han pagbaya ni Hesus han kalibutan iya gin sumatan an iya mga tinunan han Langit.","Iya ini gintatawag nga \u201CBalay san ako Amahan\u201D, ug nag siring hiya nga damu an mga mansion didto.","Mansyon nga daku, mabaysay nga balay.","An langit labaw nga daku ug mabaysay han balay ha kalibutan.","Siniring si Hesus, \u201CMabaya ako para magandam hin lugar para ha iyo.","Ug kon pumakadto para magandam hin lugar para ha iyo, mabalik ako aron pagkarawat ha iyo.\u201D Si Hesus pumakadto ha langit, kahuman niya sumaka han mga patay.","An mga disipulo nakakita, si Hesus gin kuha, ug an dampog nagkarawat ha hiya ug nawara hiya han ira mga pananaw.","Tikang sadto, an mga Kristyano nakahinumdom ni Hesus nga mabalik hiyapagkuha ha ira.","Nagsugad siya nga tidga la siya mabalik, ha panahon nga diri nato ginlalaoman.","KAUPOD HAN GINOO Kondi ano man an mga Kristyanos nga nangamatay antis siya umabot?","An Biblia nag sugad nga sira deresto maupod kan Hesus.","An diri pagukoy ha lawas maukoy kaupod han Ginoo.","KAUPOD HAN GINOO Ginpadayag, an ultimo nga libro han Biblia, nagsusumat ha ato han kaupay han langit.","An pinakamaupay nga butang, sa pinaka-espisyal nga paagi, An Langit an balay sa Dyos.","An Ginoo adto bisan diin, kondi an iya trono adto sa Langit.","An mga Anghel ug mga langitnon nga tawo ginsisingba an Ginoo ha Langit.","Sugad man han mga tinunan sa Dyos nga nangamatay ug sinaka sa Langit.","Sira nagkakanta sin espesyal nga pagdaway ngadto san Ginoo.","IKAW TAKOS TUNGOD HAN IMO DUGO KAY IMO GINTUBOS PARA HA DYOS AN MGA TAWO TIKANG HA MAGKALAINLAIN \u2026 \u2026 NGA TRIBU UG NASOD GINHIMO HIRA NGA GINHADIAN HIN KAPADIAN HIN PAG-ALAGAD HAN ATON DYOS.","(GINPADAYAG 5:9) An pinakaurhi nga pahina han Biblia naghuhulagway han Langit nga \u201CAn Bago nga Herusalem\u201D.","Daku hinduro ini hiya, ug may mga higtaas nga pader.","An pader pariho hin haspe nga bato, sugad katin-aw han Kristal.","Mga Hiyas ug mga maharalon nga bato an nagtatabon han pundasyon han pader, nag-iinggat sin maganyag nga mga kolor.","An kada tagsa nga ganghaan han syudad ginhimo hin sayo nga daku nga perlas!","Adto nga mga dagku nga ganghaan diri nagsasara.","Sulod kita ug kitaa ta an palibot ...","Mas mabaysay pa an sulod han Langit.","An syudad ginhimo ha puro nga bulawan, sugad han matin-aw nga salaming.","Bisan an kalsada kay ginhimo sa bulawan.","An mabaysay, malinaw nga tubig dagat san kinabuhi naawas tikang han trono han Ginoo.","Kadaligid san dagat kay an puno han kinabuhi, nga una nga nakita ha Hardin han Eden.","Ini nga puno espesyal nga ungod.","Namumunga ini hin dose ka lainlain nga prutas, lainlain nga klase kada bulan.","Ug an dahon han puno han kinabuhi para han kahuwasan han mga Nasod.","An Langit wara pagkikinahanglan han sudang ug bulan para han lamrag.","An gamhanan han Dyos an nagpupuno han Langit hin magupay nga lamrag.","Waray gab-i didto.","Bisan an mga mananap sa Langit kay iba.","Sira makisangkayon permi.","An mga lobo ug karnero nagdudungan pagkaon.","Bisan an mabagsik nga leon nakaon hin dayami pareho han baka.","Samtang ato gin-oobserbahan an palibot, nakita nato nga may mga butang nga wara sa Langit.","Waray mga pulong han kasina nga mababati.","Wara nag-aaraway ug waray hakog.","Wara trangka an purtahan, kay wara kawatan ha Langit.","Wara mga buwaon, parapamatay, barangan, ug lain pa nga mga daotan nga tawo.","Wara bisan nano nga makasasala sa Langit.","Sa Langit kaupod an Gino kay waray luha.","Sa tuna danay, an tawo san Ginoo nagtatangis tungod han daku nga pagsubo sa kinabuhi.","Sa Langit, ginpapahiran san Ginoo an ngatanan nga luha.","Waray liwat kamatayon sa Langit.","An katawhan nabubuhi kaupod an Ginoo ngadto sa kadayonan.","Waray sakit, waray bulag, ug waray lubong.","An ngatanan sa Langit maglipayon kaupod an Dyos.","Labaw han ngatanan, an Langit para han mga lalaki ug babaye (ug mga adulto) nga natoo kan Jesu-Kristo nga ira magtaralwas ug ira ginsusunod nga ira Dyos.","Sa Langit may libro nga gintatawag nga Libro han Kinabuhi han Kordero.","Puno ini han ngaran han katilingban.","Batid ka ba kon hino an mga ngaran nga nakasurat didto?","An tanan nga tawo nga nasarig kan Hesus.","An imo ba ngaran aadto?","An katangposan nga pulong ha Biblia mahitungod ha Langit kay maupay nga imbetasyon.","\u201CAn espiritu nagsiring, \u2018Pakadi!\u2019 Ug an ngatanan nga bumati ha iya gin sugad \u2018Pakadi!\u2019 Ug an ngatanan nga nauuhaw ha iya pakadi.","Ug kon hino man maghingyap, tagan han tubig han kinabuhi.\u201D Langit, an Maupay nga Balay han Ginoo An istorya tikang san mga pulong san Ginoo, an Biblia, makikita sa Jaun 14; 2 Korinto 5; Pahayag 4, 21, 22 \u201CAn aragian san Imo mga Pulong naghahatag lamrag.\u201D Salmo 119:130 Katapusan Ini nga Bibliahanon nga storya nag susumat ha ato han kaupaya ha Ginoo nga naghimo ha ato ngan iya buot nga kumila ka ha iya.","Maaram an Ginoo nga kita naka himo hin magraot nga mga butang, iya ini gintatawag nga sala.","An silot hini nga sala mao an kamatayon, tungod kay hinigugma ka hin ungod han Ginoo iya gin padara an iya bugtong Anak, hi Jesus, para mamatay ha kros ug silotan para sa imo mga sala.","Ngan hiya nabanhaw ug sinaka sa langit!","Kon ikaw na too kan Jesus ug naaro ka kapasayluan han imo mga sala, iya iton bubuhaton.","Makadi hiya yana ug pagpuyo ha imo, ug ikaw liwat ha iya hangtod ha kadayunan.","Kon ikaw na too nga mao ini an kamatuoran, e sugad ini ha Ginoo: Hesus, na too ako nga ikaw an Ginoo, nagpakatawo ug namatay para ha ako mga sala ug ikaw nabanhaw.","Pakadi ha ako kinabuhi ug pasaylo-a an akon mga sala, para magkayaon ak bago nga kinabuhi, ug sayo ka adlaw ako makaupod ha imo ngadto ha kahangtoran.","Buligi ako han pagsunod ha imo ug mabuhi para ha imo nga imo anak.","Amen Basaha an Bibliya ug paki istorya han Ginoo kada adlaw!","Juan 3:16"]}],vt={nga:"connects modifiers and nouns, and between clauses.",an:"the (completed / past)",han:"of / the (past object)",ha:"to / at / in",mga:"plural marker (the \u2026s)",hin:"a / some (object)",na:"already",it:"the (now / general)",iya:"his / hers",ngan:"and; plus.",waray:"speaker of Waray",hi:"the (before a name)",ini:"this (near)",pa:"still / yet",hiya:"he / she",ug:"and; plus.",kay:"because; for a reason; than.",ni:"of / by (before a name)",ako:"I",may:"indicates presence, or place",diri:"not; no; negative.",ba:"makes a yes/no question",hira:"they",imo:"yours / your",ira:"theirs",para:"for;",liwat:"also / too",ginoo:"Lord",akon:"mine / my",usa:"one",niya:"his / her",away:"quarrel; fight 2 to quarrel with; to",kan:"to / for (before a name)",kun:"if; when.",ano:"what",iton:"that (near you)",tawo:"person/human.",duro:"excessive; radical; extreme; intense;",didto:"there (far)",bata:"child 2 bathrobe 3 uncle. 1",ko:"my (short)",nanay:"mother.",adlaw:"day;sun.",anak:"child/offspring.",balay:"house.",siday:"poem.",aton:"ours (incl)",adto:"that (over there)",pulong:"word.",kita:"we (inclusive)",tatay:"father.",tikang:"from; start.",dida:"there",nira:"their",ada:"there is / has (with 'may')",babayi:"female;woman 2 female animal. 1",kami:"we (exclusive)",lalaki:"boy; male person 2 male",amo:"correct;",amon:"ours (excl)",siring:"say; says.",maupay:"good.",sala:"hall; drawing room; part of the house where visitors",bisan:"even if; inspite of; any.",dinhi:"here (this place)",gihapon:"also / still / as well",yana:"now; at present.",damo:"many;abundant.",iyo:"yours (pl)",sugad:"like/as if.",baga:"like; similar;",iba:"other; variety;different 2 cicca acida & cicca",kamo:"you / y'all",tuna:"earth.",sumat:"news; reports; in
