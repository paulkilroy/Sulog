Mira ha iya nanay ngan tatay ngan sumiring; "Nanay, tatay, kunta pirmi nala Huybes kada adlaw!" Nagkatatawa an iya nanay ngan tatay! Nagkatatawa hira ngatanan!'],titleEn:"Every Day Thursday",questions:[{q:"Why were Mira's parents not at home?",options:["They went to the market","They went to school","They went to visit a neighbor"],answer:0},{q:"What made Mira very happy?",options:["Her parents bought her new shoes","Her parents bought the things she asked for","Her parents brought home a puppy"],answer:1}]},{id:"bloom-an-bao",title:"An Bao",source:"Bloom",license:"cc-by-nc",paras:["Tumago ha luyo han bato.","Bisan diin hiya nakadto.","Balay niya pirmi aklo.","Naukoy hiya ha sapa.","Kay naayon hiya han baha."],titleEn:"The Turtle",questions:[{q:"Where does the turtle live?",options:["In a tree","In a river","In a house"],answer:1},{q:"What does the turtle always carry?",options:["Its home","A basket","A stone"],answer:0}]},{id:"bloom-an-tulo-nga-magsarangkay",title:"An Tulo nga Magsarangkay",source:"Bloom",license:"cc-by-nc",paras:["Usa ka gab-i mapawa an bulan, nag uru-istorya hira Tristan, Jolo ngan Anton. Dako an tingog ngan tawa ni Tristan.",'Ginsaway hira ni Mana Lita. "Kabataan, hinaya an iyo tingog kay nakakaistorbo na kamo." saway ni Mana Lita nga pinipiraw.','Ginsigawan nira Jolo ngan Anton hi Tristan. "Hala ka, Tristan! Hala ka, Tristan!" sigaw han duha. Tungod han kaawod, pumurot hiya hin bato ngan ginlabay an atop nira Mana Lita.','Kinalasan hira Mana Lita. Nahimangno hira ngatanan. Iksakto nalabay hi Mano Solomon kay nagroronda. Ginsaway niya hi Tristan. "Kay ano nga nanlalabay ka man?" pakiana ni Mano Solomon. Nandadlagan an magsaarangkay.',"Kinabuwasan, ginkadto ni Mano Solomon an mga balay han magsarangkay.",'Ginpatawag hira upod an ira mga kag-anak para pagtuhay. "Kay ano nga nanlabay kamo han atop nira Mana Lita?", pakiana ni Kapitan Eddie. "Hi Tristan po adto kapitan," baton ni Jolo. "Ginsaway la po hiya nanlabay dayon," baton liwat ni Anton.',"Para matapos na an pagtuhay ha ira ni Kapitan, nangaro hin pasaylo an magsarangkay ngan ira mga kag-anak kan Mana Lita. Tikang hadto, an maagsarangkay in nagsaad nga diri na hira mag-uutro."],titleEn:"The Three Friends",questions:[{q:"Why did Mana Lita scold the children?",options:["They were too noisy","They broke a plate","They were late for school"],answer:0},{q:"What did the friends and their parents do in the end?",options:["They moved away","They asked Mana Lita for forgiveness","They blamed Mano Solomon"],answer:1}]},{id:"bloom-an-pakla-nga-mayakan",title:"An Pakla Nga Mayakan",source:"Bloom",license:"cc-by-nc-sa",paras:["Ha usa nga lugar, may ada usa nga Pakla nga masyado hin kamayakan.Nakausa, ginpakianhan niya an nga tanan nga mga hayop kun ano an karuyag kaunon han ira mga anak.",'Ginpakianhan niya an Tamsi, "Ano an karuyag kaunon han imo mga anak?"','Bumaton an Tamsi, "Karuyag kumaon han akon mga anak hin mga apan." Bumaton an pakla, "Oh, asya!"','Ginkadto han Pakla nga dako an baba an Baboy, ngan iya ginpakianahan, "Ano an karuyag kaunon han imo mga anak?"','Bumaton an Baboy, "Karuyag uminom hin gatas an akon mga anak." "Oh asya!", baton han pakla.','Kumadto hiya han Itik ngan nagpakiana, "Ano an karuyag kaunon han imo mga anak."','Bumaton an Itik, "Karuyag kumaon han akon mga anak hin gudti nga mga prutas." Oh asya,"baton han Pakla nga dako an baba.','Kumadto han Buaya an Pakla ngan pumakiana, "Ano an karuyag kaunon han imo mga anak?". Han pagkita, nalipay an Buaya ngan gumuliat, "Ooooohhhhhh" Humadlok hin duro an Pakla pakabati niya han guliat han Buaya.',"Mga Pakiana: 1. Ano an pakiana han Pakla ha mga hayop? 2. Ano an baton han Tamsi ha pakiana han Pakla? 3. Ano an karuayag kaunon han mga anak han Baboy? 4. Ano an siring han Itik ngadto han Pakla nga karuyag kaunon han iya mga anak?"],titleEn:"The Talkative Frog",questions:[{q:"What did the frog ask the animals?",options:["Where they lived","What their children liked to eat","Why they were sleeping"],answer:1},{q:"Why did the frog become very afraid?",options:["The crocodile shouted","The bird flew away","The pig chased him"],answer:0}]},{id:"bloom-an-istorya-han-pormado-nga-bato-han-kand",title:"An Istorya Han Pormado Nga Bato Han Kandiwata",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa ha mga sikat kadtuon yana ha isla han munisipyo han Daram an ira bantog nga pormado nga bato o rock formation nga gintatawag nga kandiwata . An pulong nga Kandiwata in nagtikang sa lokal na termino han mga waray nga an karuyag sidngon in lugar o puroy-anan han mga diwata, engkanto o mga linarang nga diri nakikit-an han mga ordinaryo nga tawo.","Sumala han istorya han mga kalagsan, an ini nga pormado nga bato nga baga han nalutaw ha butnga han kadagatan in usa daw nga dako nga barko nga may mga sakay nga pasahero nga nagnanabigar hadto, nga kun diin samtang ini in nagbibiyahe ha butnga han kadagatan in may kalipay nga nahitatabo ha sulod han barko, may ada mga nagkakaranta, nagsasarayaw, nagkakatatawa, ngan nangugugli-at nga mga pasahero.","Ha butnga han ira karisyuhan nakit-an han mga tawo an usa babayi nga may ada kugos nga misay ngan ira ini ginhimo nga pag-intrimisan ginkuha an misay ngan ginkariguan, ginbadoan ngan ginpasayaw-sayaw han mga tawo an nasabi nga misay, nga kun diin mas nagin marisyo pa hin duro an mga tawo samtang nagnanabigar ha kadagatan. Ngan waray pag-iha.","Nga tumigda la nga naglain an panahon ngan nagsirom an bug-os nga palibot ngan nagkamay ada hin makusog nga dalugdug ngan kidlat nga asya an naka-igo ha barko ngan ini nagin usa nga dako nga bato ngan nagporma hin sugad hin dako nga barko. Hito mismo nga oras pagkahuman han panhitabo in tigda la nga nagmingaw an bug-os nga palibot. An dako nga barko nagin usa nga dako nga bato.","Ha pagkayana ini nga pormado nga bato in pareho hin usa nga barko nga nalutaw ha butnga han kadagatan. Ngan ini in maupay ngan kamakaruruyag pagkit-on.","Dugang pa han istorya han pipira nga mangirisda nga nag-uukoy hirani ha kandiwata, nasiring hira nga danay may mga panahon nga nagpaparawa ha gab-i an pormado nga bato, ngan may ada mga tingog nira nga nahibabati-an nga mga nagririsyo nga sugad hin may ada sarayaw an mga diwata o engkanto. Asya daw adto an mga tawo nga sakay hadto han barko nga nagin usa nga bato.","Dugang pa nga istorya han pipira nga mga residente han usa barangay nga naukoy hirani ha kandiwata, an siring nira nga kun mangangawil o mananakop ka hin mga isda nga harani ha kandiwata in kinahanglan mo anay magsarit sa dako nga bato (kandiwata) para diri daw magkamay ada hin problema sugad han: pagkaruba han imo sarakyan, pagkasangit han imo pukot, pagpapaabat han mga diwata ngan engkanto ha imo o di ngani diri kana makakauli haiyo panimalay .","Bisan ha pagkayana kun may napakadto didto nga mga turista nga karuyag mangarigo o magpahalibway hira gin sasagdunan nga magsarit anay ha pormado nga bato ha bisan ano nga karuyag nira buhaton didto.","Dugang pa nga siring nira nga kinahanglan mo mag-itsa hin sinsilyo antis ka umuli o bumaya hito nga lugar para daw diri mag-isog o mabido an mga diwata o engkanto nga nangungukoy didto.","An ini nga istorya in sumala o nagtikang ha mga mga tawo nga nagkamay ada han mga eksperyensya, mga nahikit-an ngan mga nanhibati-an mahiunong ha kandiwata. Nga kun diin bisan ha pagkayana nga panahon ini in imo hibabati-an nga istorya mga tawo nga naukoy hirani ha kandiwata.","Usa nga mahusay nga dagat-panan-awon (tourist spot) an pormado nga bato han kandiwata ( kandiwata rock formation), nga gindadayo yana han mga turista nga natikang ha mga hagrani nga lugar han Daram. Maupay didto mangarigo kay an tubig malimpyo ngan matin-aw. Ini in usa nga natural nga karikuhan nga maidadasig han mga tawo nga mulopyo han munisipyo han Daram. Nga angay naton timangnuon, paghirutan ngan ipadayon an kalimpyo han kadagatan. Pagkaada hin pagrespeto ngadto han mga tawo nga nagkamay ada hin eksperyensiya mahiunong han ira mga istorya hiunong han kandiwata.","Aton tagan hin importansiya an mga mag-upay nga mga panan-awon nga aada nakikita ha aton mga lugar. Aton atamanon, timangnuon ngan ipadayon an kalimpyo han aton kalibungan, kadagatan ngan kagurangan. paghatag hin respeto ngadto han mga tawo nga naghahatag han ira mga istorya tikang han mga butang nga ira naekperyensiyan, nakit-an ngan nanhibati-an. Damo nga Salamat!"],titleEn:"The Kandiwata Rock",questions:[{q:"What do people say the Kandiwata rock once was?",options:["A big ship","A tall mountain","A lost house"],answer:0},{q:"What lesson does the story teach?",options:["Ignore old stories","Care for beautiful places and respect local stories","Never visit the sea"],answer:1}]},{id:"bloom-an-bukad-ha-libong-ni-apoy-garing",title:"AN BUKAD HA LIBONG NI APOY GARING",source:"Bloom",license:"cc-by-nc-sa",paras:["Hi apoy Garing usa nga mahilig magtinanon bukad pero diri gud hiya gintutudkan hin mga tanom nga nabukad labot la ha usa nga tanom ini an tanom nga nabukad hin rosa.",'Pirmi ni apoy Garing gindadayaw ngan gintitimangno an iya bukad nga rosa. "Ikaw an bukad nga akon ginhihigugma kay ikaw la an tumurok han akon gin tanom ngan an kolor mo nga pula amo an akon paburito."',"Usa ka gab-i, gin kuha han usa nga ulitawo an iya tanom nga rosa. Pagkaaga pagkita ni apoy Garing ha iya libong waray na an iya minayuyo nga rosa. Naging masinalub-on hi apoy Garing kay nawara an iya tanom nga rosa.","Gin dara han ulitawo an tanom ni apoy Garing nga rosa ngadto han libong han iya gin gagarbohan.","Pagkaaga nalipay an daraga han iya nakita kay may usa nga tanom nga mahusay pagkinitaon. Iya gin daop ngan gin obserbahan. Na hunahunaan niya nga waray hiya tanom sugad hini kamahusay.",'Nahibaroan han enkantada nga alibangbang an nahinabo ngan nalooy ini kan apoy Garing. Lumupad an enkantada nga alibangbang kan apoy Garing kamot ngan nagsiring "Apoy Garing nakita ko an imo kabidoan han kawara han imo tanom nga rosa, yana an imo mga kamot tatagan kon bendisyon para bisan man ano nga tanom maturok kon ikaw an magtanom."',"Nalipay gud hi apoy Garing han gisiring han enkantada nga alibangbang ngan nagpasalamat sanglit kumadto dayon hiya ha iya libong ngan nagbungkag han tuna para han tatanoman nga mga tanom.","Ngan mga pira ka adlaw nanubo an mga tanom ni apoy Garing nga nakita niya an magka iba-iba nga bukad nga maghusay.",'Ginkadto han enkantada nga alibangbang an ulitawo ngan an daraga ngan nagsiring "ulitawo diri maupay an imo gin buhat, kay ano ginkuha mo an tanom nga rosa ni apoy Garing?"','Nangaro hin pasaylo an ulitawo han enkantada nga alibangbang. "Pasayloa ako han akon nabuhat kay tungod ginhigugma ko an akon gingagarbohan kay mahilig hiya hin mahusay nga bukad sanglit ginkuha ko an tanom nga rosa ni apoy Garing". Bumaton an enkantada nga alibangbang "pangaro pasaylo kan apoy Garing han imo gin buhat kay kon diri ako an maghahatag ha imo hin sirot ha imo".','Nagtangis an daraga ngaha atubangan han nangunguyab ha iya tungod han ginbuhat hini. "Pangaro pasaylo kan apoy Garing han imo ginbuhat." An siring han daraga kan Lindo. "Oo mangangaro ako pasaylo. Pasayloa liwat ako han akon nabuhat" an baton ni han ulitawo ha iya gingagarbohan. Kumadto dayon hira kan apoy Garing para mangaro han kapasayloanan.','Han nakadto na hira kan apoy Garing libong nangaro hira hin kapasayloanan. "Pasayloa ako apoy Garing han akon ginbuhat" an siring han ulitawo. "Okey la intoy maupay kay nag amin ka han imo ginbuhat. Malipayon ako yana kay may ada na ako bago na mga tanom nga nabukad hin rosa ngan iba pa nga mga bukad". An baton ni apoy Garing.',"Waray hi apoy Garing mag-isog kundi naging malipayon pa hiya han may ada hiya yana. Gintagan pa niya ulitawo ngan an daraga hin mga taramnon. Tikang hadto naging magsuok hira nga magsarangkay ngan nananom hira hin mga iba-iba nga mga bukad sanglit naging maupay ngan mahusay an ira barangay."],titleEn:"Apoy Garing's Flower",questions:[{q:"What happened to Apoy Garing's rose plant?",options:["A young man took it","It died in the rain","A bird ate it"],answer:0},{q:"What blessing did the enchanted butterfly give Apoy Garing?",options:["She could fly","Any plant she planted would grow","She would find gold"],answer:1}]},{id:"bloom-an-malipayon-na-paragsudoy",title:"AN MALIPAYON NA PARAGSUDOY",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa nga malipayon nga tawo hi Pedro.","Pirmi hiya nauli nga may dara nga pagkaon para ha iya pamilya.","Nagmamata hiya hin timprano para mag baligya.","Madali nga nauubos an iya mga baligya kay damo an napalit.","Usa ka adlaw naging masulob-on hi Pedro kay waray napalit han iya tinda.","Kulang na tawo an bungto tungod han pandemya (Covid 19)","Umuli hi Pedro nga masulob-on. Nawawarayan na hiya pag laom.","Nangadi hi Pedro, nga konta mawara na ini nga pandemya.","Paglabay hin usa ka tuig gin balita ha TELEVISION nga may ada na bulong an sakit nga Covid.","Nag lipay hi Pedro han iya nabatian han anunsiyo. Naglipay liwat an iya pamilya."],titleEn:"The Happy Vendor",questions:[{q:"Why did Pedro become sad?",options:["No one bought his goods","He lost his house","His family left town"],answer:0},{q:"What made Pedro and his family happy again?",options:["They moved to another town","They heard there was medicine for Covid","They found a new boat"],answer:1}]},{id:"bloom-pagtimangno-hin-panlawas",title:"Pagtimangno hin Panlawas",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa ka adlaw samtang nagmumulay hi Potpot. Nakabati hiya han tunog han budgyong. \u201Ceeeeennnngggg eeennngggg\u201D tunog han budgyong \u201CGinpapasabot nga gindidiri an paggawas han mga kabataan ngan pagsalin-urog hin bisan anu nga katitirok,\u201D pag imporma han tanod.","Laksi nga dumalagan hi Potpot pag uli ha ira balay. \u201CNanay, siring han tanod diri na puwede gumawas an kabataan ngan an pagkatitirok,\u201D sumat ni Potpot kan iya nanay. \u201CUu, kay mahitungod ito hit nakalat yana nga sakit, \u201D siring ni nanay.",'Nanhunahuna hi Potpot ngan masulub-on nga sumiring. \u201CDiri na kami makakag-uyas hit ak kasangkayan, ngan diri kami makaka eskwela.\u201D "Makaka eskwela kamu pero dinhi la kamu ha balay," siring han nanay. "An aton angay buhaton atamani naton an aton kalugaringon nga diri kita matapnan hin sakit," dugang nga siring ni nanay.',"\u201CPara malikayan ito nga sakit kinahanglan kita sumunod hit mga ginpapatuman na mga protocol ha panlawas,\u201D dugang nga siring ni nanay. \u201CAnu it kinahanglan buhaton nay?\u201D pakiana ni Potpot. Gin usa-usa ni nanay an angay buhaton. \u201CAgsob ngan kaangayan nga paghugas han mga kamot gamit an sabon,\u201D baton ni nanay.",`"Pagtakop han baba ngan irong gamit an panyo, kun waray panyo puydi lwt an pako' han bado,ngan paharayo ha mga katawhan kun maubo" siring ni nanay. "Pagmantene liwat hin malibsog nga kalawasan, pinaagi hin pagtumar bitamina ngan pagkaon nga masustansya," dugang nga siring ni nanay.`,"\u201CPaunano kita makakapalit hit makakaon naton nay?\u201D pakiana ni Potpot. \u201CAyaw kabaraka manhahatag hira hin ayuda, ngan may ada kita mga tanom nga utanon ha at libong nga puwede naton maluto,\u201D baton ni nanay","\u201CTatagan ko hira Maya ngan Aloy han aton mga utanon,\u201D malipayon nga siring ni Potpot. \u201CUu, manhahatag kita ha aton mga hiripid,\u201D nalilipay nga baton ni nanay.","Tikang hadto ginhimo nga pamatasan han pamilya ni Potpot an agsob ngan isakto nga paghugas han kamot ngan pagsugot ha mga protocol panlawas para makalikay ha mga nakakatapon nga sakit."],titleEn:"Taking Care of Health",questions:[{q:"Why were children told not to go outside or gather together?",options:["Because of a spreading sickness","Because of a storm","Because school was over"],answer:0},{q:"What did Potpot's family start doing regularly?",options:["Selling vegetables","Washing hands and following health rules","Traveling to other towns"],answer:1}]},{id:"bloom-an-banog-ha-bukid-huraw",title:"AN BANOG HA BUKID HURAW",source:"Bloom",license:"cc-by-nc-sa",paras:["Malipayon nga naglilinupad-lupad hi Banog ha kagugub-an.","Nakita niya an hitaas nga Bukid Huraw.",'Nagsiring hiya. "Bukid Huraw kaya ko lumupad ngan labwan an im kahitaas!"',"Gin andam niya an iya kalugaringon para paglupad.","Han iya paglupad, tigda may umabot nga bagyo.",'"Kaya ko ini! kaya ko ini!" An siring ni Banog ha iya kalugaringon. "Wusssssss...". An tunog han makusog nga hangin nga natapo kan Banog han iya paglupad.',"Han kakusog han hangin waray kayaha ni banog nga makalampas ha kahitaas han Bukid Huraw ngan nahulog hiya ha mga puno han kahoy.","Napiolan hi Banog han iya kahulog.",'Nagsiring hi Banog ha iya kalugaringon, "diri ko na pipiriton tak kalugaringon kon diri ko kaya para diri ako mahingadto ha karat-an".',"Ngan tikang hadto naging malipayon nala hi Banog maglinupad-lupad palibot han Budik Huraw."],titleEn:"Banog and Mount Huraw",questions:[{q:"What did Banog try to do?",options:["Fly higher than Mount Huraw","Build a nest on Mount Huraw","Hide from the storm"],answer:0},{q:"What did Banog learn after falling?",options:["Never fly again","Not to force himself when he cannot do something","Mountains are easy to beat"],answer:1}]},{id:"bloom-hi-kaha-kahon",title:"Hi Kaha, Kahon",source:"Bloom",license:"cc-by-nc-sa",paras:["Umandar na an bus nga ginsasakyan ni Kaha. \u201CKamalipog man hini nga akon pagbiyahe\u201D, reklamo ni Kaha. Sapit niya an dako nga sako han mga utanon ngan malangsa nga balde han isda.",'Usa\u2026 duha\u2026 tulo\u2026 tulo ka oras nga pagbay-og an gin-abat ni Kaha. Natapos gihap an iya beyahe. "Yeheey! Makakagawas na ako hini nga lugar", malipayon nga siring ni Kaha.','"Kamakaluluoy ko man kitaon", masulob-on nga siring ni Kaha. Brown an iya kolor nga may gudti nga mga luho ha ligid niya. Pinaagi han dulaw nga higot, nasisirahan an tapotapohon nga iya abrihan.',"Dalidali hiya nga ginkuha han iya agaron ha iya kinamumutangan. Ginkaptan an dulaw nga higot nga ginhigot ha iya. Nahipausa hiya han iya nakita-an. \u201CWow! kamaupay man hini nga lugar.\u201D, nalilipay nga siring ni Kaha.","Dagko ngan higtaas nga bilding an aada ha iya atubangan. Iba ini ha iya gintikangan nga simple nga balay. Haros usa ka barangay an kahiluag hini ngan baga hin maabot na ngadto ha langit ha subra hin kahitaas.",'Ginbutang hiya han iya agaron ha pushcart ngan ginsulod hiya ha maanyag nga bilding. Puno hiya hin ginhamis nga mga bagol hin lubi. "Oy tigda nga umabri an purtahan!", nahipausa nga siring ni Kaha.',"Nakita niya an mainggat nga salog. Makaruruyag pagkit-on an iba-iba nga klase hin mga light. Iba-iba nga kolor han mga butang an iya nakikita ha kada estante nga ira gin-aagian.",`"Kadadamo man hin tawo ha palibot', yakan ni Kaha. "Siguro kay mahagkot ini nga lugar". "Makikita ha ira nawong an kalipay ha pamamasyada, pagkaon ngan pamamalit", hunahuna ni Kaha.`,"Ginbutang hiya sulod hin usa nga tindahan. Puno ini hin mag-upay nga mga pandekorasyon. Nakita niya nga gintagan hin kwarta an iya agaron kabalyo ha iya ngan lumakat na. Nasubo hi Kaha. \u201CKay ano ako ginbayaan han akon agaron?\u201D, nahihingatangis nga siring ni Kaha. \u201CTungod ba kay luma na ako?\u201D. \u201CWaray nagud ada ako pulos ha iya\u201D, tangis ni Kaha.",'Nabatian hiya ni basurahan. \u201CDiri ito ungod sangkay. Tanan kita may ada mga pulos dinhi ha tuna", isplikar ni Basurahan. \u201CDiri karuyag signgon nga waray ka na pulos kun ginbayaan ka man han imo agaron ".','\u201CKitaa daw ako. Malipayon ako kay maaram ako nga dako it akon nahibubulig ha kalibungan", dugang nga siring ni Basurahan. \u201CGinbubutang ha amon an mga maghugaw nga mga butang para diri magin mahugaw an kalibungan."','\u201CTama hi Basurahan. Kami gihapon imbis nga iglabog aadi kami para magamitan pa\u201D, an siring han mga bagol hin lubi. "Ginhihimo kami nga pandekorasyon ha bahay, uyagan ngan puydi liwat mahimo nga garamiton ha pagluto.\u201D',"Waray pag-iha, umabot an anak han tag-iya han tindahan. Ginkuha an iya sulod ngan gintrapohan. \u201CKailangan ko ikaw kay waray ako nasusudlan hin mga gudtiay nga pantinda\u201D, siring han bata.",'Ginputos hiya hin malimpyo ngan bukadbukaron nga papel. May ada pa ginbutang nga pula nga ribbon ha bawbaw han iya takop. Nakita niya an iya kalugaringon ha espiho ha tindahan. "Kamakaruruyag kitaon it akon kalugaringon", nalilipay nga siring ni Kaha.','Tikang hadto, natood na hi Kaha nga tanan nga butang may ada pulos. Gin-apresyar niya an iya kalugaringon kay diri na hiya makalolooy kitaon ngan diri pa hiya makakahugaw ha kalibungan. "Damo nga salamat han maduruto ngan maabilidad nga bata", malipayon nga siring ni Kaha.'],titleEn:"Kaha the Box",questions:[{q:"Why was Kaha sad in the store?",options:["She thought her owner had left her because she was useless","She wanted to ride the bus again","She lost her ribbon"],answer:0},{q:"How did Kaha learn she still had value?",options:["A child reused her for small items","She became a trash can","She went back to the farm"],answer:0}]},{id:"bloom-an-suok-nga-magsangkay",title:"An Suok nga Magsangkay",source:"Bloom",license:"cc-by-nc-sa",paras:["Magsangkay hi Ela ngan hi Mila. Tungod kay mag anyaw man hira. Suok gud kaupay hira nga magsangkay.","Ha ira pag eskwela magsapit gud hira. An ira mga maestra gindadayaw hira. Ha klase pirmi hira nangunguna.","Mga buruhaton ha balay waray kabudlay. Kay hira nga duha nagbibinuligay. Mga kag-anak nira waray problema.","Bisan ha ira pagpahuway. Pirmi hira nag-iinatubangay. Pangandoy nira dungan nga mapa-uswag.","May nahitabo ha ira kamagsangkay. Hira nagkabulag. Nag usaan nala hi Ela.","Nahingadto hi Mila ha hirayo nga dapit. Hiya nakasala ha ira kamagsangkay. Gin-raut niya Ela ha iba.","Ginpinsar ni Ela an panhitabo. Kada gab-i hiya nagtatangis. Ug hi Ela nagkasakit.","Pirmi naghuna-huna hi Ela kan Mila. Ginhuhulat niya pirmi an pag-abot niya. Iya karawaton nga sakay gihapon.","Nahibaro hi Mila han nahitabo. Nga nasakit an suok niya nga sangkay. Dali-dali nga bumalik hi Mila.","Nagkita gihapon an magsangkay. Ginpasaylo ni Ela hi Mila. Ngan nagpabilin an ira suok nga kamagsangkay."]},{id:"bloom-an-bata-nga-mahilig-hin-dolce",title:"An Bata nga Mahilig hin Dolce",source:"Bloom",license:"cc-by-nc-sa",paras:["Hi Ynah in usa nga bata nga babayi. Gutiay ngan matambok. Ayon niya it mga pagkaon nga magtam-is sugad hit cake, ice cream, tsukolate, softdrinks, lollipop, labi na gud it mga dolce.",'Kun nalakat na ngani it iya Tatay ngan Nanay para magtrabaho pirmi gud hiya naaro hin singko. "Aanhun mo na liwat it kwarta Ynah?" pakiana ha iya ni Tatay.','May ada la po ako papaliton ha tindahan Nay, Tay! siring ni Ynah. "Upaya naman nga diri dolce tim paliton, mas maupay kun tinapay nala anak!" siring han iya nanay.',"Dumiritso hiya daun ha tindahan. Pumalit hiya hin iba-iba nga klase hin dolce, waray hiya bumali han siring ni iya Nanay nga tinapay nala it paliton imbis nga dolce.",'"Maupay nala nga waray kumita hi Nanay nak mga ginpamalit sigurado gud nga pagbubusa-an niya ako!" siring ni Ynah ha iya kalugaringon. Nakakita an iya kuya han iya ginbuhat salit ginsidngan hiya "Upaya la nga la nga diri naman magsinakit it imo ngipon Ynah!" siring han iya kuya.',"Pagkagab-i maupay na an ira pangaturog.",'"Kakaunon ka namon, bisan ka diin magtago, mabibilngan ka la gihap namon rawrrrrrrrr". yakan han mga higante nga dolce. "Ayawwwww!" yakan ni Ynah nga sige it pagdinalagan.','Tigda nga nakagmata hi Ynah, nahangos ngan nakagtuok. "Hin o dawla adi nga nagtitinuok?" siring han iya Nanay. Gumawas hiya han ira kwarto para bilngon kun diin tikang an tuok.','"Naano ka Ynah? kay ano nagtitinuok ka man?" pakiana ha iya ni iya nanay. "Nay nag-inop ako nga ginlalanat ako hin higante nga mga dolce makaradlok!.....nay..... Nay, masakit nanaman tak ngipon huhuhu"....sumat ni Ynah "Waray udog ako tuod kinana nga tinapay nala it palita siring nimo, mga dolce na liwat nak ginkaon kanina. Tikang yana matuod na ako pirmi ha imo nga diri na magpinalit hin mga dolce." yakan pa ni Ynah.','"Hay naku anak, hinaot unta nga pirmi kana manmamati tam mga sagdon ha imo". yakan ni iya nanay. Tikang hadto nga panhitabo, pirmi na hiya nag-totooth brush kada kakahuman niya pagkaon.']},{id:"bloom-mga-kamot-ni-lotlot",title:"Mga Kamot ni Lotlot",source:"Bloom",license:"cc-by-nc-sa",paras:["Usa ka Sabado, nagsarit hi Lotlot kan iya Nanay Lila nga makikimulay hiya ha ira libong Nanay, human na ako manilhig. Pwede ba ako magmulay ha gawas?\u201D pakiana ni Lotlot Oo sige, basta paghirot ikaw ha.\u201D, yakan ni Nanay Lila \u201COpo, nanay.\u201D, baton ni Lotlot.","Marisyo hi Lotlot nga nagmulay ha gawas han ira balay Naghimo hiya hin iba iba nga porma gamit an lagay","Gintawag na hi Lotlot ni iya nanay para mangaon. \u201CLotlot, pakadi na pag meryenda na. Sano ka kumaon, paghinaw anay hit imo kamot ha.\u201D, tugon ni Nanay Lila. Tungod nga guol man hi Lotlot Nahubya hiya paghunaw ngan kumaon dayon hiya hin baduya nga saging","Pagkagab-i nagsakit an tiyan ni Lotlot. \u201CNanay, masakit it akon tiyan.\u201D, nagtutuok nga sumat ni Lotlot. \u201CNaghunaw ka ba han imo kamot kanina pagkatapos mo magmulay ngan sano ka kumaon han baduya?\u201D, pakiana ni Nanay Lila. \u201CWaray po.\u201D, baton ni Lotlot","\u201CAsya nga nagsakit an imo tiyan. Kinahanglan nga permi kita maghuhunaw sano ngan katapos kumaon, katapos magmulay ngan katapos gumamit han kasilyas para malimpyo permi an aton mga kamot. Kumapot ka han baduya nabalhin an kagaw han imo mahugaw nga kamot ngadto han imo pagkaon asya an hinungdan han pagsakit han imo tiyan, Lotlot.\u201D siring ni Nanay Lila","Kumadto hira ha kusina, gintutduan ni Nanay Lila hi Lotlot han eksakto nga paagi han paghunaw. Gin banyosan ni Nanay Lila an tiyan ni Lotlot \u201CDamo nga salamat, Nanay. Tikang yana, pirmi na ako maghuhunaw hit akon mga kamot.\u201D malipayon nga baton ni Lotlot"]},{id:"bloom-an-misay-ni-tisay",title:"An Misay ni Tisay",source:"Bloom",license:"cc-by-nc",paras:["An misay. Alaga ni Tisay.","Busag an misay. Malimpyo an misay.","Ginpapakaun ni Tisay, an iya misay.","Pag nakaturog hi Tisay, nasapit an misay.","Gamit ni Tisay, ginkutkot han yatot.","Nakit-an han misay. Iya ini ginhagad.","Naghulat an misay. Magbabantay kan Tisay.","Ginhigugma ni Tisay, an iya misay."]},{id:"bloom-an-baluto",title:"An Baluto",source:"Bloom",license:"cc-by-nc-sa",paras:['Usa ka adlaw naglalakat hi Mano Boboy ngan Jose tipakadto ha tabi han dagat."Tatay unta damo it aton madakop nga isda yana para damo niyan an sulod han aton baluto". Unta, baton ni Mano Boboy kan Jose.',"Pag-abot nira ha tabi han dagat gin-andam na nira an ira baluto. Ngan nagtikang na pagbugsay hi Mano Boboy.",'"Tatay, kaupay man ngayan pagsinakay hin baluto hano", siring ni Jose. "Oo naman asay pa kun maupay an panahon", baton ni Mano Boboy.','Pag-abot nira ha butnga han dagat. "Jose i-andam na an pukot kay itutunod ta na",siring ni Mano Boboy. "Opo, sigi tatay", baton ni Jose.','Ha di maiha nga oras ginbuligan ni Mano Boboy ngan Jose pag-alsaha an pukot. Nahipausa hira pagkita nga dadamo an sulod nga isda. "Hala tatay, kadadamo man han aton dakop yana! Damo an aton mahisasakay ha aton baluto". Yehey! Yakan nga malipayon ni Boboy.',"Malipayon ngan mahiyum-hiyom hi Mano Boboy ngan Jose samtang nagbubugsay hira han ira baluto tipauli ngadto han ira balay."]},{id:"bloom-waray-na-kakit-i",title:"Waray na kakit-i",source:"Bloom",license:"cc-by-nc-sa",paras:['Han una nga panahon,an aton kagugub an damo an mga kahayupan nga naukoy ngan damo liwat an mga kakahuyan. Napupuno hin kanta hin katamsihan an bug-os nga kagugub an. Maupay hin duro ini nga lugar. "kamalipayon ko nanay nga dinhi kita ha kagugub an naukoy" siring ni tamsi Pikoy kan iya nanay, nagtawa la hi iya nanay ha iya.','An mga iba-iba nga tamsi nagsisibu-sibuay sanglit nagsaway hi iya nanay"bangin kamo madisgrasya hinay-hinay la kamo hit iyu pag-uyag pikoy"siring ni iya nanay, "opo nanay pikoy", baton han anak',"Usa ka adlaw lumakat hira nanay Pikoy kaupod an iya mga anak ug an iba pa nga tamsi para mamiling hin pagkaon. Lumupad hira, kumadto hira ha harayo nga lugar.","Samtang waray hira nanay Pikoy ngan an iba pa nga tamsi umabot an tag iya han tuna ngan pinanmulod nira tanan nga mga kahoy,waray mag iha nawara na an tanan nga kakahuyan.",'Han umabot na hira Pikoy ngan an iba pa nga katamsihan waray na hira balay,waray na liwat an mga kakahuyan,diri na maupay an kagugub an."nanay Pikoy waray na kita uukyan"nahingatangis nga yakan ni tamsi Pikoy, "maghihimo nala kita hin bag o naton nga mauukyan" baton ni nanay Pikoy.',"Naghimo nala hira hin ira mga urukyan nga malay-balay kay waray naman an kagugub an, waray na an mga kahayupan nga nan-ngungukoy nganhi,ngan an damo nga kakakahuyan. Sanglit kamo nga mga bata ayaw niyu pasagdi it aton kagugub-an, pagtanom kamo hin mga kahoy para mayda maukyan an katamsihan."]},{id:"bloom-an-sista-ni-tatay",title:"An Sista Ni Tatay",source:"Bloom",license:"cc-by-nc-sa",paras:['May ada sista hi Tatay. Pinalit ini ni Nanay. "Maupay man ini nga sista", siring ni tatay. Bumaton hi nanay, "Oo, para may ada naton kaliawan".',"Makarit hi tatay magsista. Karuyag ko mamati samtang hiya nagsisista.",'Nagkakanta hi nanay kun nagsisista hi tatay. "Kamaupay ni nanay kumanta", yakan ni ate.',"Nagsasarayaw kami nga mga anak, samtang nagsisista hi tatay ngan nagkakanta hi nanay.","Malipayon an amon pamilya tungod han sista. KATAPUSAN."]},{id:"bloom-an-panapuan-kan-elay",title:"An Panapuan kan Elay",source:"Bloom",license:"cc-by-nc-sa",paras:['Usa ka adlaw, nahimangno hi Elay han karasikas han iya Nanay Maya ha Kusina. "Buhat na dida Elay kay malakat ako" siring han iya Nanay.',"Katima magtima han iya hinigdaan, namahaw hi Elay dungan han iya nanay.",'"Ayaw pagpinasarang dinhi kay malakat ako" pahinumdom ni Nanay. "Oo nanay" baton ni Elay. "An akon panapuan ha?" mahiyum-hiyom nga yakan ni Elay. Naruruyag gud hiya nga an iya paborito an pirmi panapuan ha iya ni iya nanay.','Katapos mo pamahaw panhugas han imo kinaunan ngan pag-alog hin tubig ha? tugon ni Nanay Maya. "Oo, nanay" baton ni Elay.','Kahuman pamahaw ni Elay, gumawas hiya ngan nag-uyag kaupod an iya sangkay. "Niyan nala ako manhihimos ngan mag-aalog kahuman mag-uyag" pinsar ni Elay',"Naliaw hi Elay samtang nag-uuyag. Nahingalimot hiya han tugon ni iya Nanay.",'"Elay, Elay, adi na ako!" tawag ni Nanay Maya. "Halaka! ade na hi Nanay, waray pa ako maghimos ngan mag-alog" nababaraka nga pinsar ni Elay.','Dali-dali nga umuli hi Elay ha ira balay. "Nanay, pasaylua ako. Nahingalimot ako paghimo han imo tugon ha akon kay nag-uyag ako" nagbabasol nga yakan ni Elay. "Halas ige, sunod trabahua anay an akon tugon ha san-o ka mag-uyag. Adi na an imo panapuan ihahatag ko ha imo katapos mo sumugot" yakan ni Nanay Maya.','Malipayon nga nag-himos ngan nag-alog hi Elay. "Diri na ako mautro sunod" Pinsar ni Elay. "Susugton ko anay an iya tugon san-o ako mag-uyag kay gintatagan ako niya han akon pabotiro nga pasalubong".','Kahuman niya maghimos ngan mag-alog malipayon nga ginhatag ha iya ni Nanay Maya an iya paborito nga mani ngan pinyato nga tikang ha Buray. "Hmmmmm.. marasa gud it mani ngan pinyato nga tikang ha buray" siring ni Elay.','"Salamat, Nanay. Sunod masugot anay ako hit imo tugon san-o ako mag-uyag" siring ni Elay.']},{id:"bloom-an-maduruto-nga-parapangisda",title:"An Maduruto nga Parapangisda",source:"Bloom",license:"cc-by-nc-sa",paras:["Ha usa nga bungto han Paranas hirani han dagat may naukoy usa nga pamilya. Ha usa nga simple nga balay malipayon nga nagkakaurusa hira Nanay Ondit, Tatay Omi ngan an ira mga anak.","Pangisda an siyahan nga pangabuhi ni Tatay Omi. Tungod kay waray man hiya makatapos han pag iskoyla.","Maadlaw man o mauran. Mamadlos ngan makusog man it balod nagikan la gihap pakadto ha dagat hi Tatay Omi para magbiling hin ira kakaunon ngan magkaada kwarta.",'Usa ka adlaw, malain an kaoras han panahon. "Omi, ayaw la anay pagkadto ha dagat kay diri maupay it panahon", siring ni Nanay Ondit. "Kon diri ngani ako gumikan waray kita igsusura ngan kakaunon niyan. Waray liwat kita igpapalit gamit kanan pag iskoyla hit kabataan" , baton ni Tatay Omi .','"Sigi, basta paghirot la pirmi ngan ayaw na pagkadto hit kalalawdan",tugon ni nanay Ondit. "Oo, ayaw kabaraka kay pirmi ko gin-aampo nga bantayan kita hit makagarahom nga Diyos", baton ni Tatay Omi.',"Nagtima hi Tatay Omi han iya mga gamit pangisda. Nangudos hiya san-o lumakat pakadto ha dagat.","Kada adlaw amo pirmi ito it kan Tatay Omi ginbubuhat. Kun diri ngani hiya nakakagikan ngadto ha dagat, nabulig hiya ha mga trabahuon ha balay ngan naghuhukot han pukot.","Umabot an damo nga kakurian ngan kawaray kwarta. Pero padayon la gihap hiya han pangisda kay natuod hiya nga makakatalwas hira hit mga kakurian.","Naglabay an mga panahon naging maupay an kabutang han pamilya ni Tatay Omi. Nakatapos pag-iskoyla an iya mga anak ngan may ada na mga trabaho pinaagi han iya paningkamot han pangisda.",'"Tatay, undang na hito nga pagdagat. Kami naman it magtitimangno ha iyo kay may ada naman kami trabaho", pulong ni Andy kan iya tatay. "Sigi la, anak. Samtang kaya pa tak lawas mangingisda la gihap ako kay diri man pirmi it panahon nga may ada kita", baton ni Tatay Omi ha iya anak.','"Damo nga salamat tatay han imo waray kaguol nga pagtimangno ha amon, dugang nga pulong ni Andy kan iya tatay. "Waray sapayan, anak. Obligasyon ito namon nga mga kag-anak. An makagarahom nga Diyos an angay naton pasalamatan ha tanan nga grasya nga iya ginhahatag ha aton," baton ni Tatay Omi.',"Masisiring nga usa nga mahigugmaon nga tatay ngan maduruto nga parapangisda hi Tatay Omi. Apisar han mga kakurian padayon nga naato ha mga problima nga naulpot ha kinabuhi."]},{id:"bloom-ang-kusog-han-gugma-ha-murayaw-nga-edad",title:"Ang Kusog han Gugma ha Murayaw nga Edad",source:"Bloom",license:"cc-by",paras:["Ha usa nga hilumon ngan mahayag nga baryo ha probinsya han Samar, nakatira hi Marites usa nga disi-sais anyos nga babaye nga puno hin damgo ngan paglaum. An ira balay ginbubuhat la tikang ha kahoy ngan yero, pero puno ini hin gugma ngan pagtinabangay.","Hi Marites kilala ha ira eskwelahan sugad nga usa nga matinalahuron, matinumanon, ngan maalam nga estudyante. Pirme hiya nag-aambit ha klase, ngan ginpapabilhan han iya mga maestro an iya kakugi. \u201CDiri gud ako matitimbang,\u201D siring niya ha iya kalugaringon, \u201Ckay para ini ha akon pamilya ngan ha akon tidaraon.\u201D An iya pinakadako nga damgo amo an magin maestra.","Pero ha luyo han iya kalipay, mayda maabot nga pagsulay. Nakilala niya hi Carlo usa nga lalaki nga mas tigulang ha iya. Malambing hi Carlo, ngan pirme hiya naghahatag hin atensyon. Ha murayaw nga edad ngan kakulangan hin eksperyensya, naging duok hira.","Paglabay hin pipira ka semana, napansin niya nga nag-iiba an iya lawas. Nakuratan hiya burod hiya. An iya kalibutan sugad hin nabungkag. Damo nga gab-i an iya ginugol ha pag-ukoy ngan pagtinaluha.","Tubtob nga usa ka gab-i, nagsumat hiya ha iya nanay. \u201CNanay\u2026 burod ako.\u201D Nag-iyakan hira duha. Nasakitan an iya nanay, diri la tungod han nahitabo, kundi tungod han kahadlok para ha tidaraon han iya anak. Tungod han kaulaw, gin-undang anay ni Marites an iya pag-eskwela.","Pero ha kada adlaw nga naglabay, ginbabatian niya an lihok han bata ha iya tiyan. \u201CAn akon anak\u2026 diri ko hiya pababayaan,\u201D siring niya. Han adlaw han iya pagpanganak, gin-agian niya an duro nga kasakit. Pero han iya nakita an iya anak, usa nga matahum nga batang lalaki. Pinangaranan niya ini nga hi Joshua.","\u201CMarites,\u201D siring han iya nanay, \u201Cdiri pa huli an tanan. Pwede ka pa bumalik ha eskwelahan.\u201D Tungod han suporta, nagdesisyon hiya nga magpadayon. Diri ini masayon. Adlaw-adlaw, ginbubuhat niya an iya pinakamaopay. Usahay ginbibitbit niya hi Joshua kon waray magbantay. Ha gab-i, nag-aaral hiya bisan kapoy na gud.","Naglabay an mga tuig, ngan padayon hiya nga naningkamot. Tubtob nga nakaabot hiya ha iya graduation. Ha entablado, samtang gin-aabot niya an iya diploma, nabati niya an kusog nga palakpak. Waray hiya kapugong han iya luha. \u201CNatuman ko gud,\u201D siring niya ha iya kalugaringon.","Pagkahuman, nakatrabaho hiya sugad nga maestra ha ira baryo. Damo nga kabataan an iya natutdoan, ngan gin-inspirar niya ini pinaagi han iya istorya. Usa ka adlaw, nagpakiana an usa niya nga estudyante, \u201CMa\u2019am, paonan-o kamo nagin kusog?\u201D Nagngiti hi Marites ngan siniring, \u201CAn kusog diri tikang ha edad. Tikang ini ha gugma ngan determinasyon.\u201D","Ha gab-i, samtang nagkakaon hira ni Joshua, ginyakap hiya han bata. \u201CNanay, proud ako ha imo.\u201D Naluha hi Marites ngan ginyakap ini hin mahugot. \u201CMas proud ako ha imo, anak. Ikaw an akon kusog.\u201D"]}],vt={nga:"connects modifiers and nouns, and between clauses.",an:"the (completed / past)",han:"of / the (past object)",ha:"to / at / in",mga:"plural marker (the \u2026s)",hin:"a / some (object)",it:"the (now / general)",na:"already",iya:"his / hers",ngan:"and; plus.",waray:"speaker of Waray",hi:"the (before a name)",ini:"this (near)",pa:"still / yet",hiya:"he / she",ug:"and; plus.",kay:"because; for a reason; than.",ni:"of / by (before a name)",ako:"I",diri:"not; no; negative.",may:"indicates presence, or place",ba:"makes a yes/no question",hira:"they",imo:"yours / your",ira:"theirs",para:"for;",liwat:"also / too",ginoo:"Lord",akon:"mine / my",usa:"one",niya:"his / her",away:"quarrel; fight 2 to quarrel with; to",kan:"to / for (before a name)",kun:"if; when.",ano:"what",iton:"that (near you)",tawo:"person/human.",duro:"excessive; radical; extreme; intense;",didto:"there (far)",bata:"child 2 bathrobe 3 uncle. 1",ko:"my (short)",nanay:"mother.",adlaw:"day;sun.",anak:"child/offspring.",balay:"house.",siday:"poem.",aton:"ours (incl)",adto:"that (over there)",pulong:"word.",kita:"we (inclusive)",tatay:"father.",tikang:"from; start.",dida:"there",nira:"their",ada:"there is / has (with 'may')",babayi:"female;woman 2 female animal. 1",kami:"we (exclusive)",lalaki @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600;700&display=swap');

:root{
  --sea-ink:#0a2e34; --sea:#0c6b73; --tide:#16a3ab; --tide-soft:#3fa9b0;
  --sun:#f4a53a; --sun-deep:#e0892a; --coral:#e2604a; --jade:#4fb286;
  --shell:#f7f1e6; --sand:#ece2cf; --sand-deep:#ddcfb4;
  --ink:#15282b; --ink-soft:#4a5d5f; --foam:#ffffff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
.ws-root{font-family:'Outfit',system-ui,sans-serif;color:var(--ink);
  background:var(--shell);min-height:100%;max-width:480px;margin:0 auto;
  position:relative;line-height:1.45}
.ws-root *::selection{background:var(--tide);color:#fff}
.ws-load{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;min-height:60vh;color:var(--sea)}
.ws-page{padding:18px 16px 90px}

/* header */
.ws-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.ws-eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--tide);font-weight:600}
.ws-title{font-family:'Fraunces',serif;font-size:46px;line-height:.95;font-weight:600;
  margin:2px 0 0;color:var(--sea-ink);letter-spacing:-.01em}
.ws-sub{font-size:13px;color:var(--ink-soft);margin-top:4px}
.ws-icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--sand-deep);
  background:var(--foam);color:var(--sea);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.15s}
.ws-icon-btn:active{transform:scale(.94)}

/* tide hero */
.ws-tide{position:relative;border-radius:22px;overflow:hidden;height:184px;
  box-shadow:0 10px 30px -12px rgba(10,46,52,.5)}
.ws-tide-svg{width:100%;height:100%;display:block}
.ws-wave1{animation:wave 7s ease-in-out infinite alternate}
.ws-wave2{animation:wave 9s ease-in-out infinite alternate-reverse}
@keyframes wave{from{transform:translateX(-12px)}to{transform:translateX(12px)}}
.ws-tide-overlay{position:absolute;inset:0;display:flex;flex-direction:column;
  justify-content:center;padding-left:24px}
.ws-tide-pct{font-family:'Fraunces',serif;font-size:58px;font-weight:600;color:#fff;
  line-height:.9;text-shadow:0 2px 14px rgba(0,0,0,.25)}
.ws-tide-pct span{font-size:24px;opacity:.8}
.ws-tide-label{color:#eaf7f7;font-size:13px;font-weight:500;margin-top:4px;
  text-shadow:0 1px 8px rgba(0,0,0,.3)}

/* streak chips */
.ws-streakrow{display:flex;gap:8px;margin:14px 0 18px}
.ws-chip{flex:1;background:var(--foam);border:1px solid var(--sand-deep);border-radius:14px;
  padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--ink-soft)}
.ws-chip b{font-size:19px;color:var(--ink);font-weight:700;font-family:'Fraunces',serif}
.ws-chip span{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em}
.ws-chip svg{color:var(--tide);margin-bottom:2px}
.ws-chip-flame svg{color:var(--sun-deep)}

/* 14-day tracker */
.ws-tracker{background:var(--foam);border:1px solid var(--sand-deep);border-radius:16px;
  padding:13px 14px 11px;margin-bottom:18px}
.ws-tracker-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.ws-tracker-title{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);font-weight:600}
.ws-tracker-streak{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:700;color:var(--sun-deep)}
.ws-tracker-grid{display:flex;gap:4px}
.ws-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.ws-day-cell{width:100%;aspect-ratio:1;border-radius:5px;background:var(--sand)}
.ws-day-cell.lv1{background:#cdeae8}
.ws-day-cell.lv2{background:var(--tide-soft)}
.ws-day-cell.lv3{background:var(--tide)}
.ws-day.today .ws-day-cell{box-shadow:0 0 0 2px var(--sun-deep)}
.ws-day-lbl{font-size:9px;color:var(--sand-deep);font-weight:600}

/* home "Units" tiles (mastery boxes, tap to review) */
.ws-units{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.ws-unit-tile{display:block;width:100%;text-align:left;padding:14px;border-radius:16px;
  border:1.5px solid var(--sand-deep);background:var(--foam);cursor:pointer;font-family:inherit;transition:.15s}
.ws-unit-tile:active{transform:scale(.99)}
.ws-unit-tile-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.ws-unit-tile-name{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--sea)}
.ws-unit-tile-meta{display:inline-flex;align-items:center;gap:2px;flex-shrink:0;font-size:12px;font-weight:700;
  color:var(--tide);font-variant-numeric:tabular-nums}
.ws-unit-tile-sub{font-size:11.5px;color:var(--ink-soft);margin:2px 0 2px}

/* learn path */
.ws-learn{padding-bottom:30px}
.ws-section{margin-bottom:26px}
.ws-section-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;
  border-bottom:2px solid var(--sand-deep);padding-bottom:6px;margin-bottom:14px}
.ws-section-name{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--sea)}
.ws-section-prog{flex-shrink:0;font-size:12px;font-weight:700;color:var(--tide);font-variant-numeric:tabular-nums}
.ws-section-hint{font-size:12px;color:var(--ink-soft)}
.ws-unit{margin-bottom:22px}
.ws-unit-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.ws-unit-name{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--ink)}
.ws-unit-hint{font-size:12px;color:var(--ink-soft);margin-top:1px}
.ws-unit-prog{flex-shrink:0;font-size:11px;font-weight:700;color:var(--tide);background:#eef8f8;
  border-radius:20px;padding:4px 9px;font-variant-numeric:tabular-nums}
.ws-lessons{display:flex;flex-direction:column;gap:8px}
.ws-lblock{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tide);
  margin:6px 2px 0;opacity:.85}
.ws-lnode{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:11px 13px;
  border-radius:14px;border:1.5px solid var(--sand-deep);background:var(--foam);cursor:pointer;
  font-family:inherit;transition:.15s}
.ws-lnode.cur{border-color:var(--tide);background:#eef8f8}
.ws-lnode.done{border-color:var(--jade)}
.ws-lnode.locked{opacity:.5;cursor:not-allowed}
.ws-lnode-ring{flex-shrink:0;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:var(--sea);
  background:conic-gradient(var(--tide) calc(var(--p)*1%), var(--sand) 0)}
.ws-lnode-ring span{background:var(--foam);width:30px;height:30px;border-radius:50%;display:flex;
  align-items:center;justify-content:center}
.ws-lnode.done .ws-lnode-ring{background:var(--jade);color:#fff}
.ws-lnode-body{flex:1;min-width:0}
.ws-lnode-title{font-size:14.5px;font-weight:600;color:var(--ink)}
.ws-lnode-sub{font-size:11.5px;color:var(--ink-soft);margin-top:1px}
.ws-lnode-arr{color:var(--sand-deep);flex-shrink:0}
.ws-lnode.ws-review{margin-top:7px;border-style:dashed;border-color:var(--tide);background:#f3fbfb}
.ws-lnode.ws-review .ws-lnode-ring{background:var(--sun);color:#fff}
.ws-lnode.ws-review.done{border-style:solid}
.ws-lnode.ws-review.done .ws-lnode-ring{background:var(--jade)}
.ws-unit-mastered{display:inline-flex;align-items:center;gap:3px;margin-left:8px;font-size:10.5px;font-weight:700;
  color:var(--jade);vertical-align:middle}

/* lesson screen */
.ws-lesson-title{font-family:'Fraunces',serif;font-size:23px;font-weight:600;color:var(--ink);margin:4px 0 4px}
.ws-lwords{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.ws-lword{display:flex;justify-content:space-between;align-items:center;gap:12px;width:100%;text-align:left;
  padding:10px 13px;border-radius:12px;border:1px solid var(--sand-deep);background:var(--foam);
  cursor:pointer;font-family:inherit}
.ws-lword-w{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--sea)}
.ws-lword-say{font-size:11px;color:var(--tide);margin-top:1px}
.ws-lword-e{font-size:13px;color:var(--ink-soft);text-align:right;flex-shrink:0}
.ws-parts{display:flex;flex-direction:column;gap:8px;padding-bottom:30px}
.ws-part{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:12px 13px;
  border-radius:14px;border:1.5px solid var(--sand-deep);background:var(--foam);cursor:pointer;
  font-family:inherit;transition:.15s}
.ws-part.cur{border-color:var(--tide);background:#eef8f8}
.ws-part.done{border-color:var(--jade)}
.ws-part:disabled{opacity:.45;cursor:not-allowed}
.ws-part-num{flex-shrink:0;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:14px;color:#fff;background:var(--sand-deep)}
.ws-part.cur .ws-part-num{background:var(--tide)}
.ws-part.done .ws-part-num{background:var(--jade)}
.ws-part-body{flex:1;min-width:0}
.ws-part-label{font-size:14.5px;font-weight:600;color:var(--ink)}
.ws-part-hint{font-size:11.5px;color:var(--ink-soft);margin-top:1px}
.ws-part-cta{flex-shrink:0;font-size:12px;font-weight:700;color:var(--tide)}

/* CTAs */
.ws-cta-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.ws-cta{display:flex;align-items:center;gap:13px;padding:15px 16px;border-radius:16px;
  border:1px solid var(--sand-deep);background:var(--foam);cursor:pointer;text-align:left;
  transition:.15s;width:100%}
.ws-cta:active{transform:scale(.99)}
.ws-cta-primary{background:linear-gradient(135deg,var(--sea),var(--tide));border:none;color:#fff}
.ws-cta-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;background:var(--sand);color:var(--sea);flex-shrink:0}
.ws-cta-primary .ws-cta-ic{background:rgba(255,255,255,.2);color:#fff}
.ws-ic-tide{background:#dcefef;color:var(--tide)}
.ws-ic-coral{background:#fae3de;color:var(--coral)}
.ws-ic-jade{background:#e0f3ea;color:var(--jade)}
/* Read tab \u2014 story list */
.ws-read-list{display:flex;flex-direction:column;gap:9px}
.ws-read-card{display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
  background:var(--foam);border:1px solid var(--sand-deep);border-radius:14px;padding:13px 15px}
.ws-read-card-main{flex:1;min-width:0}
.ws-read-card-title{font-size:15px;font-weight:650;color:var(--ink)}
.ws-read-done{color:var(--jade);vertical-align:-2px;margin-right:5px}
.ws-read-card-sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
.ws-read-badge{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:58px;padding:6px 8px;border-radius:11px;line-height:1.1}
.ws-read-badge b{font-size:15px}
.ws-read-badge span{font-size:10px;opacity:.85}
.ws-read-badge.ok{background:#e0f3ea;color:#2f7a57}
.ws-read-badge.mid{background:#fdf0db;color:var(--sun-deep)}
.ws-read-badge.hard{background:#fae3de;color:var(--coral)}
/* Read tab \u2014 reader */
.ws-read-meta{font-size:12.5px;color:var(--ink-soft);margin:-6px 0 14px}
.ws-read-hint{color:var(--tide)}
.ws-read-body{font-size:18px;line-height:1.85;color:var(--ink)}
.ws-read-p{margin:0 0 15px}
.ws-rw{cursor:pointer;border-radius:4px;padding:0 1px}
.ws-rw:active{background:var(--sand)}
.ws-rw.new{text-decoration:underline;text-decoration-color:var(--sun);text-decoration-thickness:2px;text-underline-offset:3px}
.ws-rw.chunk{text-decoration:underline;text-decoration-style:dotted;text-decoration-color:var(--tide);text-decoration-thickness:2px;text-underline-offset:3px}
.ws-read-play{vertical-align:middle;margin-left:5px;border:none;background:var(--foam);color:var(--tide);
  cursor:pointer;opacity:.55;padding:2px}
.ws-read-credit{margin-top:20px;font-size:11.5px;color:var(--ink-soft);border-top:1px solid var(--sand);padding-top:12px}
/* Read tab \u2014 comprehension quiz */
.ws-quiz{margin-top:24px;border-top:1px solid var(--sand);padding-top:16px}
.ws-quiz-q{margin-bottom:18px}
.ws-quiz-prompt{font-weight:600;font-size:14.5px;color:var(--ink);margin-bottom:9px}
.ws-quiz-opt{display:block;width:100%;text-align:left;margin-bottom:7px;padding:11px 13px;border-radius:11px;
  border:1.5px solid var(--sand-deep);background:var(--foam);color:var(--ink);font-size:14px;cursor:pointer;transition:.12s}
.ws-quiz-opt:disabled{cursor:default}
.ws-quiz-opt.correct{border-color:var(--jade);background:#e0f3ea;color:#2f7a57;font-weight:600}
.ws-quiz-opt.incorrect{border-color:var(--coral);background:#fae3de;color:var(--coral)}
.ws-gloss-bar{position:fixed;left:12px;right:12px;bottom:14px;max-width:600px;margin:0 auto;z-index:40;
  display:flex;align-items:center;gap:10px;background:var(--sea-ink);color:#fff;border-radius:14px;
  padding:12px 15px;box-shadow:0 6px 24px rgba(0,0,0,.25);cursor:pointer}
.ws-gloss-bar b{font-size:16px;flex:0 0 auto}
.ws-gloss-bar span{flex:1;font-size:13.5px;opacity:.9}
.ws-gloss-bar .ws-skip{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:4px 9px}
.ws-cta-t{font-weight:600;font-size:15.5px}
.ws-cta-d{font-size:12.5px;opacity:.78;margin-top:1px}
.ws-cta-sub{font-size:11.5px;opacity:.6;margin-top:1px}
.ws-cta-arrow{margin-left:auto;opacity:.5;flex-shrink:0}
.ws-cta-primary .ws-cta-arrow{opacity:.85}
.ws-badge{display:inline-block;background:var(--coral);color:#fff;font-size:11px;font-weight:700;
  border-radius:9px;padding:1px 7px;margin-left:5px;vertical-align:middle}

/* section label */
.ws-seclabel{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--sea);margin:6px 0 11px}
.ws-seclabel svg{color:var(--tide)}

/* decks */
.ws-decks{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.ws-deck{background:var(--foam);border:1px solid var(--sand-deep);border-radius:16px;
  padding:14px 15px;cursor:pointer;text-align:left;transition:.15s}
.ws-deck:active{transform:scale(.99)}
.ws-deck-top{display:flex;justify-content:space-between;align-items:center}
.ws-deck-name{font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--sea-ink)}
.ws-deck-count{font-size:12px;color:var(--ink-soft);background:var(--sand);border-radius:20px;
  padding:2px 9px;font-weight:600}
.ws-deck-hint{font-size:12px;color:var(--ink-soft);margin:2px 0 9px}
.ws-deck-foot{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-soft);
  margin-top:7px;font-weight:500}
.ws-due-dot{color:var(--sun-deep);font-weight:600}

.ws-bar{height:7px;background:var(--sand);border-radius:20px;overflow:hidden}
.ws-bar-fill{height:100%;background:linear-gradient(90deg,var(--tide),var(--jade));
  border-radius:20px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

/* distribution */
.ws-dist{margin-bottom:16px}
.ws-dist-bar{display:flex;height:13px;border-radius:20px;overflow:hidden;background:var(--sand)}
.ws-seg{transition:width .6s}
.ws-seg-m{background:var(--jade)} .ws-seg-l{background:var(--tide-soft)} .ws-seg-x{background:var(--coral)} .ws-seg-f{background:var(--sand-deep)}
.ws-dist-legend{display:flex;gap:14px;margin-top:9px;font-size:11.5px;color:var(--ink-soft);flex-wrap:wrap}
.ws-dist-legend span{display:flex;align-items:center;gap:5px}
.ws-dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.ws-dot-m{background:var(--jade)} .ws-dot-l{background:var(--tide-soft)} .ws-dot-x{background:var(--coral)} .ws-dot-f{background:var(--sand-deep)}

/* constellation */
.ws-constel{display:grid;grid-template-columns:repeat(auto-fill,minmax(13px,1fr));gap:4px;margin-top:4px}
.ws-cell{aspect-ratio:1;border-radius:3px;transition:.3s}
.ws-cell-f{background:var(--sand-deep);opacity:.5}
.ws-cell-l1{background:var(--coral);opacity:.65}
.ws-cell-l3{background:var(--tide-soft)}
.ws-cell-m{background:var(--jade)}

/* bottom bar */
.ws-build{text-align:center;font-size:10.5px;color:var(--sand-deep);letter-spacing:.04em;
  font-variant-numeric:tabular-nums;margin:18px 0 84px}
.ws-bottombar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:rgba(247,241,230,.92);backdrop-filter:blur(10px);border-top:1px solid var(--sand-deep);
  display:flex;padding:8px 0 10px;z-index:20}
.ws-bb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10.5px;color:var(--ink-soft);cursor:pointer;font-weight:500;font-family:inherit}
.ws-bb.active{color:var(--sea)}
.ws-bb.active svg{color:var(--tide)}

/* topbar */
.ws-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.ws-topbar h2{font-family:'Fraunces',serif;font-size:21px;font-weight:600;color:var(--sea-ink)}

/* setup */
.ws-pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:22px}
.ws-pick{display:flex;align-items:center;gap:8px;padding:12px 12px;border-radius:13px;
  border:1.5px solid var(--sand-deep);background:var(--foam);cursor:pointer;transition:.15s;text-align:left}
.ws-pick.on{border-color:var(--tide);background:#eef8f8}
.ws-pick-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--sand-deep);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.ws-pick.on .ws-pick-check{background:var(--tide);border-color:var(--tide)}
.ws-pick-name{font-weight:600;font-size:13.5px;flex:1}
.ws-pick-n{font-size:11px;color:var(--ink-soft)}

.ws-seg-toggle{display:flex;gap:8px;margin-bottom:22px}
.ws-seg-toggle button{flex:1;padding:13px 8px;border-radius:13px;border:1.5px solid var(--sand-deep);
  background:var(--foam);cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;
  color:var(--ink);transition:.15s;line-height:1.3}
.ws-seg-toggle button em{display:block;font-style:normal;font-size:10.5px;font-weight:500;
  color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.ws-seg-toggle button.on{border-color:var(--sea);background:var(--sea);color:#fff}
.ws-seg-toggle button.on em{color:rgba(255,255,255,.8)}

.ws-mode-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.ws-mode{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:13px;
  border:1.5px solid var(--sand-deep);background:var(--foam);cursor:pointer;text-align:left;transition:.15s}
.ws-mode.on{border-color:var(--tide);background:#eef8f8}
.ws-mode-ic{width:36px;height:36px;border-radius:10px;background:var(--sand);color:var(--sea);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ws-mode.on .ws-mode-ic{background:var(--tide);color:#fff}
.ws-mode-txt{flex:1}
.ws-mode-txt b{display:block;font-size:14px;font-weight:600}
.ws-mode-txt i{font-style:normal;font-size:12px;color:var(--ink-soft)}
.ws-mode-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--sand-deep);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.ws-mode.on .ws-mode-radio{border-color:var(--tide)}
.ws-radio-on{width:10px;height:10px;border-radius:50%;background:var(--tide)}

.ws-setup-foot{position:sticky;bottom:0;display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding-top:8px}
.ws-setup-meta{font-size:12.5px;color:var(--ink-soft);font-weight:500}
.ws-start{display:flex;align-items:center;gap:6px;padding:14px 26px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--sun),var(--sun-deep));color:#3a2410;font-weight:700;font-size:15px;
  cursor:pointer;font-family:inherit;box-shadow:0 6px 18px -8px var(--sun-deep);transition:.15s}
.ws-start:active{transform:scale(.97)}
.ws-start:disabled{opacity:.4;box-shadow:none}
.ws-full{width:100%;justify-content:center;margin-bottom:16px}

/* session */
.ws-session{padding-top:16px}
.ws-remedy{margin:-10px 0 16px;padding:9px 13px;border-radius:11px;background:#fff5e6;border:1px solid var(--sun);
  color:#9a6300;font-size:12.5px;font-weight:600;text-align:center}
.ws-auto-bar{height:3px;border-radius:3px;background:currentColor;opacity:.35;margin-top:11px;
  transform-origin:left;animation:wsAuto linear forwards}
@keyframes wsAuto{from{transform:scaleX(1)}to{transform:scaleX(0)}}
.ws-skip{display:block;margin:10px auto 0;background:none;border:none;color:var(--ink-soft);font-family:inherit;
  font-size:12.5px;text-decoration:underline;cursor:pointer}
.ws-mic-stt{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;
  padding:12px 14px;border-radius:13px;border:1.5px solid var(--tide);background:var(--foam);color:var(--sea);
  font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.ws-mic-stt.on{background:var(--coral);border-color:var(--coral);color:#fff;animation:wsPulse 1.1s ease-in-out infinite}
@keyframes wsPulse{0%,100%{opacity:1}50%{opacity:.6}}
.ws-stt{display:flex;flex-direction:column;gap:11px;margin-bottom:8px}
.ws-stt-note{font-size:12.5px;color:var(--ink-soft);line-height:1.5}
.ws-sttdbg{margin-top:12px;padding:10px 12px;border-radius:11px;background:#0a2e34;color:#cfe8e6;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;line-height:1.5}
.ws-sttdbg-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;
  color:#7fc6c2;font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:10px}
.ws-sttdbg-head span{display:inline-flex;align-items:center;gap:5px}
.ws-sttdbg-head button{background:#16545c;border:none;color:#dff3f1;font-family:inherit;font-size:10px;
  padding:3px 9px;border-radius:6px;cursor:pointer;text-transform:none;letter-spacing:0}
.ws-sttdbg-heard,.ws-sttdbg-exp{margin-bottom:5px;word-break:break-word}
.ws-sttdbg-heard b,.ws-sttdbg-exp b{color:#7fc6c2;font-weight:700}
.ws-sttdbg-alt{display:flex;align-items:center;gap:7px;padding:2px 0;opacity:.7}
.ws-sttdbg-alt.ok{opacity:1;color:#a9e8c4}
.ws-sttdbg-n{width:15px;height:15px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;
  background:#16545c;border-radius:4px;font-size:9.5px}
.ws-sttdbg-raw{font-weight:600}
.ws-sttdbg-arr{color:#5a9b97}
.ws-sttdbg-dist{margin-left:auto;display:inline-flex;align-items:center;gap:3px;flex-shrink:0}
.ws-session-top{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.ws-vk{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;
  border:1px solid var(--sand-deep);background:var(--foam);color:var(--ink-soft);cursor:pointer;flex:0 0 auto}
.ws-vk.on{background:var(--tide);border-color:var(--tide);color:#fff}
.ws-drillmode{display:flex;gap:6px;justify-content:center;margin:-12px 0 18px}
.ws-drillmode button{padding:6px 18px;border-radius:999px;border:1.5px solid var(--sand-deep);
  background:var(--foam);color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer}
.ws-drillmode button.on{border-color:var(--tide);background:#eef8f8;color:var(--sea)}
.ws-voice{display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px 0 8px}
.ws-voice-orb{display:flex;align-items:center;justify-content:center;width:96px;height:96px;border-radius:50%;
  background:var(--foam);border:2px solid var(--sand-deep);color:var(--tide);cursor:pointer;transition:all .15s}
.ws-voice-orb.speaking{border-color:#f4a53a;color:#f4a53a}
.ws-voice-orb.starting{border-color:#f4a53a;color:#f4a53a;opacity:.6}
.ws-voice-orb.listening{background:#fdf0ec;border-color:#c0432b;color:#c0432b;animation:wsPulse 1.1s ease-in-out infinite}
.ws-voice-state{font-size:14px;color:var(--ink-soft);text-align:center}
.ws-voice-heard{font-size:18px;font-weight:600;color:var(--ink);margin-top:4px}
.ws-voice-acts{display:flex;gap:10px}
.ws-vk-fixed{position:fixed;top:max(10px,env(safe-area-inset-top));right:12px;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.ws-icon-btn.vk-on{background:var(--tide);border-color:var(--tide);color:#fff}
.ws-voice.compact{padding:4px 0 12px;gap:9px}
.ws-voice.compact .ws-voice-orb{width:62px;height:62px}
.ws-voice.compact .ws-voice-state{font-size:13px}
.ws-progress-track{flex:1;height:8px;background:var(--sand);border-radius:20px;overflow:hidden}
.ws-progress-fill{height:100%;background:linear-gradient(90deg,var(--tide),var(--sun));
  border-radius:20px;transition:width .4s}
.ws-session-count{font-size:12.5px;font-weight:600;color:var(--ink-soft);min-width:38px;text-align:right}

.ws-card{background:var(--foam);border:1px solid var(--sand-deep);border-radius:22px;
  padding:22px 20px;box-shadow:0 8px 24px -16px rgba(10,46,52,.4);animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.ws-card-tag{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--tide);
  font-weight:600;margin-bottom:18px}

.ws-prompt{text-align:center;margin-bottom:22px}
.ws-prompt-waray{font-family:'Fraunces',serif;font-size:33px;font-weight:600;color:var(--sea-ink);
  line-height:1.15}
.ws-prompt-eng{font-family:'Fraunces',serif;font-size:27px;font-weight:500;color:var(--sea-ink);line-height:1.2}
.ws-say{font-size:14px;color:var(--tide);font-weight:500;margin-top:7px;letter-spacing:.02em}
.ws-mini-play{display:inline-flex;align-items:center;gap:5px;margin-top:10px;background:var(--sand);
  border:none;border-radius:20px;padding:6px 13px;font-size:12.5px;color:var(--sea);font-weight:600;
  cursor:pointer;font-family:inherit;transition:.15s}
.ws-mini-play:active{transform:scale(.95)}
.ws-mini-play.sq{padding:8px;border-radius:10px;margin:0}
.ws-mini-play.rec{background:var(--coral);color:#fff;animation:pulse 1.1s infinite}

.ws-options{display:flex;flex-direction:column;gap:9px}
.ws-opt{display:flex;align-items:center;padding:15px 16px;border-radius:13px;border:1.5px solid var(--sand-deep);
  background:var(--shell);font-size:15.5px;font-weight:500;color:var(--ink);cursor:pointer;text-align:left;
  transition:.15s;font-family:inherit}
.ws-opt-key{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;margin-right:11px;
  border-radius:5px;background:var(--sand);color:var(--ink-soft);font-size:11px;font-weight:700;flex-shrink:0}
.ws-opt.correct .ws-opt-key{background:var(--jade);color:#fff}
.ws-opt.incorrect .ws-opt-key{background:var(--coral);color:#fff}
.ws-opt:active{transform:scale(.99)}
.ws-opt.correct{border-color:var(--jade);background:#e7f6ee;color:#1f6b46;font-weight:600}
.ws-opt.incorrect{border-color:var(--coral);background:#fbe7e2;color:#a33422}

.ws-listen-big{width:100%;display:flex;flex-direction:column;align-items:center;gap:8px;padding:26px;
  border-radius:16px;border:none;background:linear-gradient(135deg,var(--sea),var(--tide));color:#fff;
  cursor:pointer;margin-bottom:20px;font-family:inherit;font-size:14px;font-weight:600}
.ws-listen-big em{font-style:normal;font-size:11px;opacity:.85;background:rgba(255,255,255,.2);
  padding:2px 9px;border-radius:12px}
.ws-listen-big:active{transform:scale(.98)}

.ws-input{width:100%;padding:15px 16px;border-radius:13px;border:1.5px solid var(--sand-deep);
  font-size:17px;font-family:'Fraunces',serif;color:var(--sea-ink);background:var(--shell);outline:none;
  transition:.15s}
.ws-input:focus{border-color:var(--tide);background:#fff}
.ws-check{width:100%;margin-top:12px;padding:14px;border-radius:13px;border:none;background:var(--sea);
  color:#fff;font-weight:600;font-size:15px;cursor:pointer;font-family:inherit;transition:.15s}
.ws-check:active{transform:scale(.99)}
.ws-check:disabled{opacity:.4}
.ws-yourans{text-align:center;font-family:'Fraunces',serif;font-size:22px;padding:10px;border-radius:12px;
  margin-bottom:14px}
.ws-yourans.right{color:#1f6b46}.ws-yourans.wrong{color:#a33422;text-decoration:line-through;opacity:.7}

.ws-reveal{width:100%;padding:15px;border-radius:13px;border:1.5px dashed var(--tide);
  background:#eef8f8;color:var(--sea);font-weight:600;font-size:14.5px;cursor:pointer;font-family:inherit}
.ws-answer-reveal{text-align:center;margin-bottom:6px;animation:rise .3s ease}
.ws-answer-text{font-family:'Fraunces',serif;font-size:30px;font-weight:600;color:var(--sea-ink)}
.ws-subtext{text-align:center;font-size:13px;color:var(--ink-soft);font-style:italic;margin:8px 0;
  background:var(--sand);padding:8px 12px;border-radius:10px}

.ws-verdict{margin-top:18px;padding-top:16px;border-top:1px solid var(--sand);animation:rise .3s ease}
.ws-verdict-head{display:flex;align-items:center;gap:7px;font-weight:700;font-size:15px}
.ws-verdict.ok .ws-verdict-head{color:var(--jade)}
.ws-verdict.no .ws-verdict-head{color:var(--coral)}
.ws-verdict-answer{display:flex;align-items:center;justify-content:center;gap:8px;margin:10px 0;
  font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--sea-ink)}
.ws-verdict-yousaid{text-align:center;font-size:12.5px;color:var(--ink-soft);margin:4px 0 2px}
/* history */
.ws-hist-overall{text-align:center;font-size:13px;font-weight:600;color:var(--tide);margin-bottom:16px}
.ws-hist-day{margin-bottom:14px}
.ws-hist-dayhead{display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:1px solid var(--sand-deep);padding-bottom:4px;margin-bottom:6px}
.ws-hist-date{font-weight:600;font-size:13.5px;color:var(--ink)}
.ws-hist-acc{font-size:12px;font-weight:700;color:var(--ink-soft);font-variant-numeric:tabular-nums}
.ws-hist-miss{display:flex;align-items:center;gap:6px;font-size:12.5px;padding:3px 0}
.ws-hist-prompt{font-family:'Fraunces',serif;color:var(--sea);min-width:90px}
.ws-hist-yours{color:var(--coral);text-decoration:line-through}
.ws-hist-correct{color:var(--jade);font-weight:600}
.ws-verdict-actions{display:flex;gap:10px;margin-top:14px}
.ws-next-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:13px;
  border-radius:13px;border:none;background:var(--sea);color:#fff;font-weight:600;font-size:14.5px;
  cursor:pointer;font-family:inherit}
.ws-ghost-btn{padding:13px 16px;border-radius:13px;border:1.5px solid var(--sand-deep);background:var(--foam);
  color:var(--ink-soft);font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit}

.ws-selfgrade{display:flex;gap:10px;margin-top:18px}
.ws-sg{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:15px;border-radius:13px;
  border:none;font-weight:600;font-size:14.5px;cursor:pointer;font-family:inherit;transition:.15s}
.ws-sg:active{transform:scale(.98)}
.ws-sg-no{background:#fbe7e2;color:#a33422}
.ws-sg-ok{background:#e7f6ee;color:#1f6b46}

/* speak */
.ws-speak-prompt{text-align:center;margin-bottom:20px}
.ws-speak-instr{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:6px;font-weight:600}
.ws-speak-controls{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:18px}
.ws-rec-btn{display:flex;align-items:center;gap:9px;padding:14px 24px;border-radius:30px;border:none;
  background:var(--coral);color:#fff;font-weight:600;font-size:15px;cursor:pointer;font-family:inherit;
  box-shadow:0 6px 18px -8px var(--coral)}
.ws-rec-btn.recording{animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.ws-rec-playback{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.ws-mic-err{text-align:center;font-size:12.5px;color:var(--ink-soft);background:var(--sand);
  padding:10px;border-radius:10px;margin-bottom:14px}

/* done */
.ws-done{display:flex;align-items:center;justify-content:center;min-height:80vh}
.ws-done-card{text-align:center;background:var(--foam);border:1px solid var(--sand-deep);border-radius:24px;
  padding:34px 28px;width:100%;box-shadow:0 12px 30px -18px rgba(10,46,52,.5)}
.ws-done-ring{width:120px;height:120px;border-radius:50%;margin:0 auto 18px;display:flex;
  align-items:center;justify-content:center;
  background:conic-gradient(var(--jade) calc(var(--p)*1%),var(--sand) 0)}
.ws-done-ring.fail{background:conic-gradient(var(--coral) calc(var(--p)*1%),var(--sand) 0)}
.ws-passpill{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;
  padding:5px 12px;border-radius:20px;margin-bottom:12px}
.ws-passpill.ok{background:#e7f6ee;color:var(--jade)}
.ws-passpill.no{background:#fae3de;color:var(--coral)}
.ws-done-ring span{width:92px;height:92px;border-radius:50%;background:var(--foam);display:flex;
  align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:32px;font-weight:600;
  color:var(--sea-ink)}
.ws-done-ring i{font-style:normal;font-size:16px;color:var(--ink-soft)}
.ws-done-card h2{font-family:'Fraunces',serif;font-size:26px;color:var(--sea-ink);margin:0 0 4px}
.ws-done-sub{font-size:13.5px;color:var(--ink-soft);margin-bottom:22px}
.ws-missed{text-align:left;width:100%;background:var(--shell);border:1px solid var(--sand-deep);
  border-radius:14px;padding:10px 12px;margin-bottom:18px;max-height:260px;overflow-y:auto}
.ws-missed-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--coral);
  font-weight:700;margin-bottom:8px}
.ws-missed-row{padding:7px 0;border-top:1px solid var(--sand-deep)}
.ws-missed-row:first-of-type{border-top:none}
.ws-missed-prompt{font-family:'Fraunces',serif;font-size:14.5px;color:var(--ink)}
.ws-missed-ans{display:flex;align-items:center;gap:6px;font-size:12.5px;margin-top:2px}
.ws-missed-yours{color:var(--coral);text-decoration:line-through}
.ws-missed-arr{color:var(--sand-deep);transform:rotate(180deg);flex-shrink:0}
.ws-missed-correct{color:var(--jade);font-weight:600}
.ws-missed-said{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
.ws-hist-said{color:var(--ink-soft);font-style:italic}
.ws-done-actions{display:flex;gap:10px;justify-content:center}
.ws-done-actions .ws-start{padding:13px 20px}

/* needs work */
.ws-empty{text-align:center;padding:50px 24px;color:var(--ink-soft)}
.ws-empty svg{color:var(--tide);margin-bottom:14px}
.ws-empty p{font-size:14px;line-height:1.6}
.ws-nw-list{display:flex;flex-direction:column;gap:8px}
.ws-nw{display:flex;align-items:center;gap:11px;background:var(--foam);border:1px solid var(--sand-deep);
  border-radius:13px;padding:11px 13px}
.ws-nw-body{flex:1;min-width:0}
.ws-nw-waray{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--sea-ink)}
.ws-nw-eng{font-size:12.5px;color:var(--ink-soft)}
.ws-nw-meta{display:flex;align-items:center;gap:8px}

/* browse */
.ws-search{width:100%;padding:13px 15px;border-radius:13px;border:1.5px solid var(--sand-deep);
